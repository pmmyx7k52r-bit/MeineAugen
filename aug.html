<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 6.0.0</title>
<style>
body { font-family:-apple-system, sans-serif; background:#fdfcfb; text-align:center; padding:15px; color: #2c3e50; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

/* Stabiles Grid für die Auswahl */
.grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }

button.option {
padding: 12px; border: none; border-radius: 15px;
font-weight: 600; font-size: 14px;
background: #bdc3c7; color: white;
cursor: pointer; transition: all 0.2s;
flex: 1 1 45%; /* Zwei Buttons pro Zeile */
}

button.option.active { background: #2980b9; outline: 3px solid #2ecc71; opacity: 1; }

/* Haupt-Aktionsbuttons */
.action-btn {
padding: 16px; margin: 8px 0; width: 100%;
border: none; border-radius: 18px;
font-weight: bold; font-size: 16px;
cursor: pointer; color: white;
}

.start-morning { background: #f1c40f; color: #2c3e50; }
.start-run { background: #27ae60; }
.night { background: #2c3e50; }
.reset { background: #e74c3c; width: 50%; font-size: 11px; padding: 8px; margin-top: 20px; }

.hidden { display: none; }
#mode-info { font-size: 12px; color: #7f8c8d; margin-bottom: 15px; background: #f0f0f0; padding: 8px; border-radius: 12px; }
#title { font-size: 24px; font-weight: bold; }
#timer { font-size: 64px; color: #e67e22; font-weight: bold; margin: 15px 0; }
#desc { font-size: 18px; color: #444; min-height: 60px; }
</style>
</head>
<body>

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.0.0</h2>
<div id="mode-info">Lädt...</div>

<h4 style="margin:10px 0">Kontext</h4>
<div class="grid">
<button id="c_screen" class="option" onclick="STATE.setContext('screen')">📱 Bildschirm</button>
<button id="c_stress" class="option" onclick="STATE.setContext('stress')">⚠️ Stress</button>
<button id="c_nature" class="option" style="flex: 1 1 92%" onclick="STATE.setContext('nature')">🌿 Natur</button>
</div>

<h4 style="margin:10px 0">Zustand</h4>
<div class="grid">
<button id="s_normal" class="option" onclick="STATE.setState('normal')">🙂 Normal</button>
<button id="s_dry" class="option" onclick="STATE.setState('dry')">😵 Trocken</button>
<button id="s_overload" class="option" style="flex: 1 1 92%" onclick="STATE.setState('overload')">🔴 Überreizt</button>
</div>

<hr style="border:0; border-top:1px solid #eee; margin:15px 0;">

<button class="action-btn start-morning" onclick="startSession('wake')">☀️ Morgen-Pflege (Bett/Bad)</button>
<button class="action-btn start-run" onclick="startSession('training')">🚀 Training starten</button>
<button class="action-btn night" onclick="startSession('night')">🌙 Gute Nacht</button>
<button class="action-btn reset" onclick="STATE.reset()">Reset</button>
</div>

<div id="run" class="card hidden">
<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>
<button onclick="abort()" class="action-btn" style="background:#95a5a6;">Abbrechen</button>
</div>

<script>
const STATE = {
get() {
return {
state: localStorage.getItem("ma_state") || "normal",
context: localStorage.getItem("ma_context") || "screen"
};
},
setState(s) {
localStorage.setItem("ma_state", s);
this.updateUI();
},
setContext(c) {
localStorage.setItem("ma_context", c);
this.updateUI();
},
reset() {
localStorage.removeItem("ma_state");
localStorage.removeItem("ma_context");
location.reload();
},
updateUI() {
const data = this.get();
// Alle Optionen zurücksetzen
document.querySelectorAll('.option').forEach(btn => btn.classList.remove('active'));
// Aktive markieren
const stateBtn = document.getElementById("s_" + data.state);
const contextBtn = document.getElementById("c_" + data.context);
if(stateBtn) stateBtn.classList.add('active');
if(contextBtn) contextBtn.classList.add('active');

document.getElementById("mode-info").innerText =
`AKTIV: ${data.context.toUpperCase()} | STATUS: ${data.state.toUpperCase()}`;
}
};

// Initialisierung
STATE.updateUI();

/* --- Logik & Ablauf --- */

function step(t, s, v) { return {t, s, v}; }

function buildPlan(type) {
const {state, context} = STATE.get();

if(type === 'wake') {
return [
step("Im Bett", 15, "Handflächen auflegen und Augen wärmen"),
step("Blinzeln", 12, "Ganz sanft in den Raum blinzeln"),
step("Im Bad", 20, "Augen mit kühlem Wasser erfrischen"),
step("Bewegung", 20, "Sanfte Augen-Acht beschreiben")
];
}
if(type === 'night') {
return [
step("Entspannung", 40, "Dunkelheit hinter den Handflächen genießen"),
step("Gähnen", 15, "Tief gähnen und locker lassen"),
step("Ruhe", 10, "Gute Nacht.")
];
}
// Training Tagsüber
if(state === "overload") {
return [
step("Ruhe", 25, "Augen zu und tief atmen"),
step("Klopfen", 20, "Augenbrauen sanft abklopfen"),
step("Fernblick", 20, "Blick weich in die Ferne richten")
];
}
return [
step("Blinzeln", 15, "Augen befeuchten"),
step("Nah-Fern", 30, "Fokus-Wechsel trainieren"),
step("Rollen", 20, "Augen kreisen lassen")
];
}

let interval;
function speak(text, cb) {
if(!window.speechSynthesis) { cb?.(); return; }
speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.lang = "de-DE"
u.onend = () => cb?.();
speechSynthesis.speak(u);
}

function startSession(type) {
const steps = buildPlan(type);
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps, 0);
}

function run(steps, i) {
if(i >= steps.length) {
document.getElementById("timer").innerText = "✓"
speak("Fertig");
setTimeout(abort, 3000);
return;
}
const s = steps[i];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
speak(s.v, () => {
let sec = s.s;
document.getElementById("timer").innerText = sec;
interval = setInterval(() => {
sec--;
document.getElementById("timer").innerText = sec;
if(sec <= 0) {
clearInterval(interval);
run(steps, i + 1);
}
}, 1000);
});
}

function abort() {
clearInterval(interval);
if(window.speechSynthesis) speechSynthesis.cancel();
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}
</script>
</body>
</html>
