<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.7</title>

<style>
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }

.card {
background:white;
padding:20px;
border-radius:25px;
max-width:420px;
margin:auto;
}

button {
padding:14px;
margin:6px;
width:100%;
border:none;
border-radius:15px;
font-weight:600;
font-size:15px;
background:#2980b9;
color:white;
opacity:0.7;
}

button.active { opacity:1; outline:3px solid #2ecc71; }

.start { background:#27ae60; opacity:1; }

.night { background:#2c3e50; }

.hidden { display:none; }

#title { font-size:20px; margin:10px 0; }
#desc { font-size:14px; color:#444; }
#timer { font-size:42px; color:#e67e22; margin:10px 0; }
#phase { font-size:12px; color:#888; margin-bottom:10px; }

.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ MeineAugen 5.7</h2>

<div id="phase">Phase: ...</div>

<div id="live">System bereit</div>

<hr>

<h4>Kontext</h4>
<button id="c_screen" onclick="setContext('screen')">📱 Bildschirm</button>
<button id="c_stress" onclick="setContext('stress')">⚠️ Stress</button>
<button id="c_nature" onclick="setContext('nature')">🌿 Natur</button>

<h4>Zustand</h4>
<button id="s_normal" onclick="setState('normal')">🙂 Normal</button>
<button id="s_dry" onclick="setState('dry')">😵 Trocken</button>
<button id="s_sticky" onclick="setState('sticky')">🟡 Verklebt</button>
<button id="s_over" onclick="setState('overload')">🔴 Überreizt</button>

<button class="start" onclick="startFlow()">▶ Start</button>

<button class="night" onclick="goodNight()">🌙 Gute Nacht</button>

<div class="small" id="preview"></div>

</div>

<div id="run" class="card hidden">

<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>

<button onclick="finish(true)">👍 Gut</button>
<button onclick="finish(false)">⚠️ Schlecht</button>
<button onclick="abort()">Abbrechen</button>

</div>

<script>

// ================= STATE =================
let phase = localStorage.getItem("phase") || "morning"

let context = "screen"
let state = "normal"

let stats = JSON.parse(localStorage.getItem("eyeStats57") || "{}");

let interval;

// ================= INIT =================
updatePhaseUI();

// ================= PHASE CONTROL =================
function updatePhaseUI(){
document.getElementById("phase").innerText =
"Phase: " + phase.toUpperCase();
}

// ================= INPUT =================
function setContext(c){
context = c;
updateUI();
updatePreview();
}

function setState(s){
state = s;
updateUI();
updatePreview();
}

// ================= UI =================
function updateUI(){
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

document.getElementById("c_"+context)?.classList.add("active");
document.getElementById("s_"+state)?.classList.add("active");
}

// ================= MORNING =================
function morningRoutine(){
return [
{t:"Augen schließen", s:30, d:"Entspannen, nicht drücken."},
{t:"Blinzeln", s:20, d:"Locker und bewusst blinzeln."},
{t:"Fernblick", s:60, d:"In die Ferne schauen, nichts fixieren."},
{t:"Palmieren", s:60, d:"Hände warm auf Augen legen."}
];
}

// ================= DECISION =================
function buildPlan(){

if(state === "sticky") return ["sticky"];
if(state === "overload") return ["palmieren"];

if(state === "dry") return ["blinzeln_fern"];

if(context === "screen") return ["blinzeln_fern"];
if(context === "stress") return ["palmieren"];
if(context === "nature") return ["fernblick"];

return ["blinzeln"];
}

// ================= FLOW =================
function startFlow(){

let steps = [];

if(phase === "morning"){
steps = morningRoutine();
phase = "day"
localStorage.setItem("phase", phase);
}
else{
let plan = buildPlan();
for(let p of plan){
steps = steps.concat(build(p));
}
}

updatePhaseUI();

document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");

run(steps,0);
}

// ================= BUILD =================
function build(type){

if(type==="sticky"){
return [
{t:"Augen schließen",s:30,d:"Kein Reiben."},
{t:"Wärme",s:60,d:"Hände auflegen."},
{t:"Lösen",s:20,d:"Langsam blinzeln."},
{t:"Fernblick",s:40,d:"Nicht fixieren."}
];
}

if(type==="palmieren"){
return [{
t:"Palmieren",
s:60,
d:"Augen schließen, Hände warm, kein Druck."
}];
}

if(type==="blinzeln_fern"){
return [
{t:"Blinzeln",s:15,d:"Locker blinzeln."},
{t:"Fernblick",s:40,d:"Blick weich halten, nicht fixieren."}
];
}

if(type==="fernblick"){
return [{
t:"Fernblick",
s:40,
d:"In die Ferne schauen ohne Fokus."
}];
}

return [{t:"Blinzeln",s:20,d:"Locker blinzeln."}];
}

// ================= RUN =================
function run(steps,i){

if(i>=steps.length){
document.getElementById("timer").innerText="✓"
return;
}

let s=steps[i];

document.getElementById("title").innerText=s.t;
document.getElementById("desc").innerText=s.d;
document.getElementById("timer").innerText=s.s;

let sec=s.s;

interval=setInterval(()=>{

sec--;
document.getElementById("timer").innerText=sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}

},1000);
}

// ================= FEEDBACK =================
function finish(ok){

let key = buildPlan()[0];

if(!stats[key]) stats[key]={good:0,bad:0};

ok ? stats[key].good++ : stats[key].bad++;

localStorage.setItem("eyeStats57",JSON.stringify(stats));

abort();
}

// ================= NIGHT =================
function goodNight(){
phase = "morning"
localStorage.setItem("phase", phase);
updatePhaseUI();
alert("Gute Nacht. Morgen startet wieder die Morgenroutine.");
}

// ================= CONTROL =================
function abort(){
clearInterval(interval);
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

function updatePreview(){
let p = buildPlan();
document.getElementById("preview").innerText =
"Vorschlag: " + p.join(" + ");
}

updateUI();
updatePreview();

</script>

</body>
</html>
