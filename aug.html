<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen v1.9</title>
<style>
:root { --p: #2c3e50; --s: #27ae60; --bg: #fdfcfb; }
body { font-family: sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; }
.card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
button { border: none; padding: 20px; border-radius: 20px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 10px 0; font-weight: 600; }
.btn-start { background: var(--s); color: white; }
.btn-stop { background: #95a5a6; color: white; }
.timer-val { font-size: 4.5rem; color: #d35400; margin: 20px 0; font-weight: 200; }
.hidden { display: none; }
</style>
</head>
<body>

<h1>MeineAugen v1.9</h1>

<div id="main-menu" class="card">
<p id="status">Status: Standby</p>
<button id="work-btn" class="btn-start" onclick="toggleWorkMode()">🛡️ Begleiter (Test: 30s)</button>
<button style="background: #eee;" onclick="startRoutine('morgen')">☀️ Morgen-Ruhe</button>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title">Pause</h2>
<div class="timer-val" id="timer-display">--</div>
</div>

<audio id="silent-audio" loop>
<source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav">
</audio>

<script>
let isWorkModeActive = false;
let workDurationSec = 30; // ZUM TESTEN AUF 30 SEKUNDEN GESETZT
let timerTimeout;
const synth = window.speechSynthesis;

function speak(text, callback) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
utter.rate = 0.8;
if (callback) utter.onend = callback;
synth.speak(utter);
}

function toggleWorkMode() {
const btn = document.getElementById('work-btn');
const audio = document.getElementById('silent-audio');

if (!isWorkModeActive) {
isWorkModeActive = true;
btn.innerText = "🛑 Stoppen"
btn.className = "btn-stop"
document.getElementById('status').innerText = "Begleiter aktiv (Warte 30s)..."
// Hack: Spiele lautloses Audio ab, um den Standby zu verhindern
audio.play().catch(e => console.log("Audio-Autoplay geblockt"));
speak("Begleiter aktiv. Ich melde mich in 30 Sekunden.");
scheduleNext();
} else {
isWorkModeActive = false;
btn.innerText = "🛡️ Begleiter (Test: 30s)"
btn.className = "btn-start"
audio.pause();
clearTimeout(timerTimeout);
document.getElementById('status').innerText = "Status: Aus"
}
}

function scheduleNext() {
if (!isWorkModeActive) return;
clearTimeout(timerTimeout);
timerTimeout = setTimeout(() => {
startRoutine('break');
}, workDurationSec * 1000);
}

function startRoutine(type) {
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
const steps = [
{ t: "Dunkelpause", s: 10, v: "Pause! Augen zu und Dunkelheit genießen." },
{ t: "Ferne", s: 10, v: "Jetzt sanft in die Ferne schauen." }
];
runStep(steps, 0);
}

function runStep(steps, index) {
if (index >= steps.length) {
speak("Pause beendet.", () => {
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
if (isWorkModeActive) scheduleNext();
});
return;
}
const s = steps[index];
document.getElementById('ex-title').innerText = s.t;
speak(s.v);
let sec = s.s;
document.getElementById('timer-display').innerText = sec;
const int = setInterval(() => {
sec--;
document.getElementById('timer-display').innerText = sec;
if (sec <= 0) { clearInterval(int); runStep(steps, index + 1); }
}, 1000);
}
</script>
</body>
</html>
