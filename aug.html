<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Strategie 5.0">
<title>Strategie 5.0</title>
<style>
:root {
--bg-color: #f8f9fa;
--card-bg: #ffffff;
--primary: #e67e22;
--secondary: #2980b9;
--accent: #27ae60;
--danger: #c0392b;
--text: #2c3e50;
--subtext: #7f8c8d;
}
body {
font-family: -apple-system, sans-serif;
background-color: var(--bg-color);
color: var(--text);
display: flex; justify-content: center; align-items: center;
height: 100vh; margin: 0; overflow: hidden;
}
.container {
background: var(--card-bg);
padding: 2rem; border-radius: 30px;
box-shadow: 0 10px 30px rgba(0,0,0,0.1);
width: 90%; max-width: 350px; text-align: center;
}
h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
.phase-indicator {
color: #3498db; font-weight: bold; text-transform: uppercase;
letter-spacing: 1px; margin-bottom: 1.5rem; font-size: 0.9rem;
}
.btn {
display: block; width: 100%; padding: 15px; margin: 10px 0 5px 0;
border: none; border-radius: 15px; font-size: 1.1rem;
font-weight: 600; cursor: pointer; color: white; text-decoration: none;
}
.desc { font-size: 0.75rem; color: var(--subtext); margin-bottom: 15px; line-height: 1.2; }
.btn-morgen { background-color: var(--primary); }
.btn-training { background-color: var(--secondary); }
.btn-reset { background-color: #ecf0f1; color: var(--text); }
.btn-notfall { background-color: #fdf2f2; color: var(--danger); }
.row { display: flex; gap: 10px; }
.col { flex: 1; display: flex; flex-direction: column; }
.footer { margin-top: 1.5rem; font-size: 0.8rem; color: #95a5a6; }
</style>
</head>
<body>

<div class="container">
<h1>👁️ Strategie 5.0</h1>
<div id="phase" class="phase-indicator">Lade Phase...</div>

<button class="btn btn-morgen" onclick="alert('Masken-Zeit! 5 Min. Wärme genießen.')">☀️ Morgen-Routine</button>
<div class="desc">Aktivierung & Befeuchtung</div>

<button class="btn btn-training" onclick="alert('Fokus-Wechsel: 5x Daumen vs. Fernsicht.')">🚀 Training starten</button>
<div class="desc">Ziliarmuskel-Training gegen Starre</div>

<div class="row">
<div class="col">
<button class="btn btn-reset" onclick="location.reload()">🌿 Reset</button>
<div class="desc">Kurzer 20s Fernblick</div>
</div>
<div class="col">
<button class="btn btn-notfall" onclick="alert('STOPP! Sofort 2 Min. Palmieren.')">⚠️ Notfall</button>
<div class="desc">Bei Brennen oder Kopfschmerz</div>
</div>
</div>

<div class="footer">Status: System bereit</div>
</div>

<script>
function updatePhase() {
const hour = new Date().getHours();
const display = document.getElementById('phase');
if (hour < 9) display.innerText = "Early Bird"
else if (hour < 13) display.innerText = "Deep Focus Work"
else if (hour < 15) display.innerText = "Post-Lunch Reset"
else if (hour < 18) display.innerText = "Final Focus"
else display.innerText = "Regeneration"
}
updatePhase();
</script>

</body>
</html>
