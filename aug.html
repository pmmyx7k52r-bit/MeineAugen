<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.6.8</title>

<style>
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }

button {
padding:14px;
margin:6px;
width:100%;
border:none;
border-radius:15px;
font-weight:600;
font-size:15px;
background:#2980b9;
color:white;
opacity:0.6;
}

button.active {
opacity:1;
outline:3px solid #2ecc71;
}

.start { background:#27ae60; opacity:1; }

.hidden { display:none; }

#live { font-weight:bold; margin:10px 0; }
.timer { font-size:44px; color:#e67e22; margin:10px 0; }

.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ 5.6.8</h2>

<div id="live">Kontext + Zustand wählen</div>

<h4>Kontext</h4>
<button id="c_screen" onclick="setContext('screen')">📱 Bildschirm</button>
<button id="c_stress" onclick="setContext('stress')">⚠️ Stress</button>
<button id="c_nature" onclick="setContext('nature')">🌿 Natur</button>

<h4>Zustand</h4>
<button id="s_normal" onclick="setState('normal')">🙂 Normal</button>
<button id="s_dry" onclick="setState('dry')">😵 Trocken</button>
<button id="s_sticky" onclick="setState('sticky')">🟡 Verklebt</button>
<button id="s_over" onclick="setState('overload')">🔴 Überreizt</button>

<button class="start" onclick="startPlan()">▶ Start</button>

<div class="small" id="preview"></div>

</div>

<div id="run" class="card hidden">

<h3 id="title"></h3>
<div class="timer" id="timer"></div>
<p id="desc"></p>

<button onclick="finish(true)">👍 Gut</button>
<button onclick="finish(false)">⚠️ Schlecht</button>

<button onclick="abort()">Abbrechen</button>

</div>

<script>

// ================= STATE =================
let context = "screen"
let state = "normal"

let stats = JSON.parse(localStorage.getItem("eyeStats568")||"{}");
let interval;

// ================= UI LOCK =================
function updateUI(){

document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));

document.getElementById("c_"+context)?.classList.add("active");
document.getElementById("s_"+state)?.classList.add("active");
}

// ================= INPUT =================
function setContext(c){
context=c;
updateUI();
updatePreview();
}

function setState(s){
state=s;
updateUI();
updatePreview();
}

// ================= LEARNING =================
function weight(ex){

if(!stats[ex]) return 0;

let s = stats[ex];

return (s.good||0) - (s.bad||0);
}

// ================= DECISION =================
function buildPlan(){

if(state==="sticky") return ["sticky"];
if(state==="overload") return ["palmieren"];

let options = [];

if(context==="screen") options.push("blinzeln_fern");
if(context==="stress") options.push("palmieren");
if(context==="nature") options.push("fernblick");

if(state==="dry") options.unshift("blinzeln_fern");

// Learning bias
options.sort((a,b)=>weight(b)-weight(a));

return [options[0] || "blinzeln"];
}

// ================= PREVIEW =================
function updatePreview(){
let p = buildPlan();
document.getElementById("preview").innerText =
"→ Vorschlag: " + p.join(" + ");
}

// ================= START =================
function startPlan(){

let plan = buildPlan();
let steps = [];

for(let p of plan){
steps = steps.concat(build(p));
}

document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");

run(steps,0);
}

// ================= BUILD =================
function build(type){

if(type==="sticky"){
return [
{t:"Augen schließen",s:30,d:"Kein Reiben."},
{t:"Wärme",s:60,d:"Handflächen auflegen."},
{t:"Lösen",s:20,d:"Langsam blinzeln."},
{t:"Fernblick",s:40,d:"In die Ferne schauen."}
];
}

if(type==="palmieren"){
return [{
t:"Palmieren",
s:60,
d:"Augen schließen. Hände warm. Kein Druck."
}];
}

if(type==="blinzeln_fern"){
return [
{t:"Blinzeln",s:15,d:"Locker blinzeln."},
{t:"Fernblick",s:40,d:"Fokus lösen."}
];
}

if(type==="fernblick"){
return [{
t:"Fernblick",
s:40,
d:"Entspannt in die Ferne schauen."
}];
}

return [{t:"Blinzeln",s:20,d:"Locker blinzeln."}];
}

// ================= RUN =================
function run(steps,i){

if(i>=steps.length){
document.getElementById("timer").innerText="✓"
return;
}

let s=steps[i];

document.getElementById("title").innerText=s.t;
document.getElementById("desc").innerText=s.d;
document.getElementById("timer").innerText=s.s;

let sec=s.s;

interval=setInterval(()=>{

sec--;
document.getElementById("timer").innerText=sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}

},1000);
}

// ================= FEEDBACK =================
function finish(ok){

let ex = buildPlan()[0];

if(!stats[ex]) stats[ex]={good:0,bad:0};

if(ok) stats[ex].good++;
else stats[ex].bad++;

localStorage.setItem("eyeStats568",JSON.stringify(stats));

abort();
}

// ================= CONTROL =================
function abort(){
clearInterval(interval);
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

// init
updateUI();
updatePreview();

</script>

</body>
</html>
