<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 6.0.9</title>
<style>
/* Basis-Stile & Dark Mode Logik */
:root { --bg: #fdfcfb; --card: white; --text: #2c3e50; --accent: #2980b9; }
body.dark { --bg: #1a1a1a; --card: #2c2c2c; --text: #ecf0f1; --accent: #3498db; }

body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:15px; color: var(--text); transition: all 0.3s; margin: 0; }
.card { background: var(--card); padding:20px; border-radius:25px; max-width:420px; margin:20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

.grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
button.option { padding: 12px; border: none; border-radius: 15px; font-weight: 600; font-size: 13px; background: #bdc3c7; color: white; cursor: pointer; flex: 1 1 45%; transition: 0.2s; }
button.option.active { background: var(--accent); outline: 3px solid #2ecc71; }

.action-btn { padding: 16px; margin: 8px 0; width: 100%; border: none; border-radius: 18px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
.start-bed { background: #f1c40f; color: #2c3e50; }
.start-bath { background: #3498db; }
.start-run { background: #27ae60; }
.night { background: #2c3e50; }

.hidden { display: none; }
#mode-info { font-size: 11px; color: #7f8c8d; margin-bottom: 15px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 12px; text-transform: uppercase; }
#title { font-size: 28px; font-weight: bold; margin-top: 10px; }
#timer { font-size: 80px; color: #e67e22; font-weight: bold; margin: 15px 0; }
#desc { font-size: 19px; color: var(--text); min-height: 80px; padding: 0 10px; line-height: 1.4; }
</style>
</head>
<body id="body">

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.0.9</h2>
<div id="mode-info">Lädt...</div>

<div class="grid">
<button id="c_screen" class="option" onclick="STATE.setContext('screen')">📱 Screen</button>
<button id="c_allergy" class="option" onclick="STATE.setContext('allergy')">🤧 Allergie</button>
<button id="s_dry" class="option" onclick="STATE.setState('dry')">😵 Trocken</button>
<button id="s_overload" class="option" onclick="STATE.setState('overload')">🔴 Überreizt</button>
</div>

<hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
<button class="action-btn start-bed" onclick="startSession('bed')">🛌 1. Im Bett</button>
<button class="action-btn start-bath" onclick="startSession('bath')">🚿 2. Im Bad</button>
<button class="action-btn start-run" onclick="startSession('training')">🚀 Training starten</button>
<button class="action-btn night" onclick="startSession('night')">🌙 Gute Nacht</button>
<button onclick="STATE.reset()" style="background:none; border:none; color:#e74c3c; font-size:11px; cursor:pointer; margin-top:10px;">Daten zurücksetzen</button>
</div>

<div id="run" class="card hidden">
<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>
<button onclick="abort()" class="action-btn" style="background:#95a5a6;">Abbrechen</button>
</div>

<script>
const STATE = {
get() { return { state: localStorage.getItem("ma_state") || "normal", context: localStorage.getItem("ma_context") || "screen" }; },
setState(s) { localStorage.setItem("ma_state", s); this.updateUI(); },
setContext(c) { localStorage.setItem("ma_context", c); this.updateUI(); },
reset() { localStorage.clear(); location.reload(); },
updateUI() {
const data = this.get();
document.querySelectorAll('.option').forEach(btn => btn.classList.remove('active'));
document.getElementById("s_" + data.state)?.classList.add('active');
document.getElementById("c_" + data.context)?.classList.add('active');
document.getElementById("mode-info").innerText = `Kontext: ${data.context} | Status: ${data.state}`;
}
};
STATE.updateUI();

function step(t, s, v, split = false) { return {t, s, v, split}; }

function buildPlan(type) {
const {state, context} = STATE.get();

if(type === 'bed') {
return [
step("Ruhe", 15, "Lass die Augen geschlossen. Atme tief durch die Nase ein."),
step("Dehnen & Gähnen", 30, "Strecke dich im Bett. Gähne tief und herzhaft."),
step("Wärme", 45, "Reibe deine Hände warm und lege sie sanft auf die Augen."),
step("Blinzeln", 15, "Öffne die Augen und blinzle ganz locker.")
];
}
if(type === 'bath') {
return [
step("Wärme-Kompresse", 40, "Halte ein warmes Tuch auf deine Augen."),
step("Lidmassage", 30, "Streiche sanft oben nach unten und unten nach oben."),
step("Reinigung", 20, "Spüle die Augen vorsichtig mit klarem Wasser ab."),
step("Fernblick", 30, "Schau kurz entspannt in die Ferne.")
];
}
if(context === 'allergy') {
return [
step("Kühlung", 30, "Kühles Tuch auflegen. Nicht reiben."),
step("Ruhe", 20, "Augen geschlossen halten. Reiz minimieren."),
step("Sanftes Blinzeln", 20, "Leicht blinzeln. Nicht pressen."),
step("Fernblick", 30, "Entspannt in die Ferne schauen.")
];
}
if(state === "dry") {
return [
step("Wärme", 40, "Warme Hände auf die Augen legen."),
step("Lidmassage", 30, "Sanft ausstreichen oben nach unten und unten nach oben."),
step("Blinzeln", 20, "Langsam und vollständig blinzeln."),
step("Fernblick", 30, "In die Ferne schauen.")
];
}
if(type === 'night') {
return [
step("Palmieren", 45, "Hände auflegen. Dunkelheit genießen."),
step("Gähnen", 20, "Kiefer locker lassen."),
step("Ruhe", 15, "Augen geschlossen halten. Gute Nacht.")
];
}
if(state === "overload" || context === "stress") {
return [
step("Großes Schwingen", 45, "Drehe den Oberkörper locker von links nach rechts. Der Blick gleitet entspannt mit."), // split entfernt
step("Palmieren", 30, "Hände auflegen und tief durchatmen."),
step("Weicher Blick", 20, "Ohne Fokus in die Ferne schauen.")
];
}
return [
step("Blinzeln", 15, "Locker blinzeln."),
step("Nah-Fern", 30, "Daumen und fernen Punkt im Wechsel fokussieren."),
step("Acht malen", 24, "Liegende Acht mit den Augen verfolgen.", true)
];
}

let interval;
function speak(text, cb) {
if(!window.speechSynthesis) { cb?.(); return; }
speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.lang = "de-DE"
u.rate = 0.95;
u.onend = () => cb?.();
speechSynthesis.speak(u);
}

function startSession(type) {
const steps = buildPlan(type);
if(type === 'bed' || type === 'night') document.getElementById("body").classList.add("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps, 0);
}

function run(steps, i) {
if(i >= steps.length) {
document.getElementById("timer").innerText = "✓"
speak("Fertig.");
setTimeout(abort, 3000);
return;
}
const s = steps[i];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
speak(s.v, () => {
let sec = s.s;
let half = Math.floor(s.s / 2);
document.getElementById("timer").innerText = sec;
interval = setInterval(() => {
sec--;
document.getElementById("timer").innerText = sec;
if(s.split && sec === half) speak("Jetzt Richtungswechsel.");
if(sec <= 0) { clearInterval(interval); run(steps, i + 1); }
}, 1000);
});
}

function abort() {
clearInterval(interval);
if(window.speechSynthesis) speechSynthesis.cancel();
document.getElementById("body").classList.remove("dark");
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}
</script>
</body>
</html>
