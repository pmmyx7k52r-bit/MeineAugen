<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Strategie 5.0">
<title>Strategie 5.0 - Augen-Wächter</title>
<style>
:root {
--bg-color: #f8f9fa;
--card-bg: #ffffff;
--primary: #e67e22; /* Morgen-Routine */
--secondary: #2980b9; /* Training */
--accent: #27ae60; /* Reset */
--danger: #c0392b; /* Notfall */
--text: #2c3e50;
}

body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
background-color: var(--bg-color);
color: var(--text);
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
overflow: hidden;
}

.container {
background: var(--card-bg);
padding: 2rem;
border-radius: 30px;
box-shadow: 0 10px 30px rgba(0,0,0,0.1);
width: 90%;
max-width: 350px;
text-align: center;
}

h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
.phase-indicator {
color: #3498db;
font-weight: bold;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 1.5rem;
font-size: 0.9rem;
}

.btn {
display: block;
width: 100%;
padding: 15px;
margin: 10px 0;
border: none;
border-radius: 15px;
font-size: 1.1rem;
font-weight: 600;
cursor: pointer;
transition: transform 0.1s;
color: white;
text-decoration: none;
}

.btn:active { transform: scale(0.98); }

.btn-morgen { background-color: var(--primary); }
.btn-training { background-color: var(--secondary); }
.btn-reset { background-color: #ecf0f1; color: var(--text); flex: 1; margin-right: 5px; }
.btn-notfall { background-color: #fdf2f2; color: var(--danger); flex: 1; margin-left: 5px; }

.row { display: flex; justify-content: space-between; }

.footer { margin-top: 2rem; font-size: 0.8rem; color: #95a5a6; }
.status-dot { color: #27ae60; }
</style>
</head>
<body>

<div class="container">
<h1>👁️ Strategie 5.0</h1>
<div id="phase" class="phase-indicator">Lade Phase...</div>

<button class="btn btn-morgen" onclick="alert('Wärmemaske auf! 5 Min. Entspannung.')">☀️ Morgen-Routine</button>
<button class="btn btn-training" onclick="alert('Starte 3D-Fokus Training...')">🚀 Training starten</button>

<div class="row">
<button class="btn btn-reset" onclick="location.reload()">🌿 Reset</button>
<button class="btn btn-notfall" onclick="alert('NOTFALL: 2 Min. Palmieren & Maske kühlen!')">⚠️ Notfall</button>
</div>

<div class="footer">
Level: <span class="status-dot">Normal</span> &nbsp;&nbsp;&nbsp; Score reset
</div>
</div>

<script>
function updatePhase() {
const now = new Date();
const hour = now.getHours();
const min = now.getMinutes();
const time = hour + min/60;
const display = document.getElementById('phase');

if (time >= 6 && time < 9) {
display.innerText = "Early Bird"
} else if (time >= 9 && time < 12) {
display.innerText = "Deep Focus Work"
} else if (time >= 12 && time < 14) {
display.innerText = "Post-Lunch Reset"
} else if (time >= 14 && time < 17) {
display.innerText = "Final Focus"
} else {
display.innerText = "Offline / Regeneration"
}
}

updatePhase();
// Alle 1 Minute aktualisieren
setInterval(updatePhase, 60000);
</script>

</body>
</html>
