<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Augen Coach</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<h1>👁️ Augen Coach</h1>

<div class="box">
<h2 id="mode">Bereit</h2>
<h1 id="timer">07:00</h1>
</div>

<button onclick="start()">Start</button>
<button onclick="reset()">Reset</button>

<div class="box">
<h3>Augenstatus</h3>
<button class="good" onclick="feedback('gut')">Gut</button>
<button class="warn" onclick="feedback('mittel')">Mittel</button>
<button class="bad" onclick="feedback('schlecht')">Schlecht</button>
</div>

<script src="app.js"></script>

</body>
</html>
