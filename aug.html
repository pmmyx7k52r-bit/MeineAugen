<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeineAugen 6.5.0 - Final Core</title>
<style>
:root { --bg: #f4f1ee; --card: white; --text: #2c3e50; --accent: #2980b9; --gray: #bdc3c7; --active: #2ecc71; --shaolin: #e67e22; }
@media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #121212; --text: #dcdcdc; --accent: #3498db; --gray: #333; } }
body.dark { --bg: #000; --card: #111; --text: #eee; }
body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:10px; color: var(--text); transition: 0.3s; margin: 0; touch-action: manipulation; }
.card { background: var(--card); padding:15px; border-radius:30px; max-width:440px; margin:10px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
#morning-sub { display: none; gap: 8px; margin: 10px 0; }
h4 { margin: 12px 0 8px 0; font-size: 11px; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; padding: 0 5px; }
button.option { padding: 10px 2px; border: none; border-radius: 12px; font-weight: 600; font-size: 10px; background: var(--gray); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-height: 55px; }
button.option span { font-size: 18px; margin-bottom: 3px; pointer-events: none; }
button.option.active { background-color: var(--accent) !important; outline: 3px solid var(--active); transform: scale(1.05); }
.action-btn { padding: 18px; margin: 6px 0; width: 100%; border: none; border-radius: 22px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
.start-morning { background: #f1c40f; color: #2c3e50; }
.start-run { background: #27ae60; margin-top: 10px; }
.shaolin-btn { background: var(--shaolin); border: 2px solid #d35400; }
.pause-btn { background: #e67e22 !important; margin-bottom: 5px; }
#timer { font-size: 90px; color: #e67e22; font-weight: bold; margin: 5px 0; }
#desc { font-size: 18px; min-height: 180px; padding: 0 15px; line-height: 1.6; display: flex; align-items: center; justify-content: center; font-weight: 500; color: var(--text); }
.hidden { display: none !important; }
</style>
</head>
<body onload="init()">

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.5.0</h2>
<div id="mode-info" style="font-size:10px; margin-bottom:10px; font-weight:bold; color:#7f8c8d;">BEREIT</div>

<button type="button" onclick="toggleMorning()" class="action-btn start-morning">☀️ Morgen-Routine <span id="arrow">▼</span></button>
<div id="morning-sub">
<button type="button" onclick="startSession('bed')" class="action-btn" style="background:#f39c12; flex:1; border-radius:15px;">🛌 Bett</button>
<button type="button" onclick="startSession('bath')" class="action-btn" style="background:#3498db; flex:1; border-radius:15px;">🚿 Bad</button>
</div>

<button type="button" onclick="startSession('shaolin')" class="action-btn shaolin-btn">🧘 Shaolin Fokus (Schärfung)</button>

<h4>Kontext</h4>
<div class="grid">
<button type="button" id="c_screen" onclick="setOpt('ctx', 'screen')" class="option"><span>📱</span>Screen</button>
<button type="button" id="c_nature" onclick="setOpt('ctx', 'nature')" class="option"><span>🌳</span>Natur</button>
<button type="button" id="c_stress" onclick="setOpt('ctx', 'stress')" class="option"><span>⚖️</span>Stress</button>
<button type="button" id="c_allergy" onclick="setOpt('ctx', 'allergy')" class="option"><span>🤧</span>Allergie</button>
</div>

<h4>Zustand</h4>
<div class="grid">
<button type="button" id="s_normal" onclick="setOpt('st', 'normal')" class="option"><span>✅</span>OK</button>
<button type="button" id="s_dry" onclick="setOpt('st', 'dry')" class="option"><span>😵</span>Trocken</button>
<button type="button" id="s_tired" onclick="setOpt('st', 'tired')" class="option"><span>🔴</span>Müde</button>
<button type="button" id="s_light" onclick="setOpt('st', 'light')" class="option"><span>🔆</span>Licht</button>
</div>

<button type="button" onclick="startSession('train')" class="action-btn start-run">🚀 Training starten</button>
<button type="button" onclick="startSession('night')" class="action-btn" style="background:#2c3e50;">🌙 Gute Nacht</button>
</div>

<div id="run" class="card hidden">
<div id="title" style="font-weight:bold; font-size: 22px; color: var(--accent);"></div>
<div id="timer">...</div>
<div id="desc"></div>
<button type="button" id="pauseToggle" onclick="togglePause()" class="action-btn pause-btn">Pause</button>
<button type="button" onclick="abort()" class="action-btn" style="background:#95a5a6;">Abbrechen</button>
</div>

<script>
var curCtx = "none", curSt = "normal"
var timer, isPaused = false, currentSec = 0, currentSteps = [], currentIndex = 0;
var sessionHistory = [];
var isSpeaking = false;

function init() {
try {
curCtx = localStorage.getItem("ma_ctx") || "none"
curSt = localStorage.getItem("ma_st") || "normal"
} catch(e) {}
updateUI();
}

function updateUI() {
var opts = document.getElementsByClassName('option');
for (var i = 0; i < opts.length; i++) { opts[i].classList.remove('active'); }
if (document.getElementById("c_" + curCtx)) document.getElementById("c_" + curCtx).classList.add('active');
if (document.getElementById("s_" + curSt)) document.getElementById("s_" + curSt).classList.add('active');
document.getElementById("mode-info").innerText = "MODUS: " + curCtx.toUpperCase() + " | STATUS: " + curSt.toUpperCase();
}

function setOpt(type, val) {
if (type === 'ctx') curCtx = (curCtx === val) ? "none" : val;
else curSt = val;
try { localStorage.setItem("ma_ctx", curCtx); localStorage.setItem("ma_st", curSt); } catch(e) {}
updateUI();
}

function toggleMorning() {
var s = document.getElementById('morning-sub');
var isHidden = (window.getComputedStyle(s).display === 'none');
s.style.display = isHidden ? 'flex' : 'none';
document.getElementById('arrow').innerText = isHidden ? "▲" : "▼"
}

// Grundregel: Blinzeln ist erlaubt, außer 'starre=true'
function step(t, s, v, split, starre) { return {t: t, s: s, v: v, split: !!split, starre: !!starre}; }

var lib = {
neuro: [
step("Zifferblatt", 46, "Blinzle locker. Blicke dann auf 12, 3, 6 und 9 Uhr. Der Kopf bleibt absolut still.", true),
step("Peripherie", 40, "Schau geradeaus und blinzle normal. Wackle mit den Fingern am Sichtfeldrand. Nimm die Bewegung wahr.", true),
step("Große Schaukel", 45, "Stehe locker, blinzle weich. Schwinge den Körper sanft von links nach rechts. Lass die Umgebung fließen.")
],
shaolin: [
step("Shaolin-Punkt", 50, "Atme tief. Fixiere einen winzigen Punkt. Versuche, die Details 'aufzusaugen'. Blinzle nur, wenn es absolut nötig ist.", false, true),
step("Auge des Adlers", 40, "Wähle ein Ziel in der Ferne. Zoome Details weich heran. Blinzle zwischendurch bewusst, um zu entspannen."),
step("Qi-Sammeln", 60, "Reibe die Hände extrem heiß. Lege sie auf die Augen und ziehe die Energie nach innen. Genieße das Schwarz.")
],
entsp: [
step("Palmieren", 60, "Blinzle einmal tief. Decke dann die Augen lichtdicht ab. Atme ruhig in die Dunkelheit."),
step("Lidrand-Pflege", 50, ""), // Wird dynamisch gefüllt
step("Gähnen", 25, "Gähne weit und tief. Lass den Unterkiefer komplett locker. Entspannt das ganze Gesicht.")
],
blinz: [
step("Schmetterling", 25, "Blinzle ganz schnell, locker und federleicht wie ein Schmetterling. Befeuchtet sofort.")
],
akko: [
step("Posaune", 40, "Halte einen Text ganz nah vors Auge. Wenn er scharf ist, blicke blitzartig in die Ferne. Wechsel bei Schärfe. Blinzle bei jedem Wechsel.")
]
};

function getRndUnique(pool) {
var avail = pool.filter(function(s) { return sessionHistory.indexOf(s.t) === -1; });
var picked = avail.length > 0 ? avail[Math.floor(Math.random() * avail.length)] : pool[0];
// Dynamischer Text für Lidrand-Pflege basierend auf Wärme-Historie
if (picked.t === "Lidrand-Pflege") {
picked.v = (sessionHistory.indexOf("Wärme") !== -1 || curCtx === 'bath')
? "Nutze die Vorwärmung: Streiche am Oberlid von oben nach unten, am Unterlid von unten nach oben zur Lidkante aus. Sanft drücken, nicht reiben."
: "Ohne Vorwärmung: Mache kleine, kreisende Bewegungen am Lidrand oder nutze kurzes Palmieren zum Aufwärmen. Nicht drücken."
}
sessionHistory.push(picked.t);
return picked;
}

function buildPlan(type) {
sessionHistory = [];
// Shaolin Spezial
if (type === 'shaolin') return [lib.shaolin[0], lib.shaolin[1], lib.shaolin[2]];
// Morgen/Nacht Routinen
if (type === 'bed') return [step("Ankommen", 15, "Augen zu. Atme ruhig."), lib.entsp[0], lib.blinz[0]];
if (type === 'bath') {
sessionHistory.push("Wärme");
return [
step("Wärme", 90, "Lege ein warmes Tuch auf die Augen (ca. 40 Grad). Das verflüssigt das Sekret in den Drüsen."),
getRndUnique([lib.entsp[1]]), // Lidrand-Pflege mit Wärme-Text
step("Reinigung", 30, "Wische sanft mit einem feuchten Pad von außen nach innen über die Lidkante."),
lib.blinz[0]
];
}
if (type === 'night') return [lib.entsp[0], step("Kiefer-Lockerung", 30, "Lass den Unterkiefer ganz locker hängen. Blinzle entspannt.")];
// Medizinische Notfälle (Licht/Allergie)
if (curCtx === 'allergy') return [step("Kühlung", 40, "Kühles Tuch auflegen. Nicht reiben."), step("Augenruhe", 40, "Augen geschlossen halten."), lib.blinz[0]];
if (curSt === 'light') return [step("Reiz-Stopp", 45, "Augen sofort fest schließen. Lichtquelle meiden."), lib.entsp[0]];

// Dynamisches Training
var p = [];
if (curCtx === 'nature' && curSt === 'normal') {
p = [lib.shaolin[1], lib.akko[0], lib.neuro[2]]; // Adler, Posaune, Schaukel
}
else if (curCtx === 'stress') {
p = [lib.neuro[2], lib.entsp[2], lib.entsp[0]]; // Schaukel, Gähnen, Palmieren
}
else if (curSt === 'dry' || curCtx === 'screen') {
p = [lib.blinz[0], getRndUnique(lib.entsp), lib.akko[0]]; // Schmetterling, Entspann, Posaune
}
else if (curSt === 'tired') {
p = [lib.entsp[0], lib.neuro[1], lib.blinz[0]]; // Palmieren, Peripherie, Schmetterling
}
else {
// Normales OK-Training
p = [getRndUnique(lib.neuro), lib.akko[0], getRndUnique(lib.entsp)];
}
return p;
}

function speak(txt, cb) {
if (!window.speechSynthesis) { if (cb) cb(); return; }
speechSynthesis.cancel();
isSpeaking = true;
var u = new SpeechSynthesisUtterance(txt);
u.lang = "de-DE"
u.onend = function() {
isSpeaking = false;
if (cb) cb();
};
speechSynthesis.speak(u);
}

function startSession(type) {
currentSteps = buildPlan(type);
currentIndex = 0;
isPaused = false;
document.getElementById("pauseToggle").innerText = "Pause"
// Dark Mode für spezifische Übungen
if (['night','bed','bath','light','shaolin'].indexOf(type) !== -1 || curSt === 'light') document.body.classList.add("dark");
else document.body.classList.remove("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
runNextStep();
}

function togglePause() {
isPaused = !isPaused;
document.getElementById("pauseToggle").innerText = isPaused ? "Weiter" : "Pause"
if (isPaused) {
clearInterval(timer);
speechSynthesis.cancel(); // Stoppt Sprache bei Pause
} else {
startTimer();
}
}

function runNextStep() {
if (currentIndex >= currentSteps.length) {
document.getElementById("timer").innerText = "✓"
speak("Training beendet. Blinzle entspannt.", function() { setTimeout(abort, 2000); });
return;
}
var s = currentSteps[currentIndex];
document.getElementById("title").innerText = s.t;
// Blinzel-Hinweis hinzufügen
var desc = s.v;
if (!s.starre) desc += " (Blinzeln erlaubt)"
document.getElementById("desc").innerText = desc;
document.getElementById("timer").innerText = "..."
// Timer startet erst, NACHDEM die Sprachausgabe fertig ist
speak(s.v, function() {
currentSec = s.s;
startTimer();
});
}

function startTimer() {
clearInterval(timer);
if (isSpeaking) return; // Sicherheitsnetz
document.getElementById("timer").innerText = currentSec;
timer = setInterval(function() {
if (!isPaused) {
currentSec--;
document.getElementById("timer").innerText = currentSec;
var s = currentSteps[currentIndex];
// Split-Timer für Peripherie/Zifferblatt
if (s.split && currentSec === Math.floor(s.s / 2)) {
speak("Jetzt Seite oder Richtung wechseln.");
}
if (currentSec <= 0) {
clearInterval(timer);
currentIndex++;
runNextStep();
}
}
}, 1000);
}

function abort() {
clearInterval(timer);
speechSynthesis.cancel();
document.body.classList.remove("dark");
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}
</script>
</body>
</html>
