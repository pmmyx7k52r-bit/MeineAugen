<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.6.6</title>

<style>
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }
button { padding:14px; margin:6px; width:100%; border:none; border-radius:15px; font-weight:600; }
.primary { background:#2980b9; color:white; }
.hidden{display:none;}
#live { font-weight:bold; margin:10px 0; }
.timer { font-size:44px; color:#e67e22; margin:10px 0; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ 5.6.6</h2>

<div id="live">Was trifft gerade zu?</div>

<h4>Kontext</h4>
<button onclick="setContext('screen')" class="primary">📱 Bildschirm</button>
<button onclick="setContext('stress')" class="primary">⚠️ Stress / Fokus</button>
<button onclick="setContext('nature')" class="primary">🌿 Natur / Ruhe</button>

<h4>Augenzustand</h4>
<button onclick="setState('normal')" class="primary">🙂 Normal</button>
<button onclick="setState('dry')" class="primary">😵 Trocken / müde</button>
<button onclick="setState('sticky')" class="primary">🟡 Verklebt / schwer öffnen</button>
<button onclick="setState('overload')" class="primary">🔴 Überreizt</button>

</div>

<div id="run" class="card hidden">

<h3 id="title"></h3>
<div class="timer" id="timer"></div>
<p id="desc"></p>

<button onclick="finish()">✔️ Fertig</button>
<button onclick="abort()">Abbrechen</button>

</div>

<script>

// ================= STATE =================
let context = "screen"
let state = "normal"
let interval;

// ================= SPEECH =================
let synth = window.speechSynthesis;

function speak(t){
if(!synth) return;
synth.cancel();
let u=new SpeechSynthesisUtterance(t);
u.lang="de-DE"
synth.speak(u);
}

// ================= INPUT =================
function setContext(c){
context=c;
recommend();
}

function setState(s){
state=s;
recommend();
}

// ================= DECISION ENGINE =================
function decide(){

// 🔴 AKUT-ZUSTAND HAT PRIORITÄT
if(state === "sticky") return "sticky"
if(state === "overload") return "palmieren"
if(state === "dry") return "blinzeln_fern"

// 🌞 KONTEXTBASIS
if(context === "screen") return "blinzeln_fern"
if(context === "stress") return "palmieren"
if(context === "nature") return "fernblick"

return "blinzeln"
}

// ================= RECOMMEND =================
function recommend(){

let ex = decide();

let map = {
sticky: "Empfehlung: Verklebt → Reset",
palmieren: "Empfehlung: Palmieren",
blinzeln_fern: "Empfehlung: Blinzeln + Fernblick",
fernblick: "Empfehlung: Fernblick",
blinzeln: "Empfehlung: Blinzeln"
};

document.getElementById("live").innerText = map[ex];

currentExercise = ex;
}

// ================= START =================
let currentExercise=""

function start(){

document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");

let steps = build(currentExercise);

run(steps,0);
}

// ================= BUILD EXERCISES =================
function build(type){

if(type==="sticky"){
speak("Augen nicht reiben. Erst beruhigen.");

return [
{t:"Augen schließen", s:30, d:"Augen geschlossen halten. Kein Reiben."},
{t:"Wärme", s:60, d:"Handflächen warmreiben und auflegen."},
{t:"Lösen", s:20, d:"2–3x langsam blinzeln."},
{t:"Fernblick", s:40, d:"In die Ferne schauen."}
];
}

if(type==="palmieren"){
speak("Augen schließen. Hände warmreiben.");

return [{
t:"Palmieren",
s:60,
d:"Augen schließen. Hände warmreiben. Locker auflegen. Kein Druck."
}];
}

if(type==="blinzeln_fern"){
speak("Blinzeln und Fernblick.");

return [
{t:"Blinzeln", s:15, d:"Locker blinzeln."},
{t:"Fernblick", s:40, d:"In die Ferne schauen."}
];
}

if(type==="fernblick"){
speak("In die Ferne schauen.");

return [{
t:"Fernblick",
s:40,
d:"Augen entspannen und in die Ferne schauen."
}];
}

return [{
t:"Blinzeln",
s:20,
d:"Locker blinzeln."
}];
}

// ================= RUN =================
function run(steps,i){

if(i>=steps.length){
document.getElementById("timer").innerText="✓"
speak("Fertig");
return;
}

let s=steps[i];

document.getElementById("title").innerText=s.t;
document.getElementById("desc").innerText=s.d;
document.getElementById("timer").innerText=s.s;

let sec=s.s;

interval=setInterval(()=>{

sec--;
document.getElementById("timer").innerText=sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}

},1000);
}

// ================= CONTROL =================
function finish(){
abort();
}

function abort(){
clearInterval(interval);
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

</script>

</body>
</html>
