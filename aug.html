<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeineAugen 5.1.7</title>
<style>
:root { --p: #2c3e50; --s: #2980b9; --a: #e67e22; --d: #c0392b; --bg: #fdfcfb; --sub: #7f8c8d; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; margin: 0; -webkit-user-select: none; }
.card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
button { border: none; padding: 18px; border-radius: 20px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 8px 0; font-weight: 700; transition: transform 0.1s; display: block; -webkit-tap-highlight-color: transparent; }
button:active { transform: scale(0.96); opacity: 0.8; }
.btn-training { background: var(--s); color: white; }
.btn-morgen { background: #f39c12; color: white; }
.btn-reset { background: #ecf0f1; color: var(--p); }
.btn-emergency { background: #c0392b; color: white; }
.desc { font-size: 0.75rem; color: var(--sub); margin-bottom: 12px; line-height: 1.2; }
.timer-val { font-size: 4.5rem; color: var(--a); margin: 10px 0; font-weight: 200; }
#final-feedback { display: none; padding-top: 10px; }
.fb-btn { width: 46%; font-size: 1.5rem; padding: 12px; display: inline-block; margin: 5px 1%; border-radius: 15px; color: white; border: none; }
.hidden { display: none !important; }
#stats-bar { font-size: 0.75rem; color: var(--sub); margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
#ex-desc { font-size: 1.1rem; min-height: 4em; display: flex; align-items: center; justify-content: center; line-height: 1.4; padding: 0 10px; }
#stats-view { display: none; margin-top: 15px; text-align: left; background: #f8f9fa; padding: 12px; border-radius: 15px; font-size: 0.75rem; }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1 style="margin:0;">👁️ Strategie 5.1.7</h1>
<p id="day-phase" style="font-size: 0.8rem; color: var(--s); font-weight: 700; margin-bottom: 20px; text-transform: uppercase;">Lade...</p>
<button class="btn-morgen" onclick="startRoutine('morgen')">☀️ Morgen-Routine</button>
<div class="desc">Wärme & Ölfluss</div>

<button class="btn-training" onclick="startRoutine('break')">🚀 Training starten</button>
<div class="desc">Dynamischer Fokus & Mobilisation</div>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
<div>
<button class="btn-reset" onclick="startRoutine('reset')">🌿 Reset</button>
<div class="desc">Weicher Fokus</div>
</div>
<div>
<button class="btn-emergency" onclick="startRoutine('emergency')">⚠️ Notfall</button>
<div class="desc">Sofort-Hilfe</div>
</div>
</div>

<div id="stats-bar">
<span onclick="toggleStats()" style="cursor:pointer; background:#eee; padding:5px 10px; border-radius:10px;">📊 Analyse</span>
<span>Stress: <b id="stress-lvl">...</b></span>
<span onclick="resetScore()" style="cursor:pointer">Reset</span>
</div>
<div id="stats-view"></div>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title" style="color: var(--s); margin-bottom:0;">--</h2>
<div class="timer-val" id="timer-display">--</div>
<p id="ex-desc"></p>
<div id="final-feedback">
<p style="font-size: 0.85rem; color: var(--sub);">Wie fühlen sich die Augen jetzt an?</p>
<button class="fb-btn" style="background: #27ae60;" onclick="finishSession('ok')">👍</button>
<button class="fb-btn" style="background: #c0392b;" onclick="finishSession('bad')">⚠️</button>
</div>
</div>

<script>
var synth = window.speechSynthesis;
var currentInterval = null;
var activeSteps = [];
var currentFocusExName = "Allgemein"
var stressScore = parseInt(localStorage.getItem('eyeStressScore')) || 0;
var history = [];
try {
var saved = localStorage.getItem('eyeHistory');
if (saved) history = JSON.parse(saved);
} catch(e) { history = []; }

function getDayPhase() {
var h = new Date().getHours();
if (h < 9) return { n: "EARLY BIRD", p: -2 };
if (h < 13) return { n: "DEEP FOCUS WORK", p: 0 };
if (h < 15) return { n: "POST-LUNCH RESET", p: 5 };
if (h < 18) return { n: "FINAL FOCUS", p: 8 };
return { n: "REGENERATION", p: 3 };
}

function updateUI() {
var phase = getDayPhase();
document.getElementById('day-phase').innerText = phase.n;
var lvl = document.getElementById('stress-lvl');
lvl.innerText = stressScore > 5 ? "Hoch" : "Normal"
lvl.style.color = stressScore > 5 ? '#c0392b' : '#27ae60';
}

function toggleStats() {
var view = document.getElementById('stats-view');
view.style.display = (view.style.display === "block") ? "none" : "block"
if (view.style.display === "block") renderStats(view);
}

function renderStats(container) {
if (!history || history.length === 0) {
container.innerHTML = "Keine Daten vorhanden."
return;
}
var stats = {};
for (var i = 0; i < history.length; i++) {
var item = history[i];
var name = item.ex || "Andere"
if (!stats[name]) stats[name] = { ok: 0, bad: 0 };
stats[name][item.f]++;
}
var html = "<b>Erfolg Fokus-Übungen:</b><br>"
for (var ex in stats) {
var total = stats[ex].ok + stats[ex].bad;
var rate = Math.round((stats[ex].ok / total) * 100);
html += ex + ": " + rate + "% 👍 (" + total + "x)<br>"
}
container.innerHTML = html;
}

function resetScore() {
if(confirm("Daten löschen?")) {
localStorage.clear();
location.reload();
}
}

function speak(text, callback) {
if (!synth) { if(callback) callback(); return; }
synth.cancel();
var utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
utter.rate = 1.0;
var safetyTimer = setTimeout(() => {
if(callback) { callback(); callback = null; }
}, 1500);

utter.onend = function() {
clearTimeout(safetyTimer);
if(callback) { callback(); callback = null; }
};
synth.speak(utter);
}

function startRoutine(type) {
if(currentInterval) clearInterval(currentInterval);
var phase = getDayPhase();
var p = Math.min(10, Math.floor(stressScore * 1.2) + phase.p);
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
document.getElementById('final-feedback').style.display = "none"

var rand = Math.random();
var focusEx;
if (rand < 0.33) {
focusEx = { t: "Mikro-Kreise", s: 30, v: "Kleine langsame Kreise. Richtungswechsel folgt.", d: "Sanfte Mobilisation", switch: true };
currentFocusExName = "Kreise"
} else if (rand < 0.66) {
focusEx = { t: "Die Acht", s: 30, v: "Male eine liegende Acht. Richtungswechsel folgt.", d: "Koordination", switch: true };
currentFocusExName = "Acht"
} else {
focusEx = { t: "Nah-Fern", s: 30, v: "Wechsle zwischen Daumen und Ferne.", d: "Akkommodation" };
currentFocusExName = "Nah-Fern"
}

if(type === 'morgen') currentFocusExName = "Morgen"
if(type === 'reset') currentFocusExName = "Reset"
if(type === 'emergency') currentFocusExName = "Notfall"

var steps = {
break: [
{ t: "Blinzeln", s: 15, v: "Locker blinzeln.", d: "Befeuchten" },
{ t: "Weicher Fokus", s: Math.max(20, 40 - p), v: "In die Ferne schauen.", d: "Entspannung" },
focusEx,
{ t: "Palmieren", s: Math.max(30, 30 + p), v: "Augen mit Händen abdecken.", d: "Regeneration" }
],
morgen: [
{ t: "Wärme", s: 60, v: "Warme Kompresse auflegen.", d: "Vorbereitung" },
{ t: "Massage", s: 30, v: "Lidränder sanft ausstreichen.", d: "Ölfluss" }
],
reset: [{ t: "Ferne", s: 20, v: "20 Sekunden in die Ferne.", d: "Quick Reset" }],
emergency: [
{ t: "Lid-Massage", s: 30, v: "Sanft Lidkanten massieren.", d: "Tränenfilm" },
{ t: "Palmieren", s: 120, v: "2 Minuten Dunkelheit.", d: "System-Reset" }
]
};
activeSteps = steps[type] || steps.break;
runStep(0);
}

function runStep(index) {
if (index >= activeSteps.length) {
if (navigator.vibrate) navigator.vibrate(200);
document.getElementById('timer-display').innerText = "✓"
document.getElementById('final-feedback').style.display = "block"
speak("Training beendet.");
return;
}
var s = activeSteps[index];
document.getElementById('ex-title').innerText = s.t;
document.getElementById('ex-desc').innerText = s.d;
document.getElementById('timer-display').innerText = s.s;
speak(s.v, function() {
var sec = s.s;
var switched = false;
currentInterval = setInterval(function() {
sec--;
if(sec >= 0) document.getElementById('timer-display').innerText = sec;
if (s.switch && sec === 15 && !switched) {
switched = true;
if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
speak("Jetzt die Richtung wechseln.");
}
if (sec <= 0) {
clearInterval(currentInterval);
runStep(index + 1);
}
}, 1000);
});
}

function finishSession(state) {
if (state === 'bad') stressScore = Math.min(10, stressScore + 2);
else stressScore = Math.max(0, stressScore - 1);
history.push({
t: Date.now(),
f: state,
ex: currentFocusExName || "Allgemein"
});
if (history.length > 50) history.shift();
localStorage.setItem('eyeStressScore', stressScore.toString());
localStorage.setItem('eyeHistory', JSON.stringify(history));
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
updateUI();
}

updateUI();
</script>
</body>
</html>
