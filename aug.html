<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.6.5</title>

<style>
:root { --s:#2980b9; --a:#e67e22; --d:#c0392b; }
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }
button { padding:15px; margin:6px; width:100%; border:none; border-radius:15px; font-weight:bold; }
.btn { background:var(--s); color:white; }
.hidden{display:none;}
#live{margin:10px 0;font-weight:bold;}
.timer{font-size:48px;color:var(--a);}
</style>
</head>

<body>

<div id="menu" class="card">
<h2>👁️ 5.6.5</h2>

<div id="live">Bereit</div>

<button class="btn" onclick="start('morgen')">☀️ Morgenroutine</button>
<button class="btn" onclick="runRecommendation()">Empfehlung ausführen</button>
<button onclick="showStats()">📊 Analyse</button>
</div>

<div id="run" class="card hidden">
<h3 id="title"></h3>
<div id="timer" class="timer"></div>
<p id="desc"></p>

<button onclick="abort()">Abbrechen</button>

<div id="fb" class="hidden">
<button onclick="finish('good')">👍</button>
<button onclick="finish('neutral')">😐</button>
<button onclick="finish('bad')">⚠️</button>
</div>
</div>

<div id="stats" class="card hidden"></div>

<script>

// ================= SPEECH =================
let synth = window.speechSynthesis;

function speak(t){
if(!synth) return;
synth.cancel();
let u=new SpeechSynthesisUtterance(t);
u.lang="de-DE"
synth.speak(u);
}

// ================= STATE =================
let stats = JSON.parse(localStorage.getItem('stats565')||"{}");
let currentExercise=""

// ================= DAY RESET =================
let today = new Date().toDateString();
let lastDay = localStorage.getItem("day");

if(today !== lastDay){
localStorage.setItem("day", today);
localStorage.removeItem("morningDone");
}

// ================= SCORE =================
function score(ex){
if(!stats[ex]) return 0;
let s=stats[ex];
return (s.good||0) - (s.bad||0);
}

// ================= STATE DETECTION =================
function getState(){

let bad = 0;
let good = 0;

for(let ex in stats){
good += stats[ex].good||0;
bad += stats[ex].bad||0;
}

if(bad > good + 2) return "overload"
if(bad > good) return "dry"
if(good > bad + 2) return "stable"

return "normal"
}

// ================= RECOMMENDATION =================
function recommend(){

if(!localStorage.getItem("morningDone")){
currentExercise = "morgen"
setLive("➡️ Morgenroutine fehlt");
return;
}

let state = getState();

let plan = {
overload: "Palmieren",
dry: "Blinzeln+Fernblick",
normal: "Blinzeln",
stable: "Fernblick"
};

currentExercise = plan[state];

let map = {
"Palmieren":"Empfehlung: Palmieren (Ruhe)",
"Blinzeln+Fernblick":"Empfehlung: Blinzeln + Fernblick",
"Blinzeln":"Empfehlung: Blinzeln",
"Fernblick":"Empfehlung: In die Ferne schauen"
};

setLive(map[currentExercise]);
}

function setLive(t){
document.getElementById("live").innerText=t;
speak(t);
}

recommend();

// ================= ACTION =================
function runRecommendation(){
if(!currentExercise) start("Blinzeln");
else start(currentExercise);
}

// ================= START =================
function start(type){

document.getElementById('menu').classList.add('hidden');
document.getElementById('run').classList.remove('hidden');
document.getElementById('fb').classList.add('hidden');

let steps=[];

if(type==="morgen"){

localStorage.setItem("morningDone","true");

steps=[
{
t:"Augen schließen",
s:40,
d:"Augen vollständig schließen. Kein Licht zulassen."
},
{
t:"Blinzeln",
s:20,
d:"Locker blinzeln. Keine Spannung."
},
{
t:"Wärme",
s:60,
d:"Warme Kompresse auf geschlossene Augen legen."
},
{
t:"Massage",
s:30,
d:"Lidränder sanft ausstreichen."
}
];

speak("Morgenroutine starten");
}

if(type==="Palmieren"){
steps=[{
t:"Palmieren",
s:60,
d:"Augen schließen. Hände warmreiben. Handflächen locker auf Augen legen. Kein Druck. Komplett abdunkeln. Ruhig atmen."
}];

speak("Augen schließen. Hände warmreiben. Locker auflegen.");
}

if(type==="Blinzeln"){
steps=[{
t:"Blinzeln",
s:20,
d:"Locker blinzeln ohne Druck."
}];

speak("Locker blinzeln.");
}

if(type==="Blinzeln+Fernblick"){
steps=[
{
t:"Blinzeln",
s:15,
d:"Locker blinzeln."
},
{
t:"Fernblick",
s:40,
d:"In die Ferne schauen. Augen entspannen."
}
];

speak("Blinzeln und dann in die Ferne schauen.");
}

if(type==="Fernblick"){
steps=[{
t:"Fernblick",
s:40,
d:"Ruhig in die Ferne schauen. Augen entspannen."
}];

speak("In die Ferne schauen.");
}

currentExercise=type;
run(steps,0);
}

// ================= RUN =================
let interval;

function run(steps,i){

if(i>=steps.length){
document.getElementById('timer').innerText="✓"
document.getElementById('fb').classList.remove('hidden');
speak("Fertig");
return;
}

let s=steps[i];

document.getElementById('title').innerText=s.t;
document.getElementById('desc').innerText=s.d;
document.getElementById('timer').innerText=s.s;

let sec=s.s;

interval=setInterval(()=>{
sec--;
document.getElementById('timer').innerText=sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}
},1000);
}

// ================= CONTROL =================
function abort(){
clearInterval(interval);
document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

// ================= FEEDBACK =================
function finish(fb){

if(!stats[currentExercise]) stats[currentExercise]={good:0,neutral:0,bad:0};
stats[currentExercise][fb]++;

localStorage.setItem('stats565',JSON.stringify(stats));

document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');

recommend();
}

// ================= STATS =================
function showStats(){

document.getElementById('menu').classList.add('hidden');
let box=document.getElementById('stats');
box.classList.remove('hidden');

let html="<h3>Analyse</h3>"

for(let ex in stats){
let s=stats[ex];
let total=s.good+s.bad+s.neutral;
let rate=Math.round((s.good/total)*100);
html+=ex+": "+rate+"% ("+total+")<br>"
}

html+="<br><button onclick='back()'>Zurück</button>"

box.innerHTML=html;
}

function back(){
document.getElementById('stats').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

</script>

</body>
</html>
