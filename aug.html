<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeineAugen 6.3.5</title>
<style>
:root { --bg: #f4f1ee; --card: white; --text: #2c3e50; --accent: #2980b9; --gray: #bdc3c7; --active: #2ecc71; }
body.dark { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --gray: #444; }
body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:10px; color: var(--text); transition: 0.3s; margin: 0; touch-action: manipulation; }
.card { background: var(--card); padding:15px; border-radius:30px; max-width:440px; margin:10px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
#morning-sub { max-height: 0; overflow: hidden; transition: 0.3s; display: flex; gap: 8px; }
#morning-sub.open { max-height: 120px; margin: 10px 0; }
h4 { margin: 12px 0 8px 0; font-size: 11px; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; padding: 0 5px; }
button.option { padding: 12px 2px; border: none; border-radius: 12px; font-weight: 600; font-size: 10px; background: var(--gray); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-height: 55px; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
button.option span { font-size: 18px; margin-bottom: 3px; pointer-events: none; }
button.option.active { background-color: var(--accent) !important; color: white !important; outline: 3px solid var(--active) !important; transform: scale(1.05); }
.action-btn { padding: 18px; margin: 6px 0; width: 100%; border: none; border-radius: 22px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
.start-morning { background: #f1c40f; color: #2c3e50; }
.start-run { background: #27ae60; margin-top: 10px; }
.night { background: #2c3e50; }
#timer { font-size: 80px; color: #e67e22; font-weight: bold; margin: 5px 0; }
#desc { font-size: 18px; min-height: 140px; padding: 0 20px; line-height: 1.5; display: flex; align-items: center; justify-content: center; font-weight: 500; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.3.5</h2>
<div id="mode-info" style="font-size:10px; margin-bottom:10px; font-weight:bold; color:#7f8c8d;">LÄDT...</div>

<div class="morning-section">
<button type="button" id="btn-morning" class="action-btn start-morning">☀️ Morgen-Routine <span id="arrow">▼</span></button>
<div id="morning-sub">
<button type="button" id="btn-bed" class="action-btn" style="background:#f39c12; flex:1; border-radius:15px; border:none; color:white; font-weight:bold;">🛌 Bett</button>
<button type="button" id="btn-bath" class="action-btn" style="background:#3498db; flex:1; border-radius:15px; border:none; color:white; font-weight:bold;">🚿 Bad</button>
</div>
</div>

<h4>Kontext</h4>
<div class="grid">
<button type="button" id="c_screen" class="option"><span>📱</span>Bildschirm</button>
<button type="button" id="c_nature" class="option"><span>🌳</span>Natur</button>
<button type="button" id="c_stress" class="option"><span>⚖️</span>Stress</button>
<button type="button" id="c_allergy" class="option"><span>🤧</span>Allergie</button>
</div>

<h4>Zustand</h4>
<div class="grid">
<button type="button" id="s_normal" class="option"><span>✅</span>OK</button>
<button type="button" id="s_dry" class="option"><span>😵</span>Trocken</button>
<button type="button" id="s_tired" class="option"><span>🔴</span>Müde</button>
<button type="button" id="s_light" class="option"><span>🔆</span>Licht</button>
</div>

<button type="button" id="btn-train" class="action-btn start-run">🚀 Training starten</button>
<button type="button" id="btn-night" class="action-btn night">🌙 Gute Nacht</button>
</div>

<div id="run" class="card hidden">
<div id="title" style="font-weight:bold; font-size: 20px; margin-bottom: 5px; color: var(--accent);"></div>
<div id="timer">...</div>
<div id="desc"></div>
<button type="button" id="btn-abort" class="action-btn" style="background:#95a5a6; margin-top:20px;">Abbrechen</button>
</div>

<script>
var curCtx = getStore("ma_ctx", "none");
var curSt = getStore("ma_st", "normal");
var timer;

function getStore(k, def) { try { return localStorage.getItem(k) || def; } catch(e) { return def; } }
function setStore(k, v) { try { localStorage.setItem(k, v); } catch(e) {} }

function updateUI() {
var btns = document.getElementsByClassName('option');
for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
if (curCtx !== "none") { document.getElementById("c_" + curCtx)?.classList.add('active'); }
document.getElementById("s_" + curSt)?.classList.add('active');
document.getElementById("mode-info").innerText = "MODUS: " + curCtx.toUpperCase() + " | STATUS: " + curSt.toUpperCase();
}

function setOpt(type, val) {
if (type === 'ctx') { curCtx = (curCtx === val) ? "none" : val; setStore("ma_ctx", curCtx); }
else { curSt = val; setStore("ma_st", curSt); }
updateUI();
}

function toggleMorning() {
var s = document.getElementById('morning-sub');
s.classList.toggle('open');
document.getElementById('arrow').innerText = s.classList.contains('open') ? "▲" : "▼"
}

function step(t, s, v, split) { return {t: t, s: s, v: v, split: !!split}; }

var lib = {
neuro: [
step("Zifferblatt", 46, "Stell dir ein großes Zifferblatt vor. Blicke nacheinander auf 12, 3, 6 und 9 Uhr. Der Kopf bleibt völlig still. Nach dem Signal die Richtung wechseln.", true),
step("Peripherie", 35, "Schau geradeaus. Wackle mit den Fingern am äußersten Sichtfeldrand. Nimm die Bewegung wahr, ohne direkt hinzusehen.")
],
smooth: [
step("Folgeblick", 40, "Strecke den Arm. Bewege den Daumen langsam in einem großen Kreis. Verfolge ihn flüssig mit den Augen. Nach dem Signal Richtung wechseln.", true)
],
akko: [
step("Fokus-Wechsel", 40, "Blicke auf deinen Daumen direkt vor der Nase bis er scharf ist. Dann blicke auf ein Detail in der Ferne. Warte auf die Schärfe.")
],
entsp: [
step("Palmieren", 60, "Hände warm reiben. Wölbe die Handflächen und decke die Augen lichtdicht ab. Kein Druck auf den Augapfel. Genieße die absolute Dunkelheit."),
step("Lid-Pflege", 40, "Oberlid sanft von oben nach unten streichen. Unterlid von unten nach oben. Kein Druck auf das Auge."),
step("Gähnen", 25, "Gähne ganz weit und tief. Lass den Unterkiefer locker hängen und entspanne die Gesichtszüge.")
],
blinz: [
step("Schmetterling", 25, "Blinzle ganz schnell, locker und federleicht, wie ein Schmetterling mit den Flügeln schlägt. Befeuchtet sofort.")
]
};

function getRnd(arr, last) {
let filtered = arr.filter(item => item.t !== (last ? last.t : ''));
return filtered[Math.floor(Math.random() * filtered.length)];
}

function buildPlan(type) {
if (type === 'bed') return [step("Ankommen", 20, "Augen zu. Atme ruhig."), lib.entsp[0], lib.blinz[0]];
if (type === 'bath') return [step("Wärme", 60, "Warmes Tuch auf die geschlossenen Augen legen."), lib.entsp[1], step("Reinigung", 20, "Augenlider vorsichtig mit klarem Wasser reinigen."), lib.blinz[0]];
if (type === 'night') return [lib.entsp[0], step("Kiefer-Entspannung", 30, "Lass den Unterkiefer ganz locker hängen. Zähne berühren sich nicht.")];
if (curCtx === 'allergy') return [step("Kühlung", 40, "Kühles, feuchtes Tuch auflegen. Nicht reiben."), step("Augenruhe", 40, "Augen geschlossen halten. Reize reduzieren."), lib.blinz[0]];
if (curSt === 'light') return [step("Reiz-Stopp", 40, "Augen sofort schließen."), lib.entsp[0]];

let plan = [];
if (curCtx === 'stress') { plan.push(getRnd(lib.neuro)); plan.push(lib.entsp[2]); plan.push(lib.entsp[0]); }
else if (curSt === 'dry' || curCtx === 'screen') { plan.push(lib.blinz[0]); plan.push(lib.entsp[1]); plan.push(getRnd(lib.akko)); }
else if (curSt === 'tired') { plan.push(lib.entsp[0]); plan.push(lib.entsp[1]); plan.push(lib.smooth[0]); }
else { plan.push(getRnd(lib.neuro)); plan.push(getRnd(lib.akko)); plan.push(lib.smooth[0]); }
return plan;
}

function speak(txt, cb) {
if (!window.speechSynthesis) { if (cb) cb(); return; }
speechSynthesis.cancel();
var u = new SpeechSynthesisUtterance(txt);
u.lang = "de-DE" u.onend = function() { if (cb) cb(); };
speechSynthesis.speak(u);
}

function startSession(type) {
var steps = buildPlan(type);
if (['night','bed','bath','light'].indexOf(type) !== -1 || curSt === 'light' || curCtx === 'allergy') document.body.classList.add("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps, 0);
}

function run(steps, i) {
if (i >= steps.length) { document.getElementById("timer").innerText = "✓" speak("Training beendet.", function() { setTimeout(abort, 2500); }); return; }
var s = steps[i];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
document.getElementById("timer").innerText = "..."
speak(s.v, function() {
var sec = s.s;
document.getElementById("timer").innerText = sec;
timer = setInterval(function() {
sec--; document.getElementById("timer").innerText = sec;
if (s.split && sec === Math.floor(s.s / 2)) speak("Jetzt in die andere Richtung.");
if (sec <= 0) { clearInterval(timer); run(steps, i + 1); }
}, 1000);
});
}

function abort() { clearInterval(timer); speechSynthesis.cancel(); document.body.classList.remove("dark"); document.getElementById("run").classList.add("hidden"); document.getElementById("menu").classList.remove("hidden"); }

document.getElementById('btn-morning').addEventListener('click', toggleMorning);
document.getElementById('btn-bed').addEventListener('click', () => startSession('bed'));
document.getElementById('btn-bath').addEventListener('click', () => startSession('bath'));
document.getElementById('btn-train').addEventListener('click', () => startSession('train'));
document.getElementById('btn-night').addEventListener('click', () => startSession('night'));
document.getElementById('btn-abort').addEventListener('click', abort);
document.querySelectorAll('.option').forEach(btn => { btn.addEventListener('click', () => { setOpt(btn.id.startsWith('c_')?'ctx':'st', btn.id.split('_')[1]); }); });

updateUI();
</script>
</body>
</html>
