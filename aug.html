<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.6</title>

<style>
body{font-family:-apple-system;text-align:center;background:#fdfcfb;}
.card{background:white;padding:20px;border-radius:20px;max-width:420px;margin:auto;}
button{padding:15px;margin:5px;width:100%;border:none;border-radius:15px;font-weight:bold;}
.hidden{display:none;}
.timer{font-size:50px;}
.warn{color:#c0392b;font-weight:bold;}
.good{color:#27ae60;font-weight:bold;}
</style>
</head>

<body>

<div id="menu" class="card">
<h2>👁️ 5.6</h2>

<div id="live"></div>

<button onclick="startManual()">Jetzt starten</button>
<button onclick="showStats()">📊 Analyse</button>
</div>

<div id="run" class="card hidden">
<h3 id="title"></h3>
<div id="timer" class="timer"></div>
<p id="desc"></p>

<button onclick="abort()">Abbrechen</button>

<div id="fb" class="hidden">
<button onclick="finish('good')">👍</button>
<button onclick="finish('neutral')">😐</button>
<button onclick="finish('bad')">⚠️</button>
</div>
</div>

<div id="stats" class="card hidden"></div>

<script>

let interval;
let stats = JSON.parse(localStorage.getItem('exStatsV4')||"{}");
let lastAction = parseInt(localStorage.getItem('lastAction')||Date.now());
let fatigue = 0;
let currentExercise=""

function save(){
localStorage.setItem('exStatsV4',JSON.stringify(stats));
localStorage.setItem('lastAction',Date.now());
}

function score(ex){
if(!stats[ex]) return 0;

let s=stats[ex];
let total=0;

for(let k in s){
total += (s[k].good||0) - (s[k].bad||0);
}

return total;
}

function recommend(){

let time = (Date.now()-lastAction)/60000;

fatigue = Math.min(10, time / 5); // steigt alle 5 min

let list=["Palmieren","Blinzeln","Wärme","NahFern"];

list.sort((a,b)=>score(b)-score(a));

let best = list[0];

let action = ""

if(fatigue < 2){
action = "Alles stabil"
} else if(fatigue < 5){
action = "Kurzpause: Blinzeln 20s"
best="Blinzeln"
} else if(fatigue < 8){
action = "Reset: Palmieren 60s"
best="Palmieren"
} else {
action = "Starke Belastung → Pause + Wärme"
best="Wärme"
}

document.getElementById("live").innerHTML =
"<div class='good'>"+action+"</div>"

currentExercise = best;
}

setInterval(recommend,3000);

function startManual(){
start(currentExercise || "Palmieren");
}

function start(ex){

document.getElementById('menu').classList.add('hidden');
document.getElementById('run').classList.remove('hidden');
document.getElementById('fb').classList.add('hidden');

let step;

if(ex==="Palmieren") step={t:"Palmieren",s:60,d:"Augen abdunkeln"};
if(ex==="Blinzeln") step={t:"Blinzeln",s:20,d:"Locker blinzeln"};
if(ex==="Wärme") step={t:"Wärme",s:60,d:"Warme Kompresse"};
if(ex==="NahFern") step={t:"Nah-Fern",s:30,d:"Nähe/Ferne wechseln"};

currentExercise = ex;

runStep(step);
}

function runStep(s){

document.getElementById('title').innerText=s.t;
document.getElementById('desc').innerText=s.d;
document.getElementById('timer').innerText=s.s;

let sec=s.s;

interval=setInterval(()=>{
sec--;
document.getElementById('timer').innerText=sec;

if(sec<=0){
clearInterval(interval);
document.getElementById('timer').innerText="✓"
document.getElementById('fb').classList.remove('hidden');
}
},1000);
}

function abort(){
clearInterval(interval);
document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

function finish(fb){

if(!stats[currentExercise]) stats[currentExercise]={neutral:{good:0,neutral:0,bad:0}};
stats[currentExercise].neutral[fb]++;

save();

document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

function showStats(){

document.getElementById('menu').classList.add('hidden');
let box=document.getElementById('stats');
box.classList.remove('hidden');

let html="<h3>Analyse</h3>"

for(let ex in stats){
let s=stats[ex].neutral;
let total=s.good+s.bad+s.neutral;
let rate=Math.round((s.good/total)*100);
html+=ex+": "+rate+"% ("+total+")<br>"
}

html+="<br><button onclick='back()'>Zurück</button>"

box.innerHTML=html;
}

function back(){
document.getElementById('stats').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

</script>

</body>
</html>
