<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.9.5</title>

<style>
body { font-family:-apple-system, sans-serif; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

button {
padding:14px; margin:6px; width:100%;
border:none; border-radius:15px;
font-weight:600; font-size:15px;
background:#2980b9; color:white; opacity:0.6;
cursor: pointer;
transition: opacity 0.2s;
}

button.active { opacity:1; outline:3px solid #2ecc71; }
.start { background:#27ae60; opacity:1; margin-top: 20px; }
.reset { background:#e74c3c; opacity:1; margin-top: 10px; }
.hidden { display:none; }

#mode { font-size:13px; color:#555; margin-bottom:10px; }
#runmode { font-size:13px; color:#999; margin-bottom:10px; }

#title { font-size:24px; font-weight: bold; margin-bottom: 10px; }
#timer { font-size:64px; color:#e67e22; font-weight: bold; margin: 20px 0; }
#desc { font-size:18px; color:#444; margin-bottom: 20px; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ MeineAugen 5.9.5</h2>
<div id="mode"></div>

<h4>Kontext</h4>
<button id="c_screen" onclick="STATE.setContext('screen')">📱 Bildschirm</button>
<button id="c_stress" onclick="STATE.setContext('stress')">⚠️ Stress</button>
<button id="c_nature" onclick="STATE.setContext('nature')">🌿 Natur</button>

<h4>Zustand</h4>
<button id="s_normal" onclick="STATE.setState('normal')">🙂 Normal</button>
<button id="s_dry" onclick="STATE.setState('dry')">😵 Trocken</button>
<button id="s_overload" onclick="STATE.setState('overload')">🔴 Überreizt</button>

<button class="start" onclick="startDay()">▶ Start</button>
<button class="reset" onclick="STATE.reset()">Reset</button>

</div>

<div id="run" class="card hidden">
<div id="runmode"></div>
<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>

<button onclick="abort()" style="background:#95a5a6; opacity:1;">Abbrechen</button>
</div>

<script>

/* =========================
ZENTRALER STATE
========================= */

const STATE = {

get(){
return {
state: localStorage.getItem("state") || "normal",
context: localStorage.getItem("context") || "screen"
};
},

setState(s){
localStorage.setItem("state", s);
this.updateUI();
},

setContext(c){
localStorage.setItem("context", c);
this.updateUI();
},

reset(){
localStorage.clear();
location.reload();
},

updateUI(){
let {state, context} = this.get();

// Alle aktiven Klassen entfernen
document.querySelectorAll("button").forEach(b=>{
b.classList.remove("active");
});

// Die richtigen Buttons markieren
document.getElementById("s_" + state)?.classList.add("active");
document.getElementById("c_" + context)?.classList.add("active");

document.getElementById("mode").innerText =
"Aktiv: " + state + " | " + context;
}
};

// Initialer Aufruf beim Laden
STATE.updateUI();

/* =========================
SPEECH
========================= */

function speak(text, cb){
if(!window.speechSynthesis){ cb?.(); return; }

speechSynthesis.cancel();

let u = new SpeechSynthesisUtterance(text);
u.lang = "de-DE"
u.rate = 1.0;

u.onend = ()=>cb?.();
speechSynthesis.speak(u);
}

/* =========================
PLAN
========================= */

function buildPlan(){
let {state, context} = STATE.get();

if(state === "overload"){
return [
step("Blinzeln", 10, "Ruhig blinzeln"),
step("Palmieren", 20, "Hände auflegen"),
step("Freier Blick", 20, "Blick weich lassen")
];
}

if(state === "dry"){
return [
step("Blinzeln", 15, "Ruhig blinzeln"),
step("Uhr", 20, "Oben rechts unten links"),
step("Fernblick", 30, "In die Ferne schauen")
];
}

if(context === "screen"){
return [
step("Blinzeln", 15, "Ruhig blinzeln"),
step("Uhr", 20, "Oben rechts unten links"),
step("Nah-Fern", 40, "Nah und fern wechseln"),
step("Freier Blick", 30, "Blick wandern lassen")
];
}

// ... weitere Bedingungen bleiben gleich
return [
step("Blinzeln", 15, "Ruhig blinzeln"),
step("Freier Blick", 30, "Blick wandern lassen")
];
}

/* =========================
RUN
========================= */

let interval;

function step(t,s,v){
return {t,s,v};
}

function startDay(){
let {state, context} = STATE.get();
document.getElementById("runmode").innerText = "Läuft: " + state + " | " + context;
runSteps(buildPlan());
}

function runSteps(steps){
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps, 0);
}

function run(steps, i){
if(i >= steps.length){
document.getElementById("timer").innerText = "✓"
document.getElementById("title").innerText = "Fertig!"
document.getElementById("desc").innerText = "Gut gemacht."
speak("Training abgeschlossen");
return;
}

let s = steps[i];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;

speak(s.v, ()=>{
let sec = s.s;
document.getElementById("timer").innerText = sec;

interval = setInterval(()=>{
sec--;
document.getElementById("timer").innerText = sec;

if(sec <= 0){
clearInterval(interval);
run(steps, i + 1);
}
}, 1000);
});
}

function abort(){
clearInterval(interval);
if(window.speechSynthesis) speechSynthesis.cancel();
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

</script>

</body>
</html>
