<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen v2.1</title>
<style>
:root { --p: #2c3e50; --s: #27ae60; --a: #e67e22; --d: #c0392b; --bg: #fdfcfb; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; }
.card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: 20px auto; }
button { border: none; padding: 18px; border-radius: 18px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 8px 0; font-weight: 600; }
.btn-main { background: var(--s); color: white; }
.btn-notif { background: #ecf0f1; color: var(--p); font-size: 0.9rem; }
.timer-val { font-size: 4.5rem; color: var(--a); margin: 15px 0; font-weight: 200; }
.hidden { display: none; }
.feedback-grid { display: flex; gap: 8px; margin-top: 15px; }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1>MeineAugen <span style="font-size: 0.8rem; color: var(--a);">v2.1</span></h1>
<button id="notif-btn" class="btn-notif" onclick="requestPermission()">🔔 Benachrichtigungen erlauben</button>
<hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
<button class="btn-main" id="work-btn" onclick="toggleWorkMode()">🛡️ Begleiter starten</button>
<button class="btn-emergency" style="background:#fff5f5; color:var(--d); border:1px solid #fed7d7;" onclick="triggerEmergency()">⚠️ Augen schlecht</button>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title">Pause</h2>
<p id="ex-desc">Augen schließen...</p>
<div class="timer-val" id="timer-display">--</div>
<div id="feedback-area" class="hidden">
<p>Wie geht es den Augen?</p>
<div class="feedback-grid">
<button style="flex:1; background:#eafaf1; color:#27ae60" onclick="processFeedback('gut')">Gut</button>
<button style="flex:1; background:#fef9e7; color:#f1c40f" onclick="processFeedback('mittel')">Mittel</button>
<button style="flex:1; background:#fdedec; color:#e74c3c" onclick="processFeedback('schlecht')">Schlecht</button>
</div>
</div>
</div>

<script>
let workDuration = 15;
let isWorkModeActive = false;
let timerTimeout;
const synth = window.speechSynthesis;

// 1. Berechtigung für Push-Nachrichten
function requestPermission() {
Notification.requestPermission().then(perm => {
if (perm === "granted") {
document.getElementById('notif-btn').innerText = "✅ Glocke aktiv"
document.getElementById('notif-btn').style.color = "#27ae60"
}
});
}

function speak(text, callback) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
utter.rate = 0.85;
if (callback) utter.onend = callback;
synth.speak(utter);
}

function toggleWorkMode() {
isWorkModeActive = !isWorkModeActive;
const btn = document.getElementById('work-btn');
if (isWorkModeActive) {
btn.innerText = "🛑 Begleiter stoppen"
btn.style.background = "#95a5a6"
scheduleNextPush();
speak("Begleiter aktiv. Ich melde mich per Nachricht.");
} else {
btn.innerText = "🛡️ Begleiter starten"
btn.style.background = "#27ae60"
clearTimeout(timerTimeout);
}
}

// 2. Der "Stupser" per Push-Nachricht
function scheduleNextPush() {
if (!isWorkModeActive) return;
clearTimeout(timerTimeout);
timerTimeout = setTimeout(() => {
if (Notification.permission === "granted") {
const n = new Notification("Augen-Pause!", {
body: "Zeit für 60 Sekunden Dunkelheit & Ferne.",
icon: "👁️"
});
n.onclick = () => { window.focus(); startRoutine('break'); };
}
// Akustisches Signal falls Tab offen
speak("Zeit für deine Augen-Pause.");
startRoutine('break');
}, workDuration * 60 * 1000);
}

function triggerEmergency() { startRoutine('emergency'); }

function startRoutine(type) {
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
document.getElementById('feedback-area').classList.add('hidden');
const flows = {
break: [
{ t: "Dunkelpause", d: "Augen zu. Pacing.", s: 40, v: "Schließe die Augen. Atme ruhig." },
{ t: "Weitblick", d: "In die Ferne schauen.", s: 20, v: "Jetzt sanft in die Ferne schauen." }
],
emergency: [
{ t: "Sofort-Stopp", d: "Dunkelheit.", s: 180, v: "Notstopp. Drei Minuten Ruhe." }
]
};
runStep(flows[type] || flows.break, 0);
}

function runStep(steps, index) {
if (index >= steps.length) {
document.getElementById('feedback-area').classList.remove('hidden');
speak("Wie fühlen sich die Augen an?");
return;
}
const s = steps[index];
document.getElementById('ex-title').innerText = s.t;
speak(s.v);
let sec = s.s;
const int = setInterval(() => {
document.getElementById('timer-display').innerText = sec;
if (sec <= 0) { clearInterval(int); runStep(steps, index + 1); }
sec--;
}, 1000);
}

function processFeedback(state) {
if (state === "schlecht") workDuration = Math.max(5, workDuration - 5);
else if (state === "gut") workDuration = Math.min(25, workDuration + 2);
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
if (isWorkModeActive) scheduleNextPush();
}
</script>
</body>
</html>
