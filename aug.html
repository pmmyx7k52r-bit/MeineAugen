<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Strategie 5.0.8</title>
<style>
:root { --p: #2c3e50; --s: #2980b9; --a: #e67e22; --d: #c0392b; --bg: #fdfcfb; --sub: #7f8c8d; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; margin: 0; }
.card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
button { border: none; padding: 18px; border-radius: 20px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 8px 0 2px 0; font-weight: 700; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
button:active { transform: scale(0.96); }
.btn-training { background: var(--s); color: white; }
.btn-morgen { background: #f39c12; color: white; }
.btn-reset { background: #ecf0f1; color: var(--p); }
.btn-emergency { background: #fff5f5; color: var(--d); }
.desc { font-size: 0.75rem; color: var(--sub); margin-bottom: 12px; line-height: 1.2; }
.timer-val { font-size: 4.5rem; color: var(--a); margin: 10px 0; font-weight: 200; }
#final-feedback, #stats-view { display: none; margin-top: 15px; }
.fb-btn { width: 46%; font-size: 1.5rem; padding: 12px; margin: 0 1%; border-radius: 15px; }
.hidden { display: none; }
#stats-bar { font-size: 0.75rem; color: var(--sub); margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; display: flex; justify-content: space-between; }
#ex-desc { font-size: 1.1rem; min-height: 4em; display: flex; align-items: center; justify-content: center; line-height: 1.4; padding: 0 10px; }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1 style="margin:0;">👁️ Strategie 5.0.8</h1>
<p id="day-phase" style="font-size: 0.8rem; color: var(--s); font-weight: 700; margin-bottom: 20px; text-transform: uppercase;"></p>
<button class="btn-morgen" onclick="startRoutine('morgen')">☀️ Morgen-Routine</button>
<div class="desc">Aktivierung & Ölfluss</div>

<button class="btn-training" onclick="startRoutine('break')">🚀 Training starten</button>
<div class="desc">Wechselnde Fokus-Übungen</div>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
<div class="col">
<button class="btn-reset" onclick="startRoutine('reset')">🌿 Reset</button>
<div class="desc">Weicher Fokus</div>
</div>
<div class="col">
<button class="btn-emergency" onclick="startRoutine('emergency')">⚠️ Notfall</button>
<div class="desc">Soforthilfe & Massage</div>
</div>
</div>

<div id="stats-bar">
<span onclick="toggleStats()" style="cursor:pointer">📊 Stats</span>
<span>Stress: <b id="stress-lvl">...</b></span>
<span onclick="resetScore()" style="cursor:pointer">Score reset</span>
</div>

<div id="stats-view">
<div id="stats-content" style="font-size: 0.75rem; color: var(--sub); background: #f8f9fa; padding: 10px; border-radius: 15px; margin-top: 10px;"></div>
</div>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title" style="color: var(--s); margin-bottom:0;">--</h2>
<div class="timer-val" id="timer-display">--</div>
<p id="ex-desc"></p>
<div id="final-feedback">
<p style="font-size: 0.85rem; color: var(--sub);">Wie fühlen sich die Augen jetzt an?</p>
<button class="fb-btn" style="background: #27ae60; color: white;" onclick="finishSession('ok')">👍</button>
<button class="fb-btn" style="background: var(--d); color: white;" onclick="finishSession('bad')">⚠️</button>
</div>
</div>

<script>
const synth = window.speechSynthesis;
let currentInterval, activeSteps = [], activeIndex = 0;
let stressScore = parseInt(localStorage.getItem('eyeStressScore')) || 0;
let history = JSON.parse(localStorage.getItem('eyeHistory')) || [];

function getDayPhase() {
const h = new Date().getHours();
if (h < 9) return { n: "EARLY BIRD", p: -2 };
if (h < 13) return { n: "DEEP FOCUS WORK", p: 0 };
if (h < 15) return { n: "POST-LUNCH RESET", p: 5 };
if (h < 18) return { n: "FINAL FOCUS", p: 8 };
return { n: "REGENERATION", p: 3 };
}

function updateUI() {
const phase = getDayPhase();
document.getElementById('day-phase').innerText = phase.n;
document.getElementById('stress-lvl').innerText = stressScore > 5 ? "Hoch" : "Normal"
document.getElementById('stress-lvl').style.color = stressScore > 5 ? '#c0392b' : '#27ae60';
}

function toggleStats() {
const view = document.getElementById('stats-view');
const content = document.getElementById('stats-content');
if (view.style.display === "block") {
view.style.display = "none"
} else {
view.style.display = "block"
const lastFive = history.slice(-5).reverse();
content.innerHTML = lastFive.length ?
lastFive.map(h => `${new Date(h.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}: ${h.r} (${h.f === 'ok' ? '👍' : '⚠️'})`).join('<br>') :
"Noch keine Daten vorhanden."
}
}

function resetScore() {
if(confirm("Daten wirklich zurücksetzen?")) {
stressScore = 0; history = [];
localStorage.setItem('eyeStressScore', 0);
localStorage.setItem('eyeHistory', JSON.stringify([]));
updateUI();
}
}

function speak(text, callback) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE'; utter.rate = 0.95; utter.onend = callback;
synth.speak(utter);
}

function finishSession(state) {
if (state === 'bad') { stressScore = Math.min(10, stressScore + 2); }
else { stressScore = Math.max(0, stressScore - 1); }
history.push({ t: Date.now(), f: state, r: document.getElementById('ex-title').dataset.routine });
if (history.length > 50) history.shift();
localStorage.setItem('eyeStressScore', stressScore);
localStorage.setItem('eyeHistory', JSON.stringify(history));
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
updateUI();
}

function startRoutine(type) {
clearInterval(currentInterval);
const phase = getDayPhase();
const p = Math.min(10, Math.floor(stressScore * 1.2) + phase.p);
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
document.getElementById('final-feedback').style.display = "none"
document.getElementById('ex-title').dataset.routine = type;

// Variation zwischen 3 Fokus-Übungen
const rand = Math.random();
let focusEx;
if (rand < 0.33) {
focusEx = { t: "Mikro-Kreise", s: 30, v: "Bewege deine Augen ganz langsam und klein im Kreis. Keine Spannung.", d: "Sanfte Mobilisation" };
} else if (rand < 0.66) {
focusEx = { t: "Die Acht", s: 30, v: "Male mit den Augen eine liegende Acht in die Ferne. Fließend und ohne Druck.", d: "Koordinationstraining" };
} else {
focusEx = { t: "Nah-Fern", s: 30, v: "Wechsle zwischen Daumen und Ferne. Halte kurz scharf.", d: "Akkommodations-Training" };
}

const steps = {
break: [
{ t: "Blinzeln", s: 15, v: "Locker blinzeln. Befeuchte deine Augen.", d: "Basis-Hydrierung" },
{ t: "Weicher Fokus", s: Math.max(25, 45 - p), v: "Such dir einen Punkt in der Ferne. Halte den Blick locker und wandere minimal um den Punkt herum.", d: "Dynamisches Sehen" },
focusEx,
{ t: "Palmieren", s: Math.max(30, 30 + p), v: "Wärme und Dunkelheit genießen.", d: "Tiefenregeneration" }
],
morgen: [
{ t: "Wärme", s: 60, v: "Kompresse auflegen.", d: "Poren öffnen" },
{ t: "Massage", s: 30, v: "Lidränder sanft ausstreichen.", d: "Ölfluss aktivieren" }
],
reset: [{ t: "Weicher Fokus", s: 20, v: "Ferne suchen, Blick locker lassen und minimal bewegen.", d: "Schneller Reset" }],
emergency: [
{ t: "Lid-Massage", s: 30, v: "Massiere sanft deine Lidkanten.", d: "Tränenfilm retten" },
{ t: "Palmieren", s: 120, v: "2 Minuten absolute Dunkelheit.", d: "System-Reset" }
]
};
activeSteps = steps[type] || steps.break;
runStep(0);
}

function runStep(index) {
activeIndex = index;
if (index >= activeSteps.length) {
if (navigator.vibrate) navigator.vibrate(200);
document.getElementById('final-feedback').style.display = "block"
speak("Training beendet. Wie fühlen sich deine Augen an?");
return;
}
const s = activeSteps[index];
document.getElementById('ex-title').innerText = s.t;
document.getElementById('ex-desc').innerText = s.d;
document.getElementById('timer-display').innerText = s.s;
speak(s.v, () => {
let sec = s.s;
currentInterval = setInterval(() => {
sec--;
document.getElementById('timer-display').innerText = sec;
if (sec <= 0) { clearInterval(currentInterval); runStep(index + 1); }
}, 1000);
});
}
updateUI();
</script>
</body>
</html>
