<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen v4.8 - Regulator</title>
<style>
:root { --p: #2c3e50; --s: #2980b9; --a: #e67e22; --d: #c0392b; --bg: #fdfcfb; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; }
.card { background: white; border-radius: 30px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
button { border: none; padding: 18px; border-radius: 20px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 8px 0; font-weight: 700; transition: transform 0.1s; }
button:active { transform: scale(0.96); }
.btn-training { background: var(--s); color: white; }
.btn-morgen { background: #f39c12; color: white; }
.btn-skip { background: #eee; color: #7f8c8d; font-size: 0.9rem; padding: 10px; margin-top: 10px; }
.timer-val { font-size: 4.5rem; color: var(--a); margin: 10px 0; font-weight: 200; }
#live-feedback, #skip-box { display: none; margin-top: 15px; }
.fb-btn { width: 46%; font-size: 1.5rem; padding: 12px; margin: 0 1%; border-radius: 15px; }
.hidden { display: none; }
#stats-bar { font-size: 0.75rem; color: #7f8c8d; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; }
#ex-desc { font-size: 1.1rem; min-height: 4em; display: flex; align-items: center; justify-content: center; line-height: 1.4; color: var(--p); }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1>👁️ Regulator 4.8</h1>
<button class="btn-morgen" onclick="startRoutine('morgen')">☀️ Morgen-Routine</button>
<button class="btn-training" onclick="startRoutine('break')">🚀 Aktiv-Training</button>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
<button style="background:#ecf0f1; color: #2c3e50;" onclick="startRoutine('reset')">🌿 Reset</button>
<button style="background:#fff5f5; color:var(--d);" onclick="startRoutine('emergency')">⚠️ Notfall</button>
</div>

<div id="stats-bar">
System-Belastung: <span id="stress-lvl">Berechne...</span> | 💧 Trink-Check
</div>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title" style="color: var(--s);">Bereit?</h2>
<div class="timer-val" id="timer-display">--</div>
<p id="ex-desc"></p>
<div id="live-feedback">
<button class="fb-btn" style="background: #27ae60; color: white;" onclick="liveCheck('ok')">👍</button>
<button class="fb-btn" style="background: var(--d); color: white;" onclick="liveCheck('bad')">⚠️</button>
</div>

<div id="skip-box">
<button class="btn-skip" onclick="skipStep()">⏭️ Übung überspringen</button>
</div>
</div>

<script>
const synth = window.speechSynthesis;
let currentInterval;
let activeSteps = [];
let activeIndex = 0;
let sessionBadCount = 0;
let stressScore = parseInt(localStorage.getItem('eyeStressScore')) || 0;

function updateUI() {
const label = stressScore > 4 ? "Erhöht" : "Normal"
document.getElementById('stress-lvl').innerText = label;
document.getElementById('stress-lvl').style.color = stressScore > 4 ? '#c0392b' : '#27ae60';
}
updateUI();

function speak(text, callback) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
utter.rate = 0.9;
utter.onend = callback;
synth.speak(utter);
}

function liveCheck(state) {
if (state === 'bad') {
sessionBadCount++;
stressScore = Math.min(10, stressScore + 2);
if (sessionBadCount >= 2) {
clearInterval(currentInterval);
speak("Belastung zu hoch. Wir beenden das Training sofort.", () => startRoutine('emergency'));
return;
}
} else {
sessionBadCount = 0;
stressScore = Math.max(0, stressScore - 1);
}
localStorage.setItem('eyeStressScore', stressScore);
updateUI();
}

function skipStep() {
clearInterval(currentInterval);
runStep(activeIndex + 1);
}

function startRoutine(type) {
clearInterval(currentInterval);
sessionBadCount = 0;
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
// Dämpfung: p darf max 15 sein (bei Score 10)
const p = Math.floor(stressScore * 1.5);

const steps = {
break: [
{ t: "1. Blinzeln", s: 15, v: "Locker blinzeln. Befeuchte deine Augen.", d: "Tränenfilm-Reset" },
{ t: "2. Weicher Fokus", s: Math.max(15, 45 - p), v: "Such dir einen Punkt in der Ferne. Halte den Blick ganz locker. Bewege deine Augen minimal um den Punkt herum. Nicht fixieren.", d: "👁️ Panorama & Fernsicht", fb: true },
{ t: "3. Lid-Refresh", s: 20, v: "Massiere ganz sanft die Lidkanten.", d: "Ölschicht-Pflege (Optional)", skip: true },
{ t: "4. Nah-Fern", s: Math.max(15, 35 - p), v: "Wechsle nun langsam zwischen deinem Finger und der Ferne.", d: "Ziliarmuskel-Training" },
{ t: "5. Palmieren", s: Math.max(30, 30 + p), v: "Hände warm reiben und die Dunkelheit genießen.", d: "Regeneration" }
],
morgen: [
{ t: "1. Vorwärmen", s: 60, v: "Wärme löst den Klebe-Effekt deiner Lider.", d: "Kompresse wirkt..." },
{ t: "2. Öffnen", s: 10, v: "Augen jetzt ganz vorsichtig öffnen.", d: "Sanftes Öffnen (8-10 Sek.)" },
{ t: "3. Massage", s: 40, v: "Streiche die Lidränder sanft aus.", d: "Ölschicht für den Tag" }
],
reset: [{ t: "Quick Reset", s: 60, v: "Schau entspannt in die Weite.", d: "Blick lösen" }],
emergency: [{ t: "Notstopp", s: 180, v: "Absolute Ruhe. Drei Minuten Dunkelheit.", d: "Regeneration erzwingen" }]
};
activeSteps = steps[type] || steps.break;
runStep(0);
}

function runStep(index) {
activeIndex = index;
if (index >= activeSteps.length) {
speak("Fertig.", () => {
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
});
return;
}
const s = activeSteps[index];
document.getElementById('ex-title').innerText = s.t;
document.getElementById('ex-desc').innerText = s.d;
document.getElementById('timer-display').innerText = s.s; // UX Fix: Timer sofort anzeigen
document.getElementById('live-feedback').style.display = s.fb ? "block" : "none"
document.getElementById('skip-box').style.display = s.skip ? "block" : "none"

speak(s.v, () => {
let sec = s.s;
currentInterval = setInterval(() => {
document.getElementById('timer-display').innerText = sec;
if (sec <= 0) { clearInterval(currentInterval); runStep(index + 1); }
sec--;
}, 1000);
});
}
</script>
</body>
</html>
