<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.9.4</title>

<style>
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }

button {
padding:14px; margin:6px; width:100%;
border:none; border-radius:15px;
font-weight:600; font-size:15px;
background:#2980b9; color:white; opacity:0.6;
}

button.active { opacity:1; outline:3px solid #2ecc71; }
.start { background:#27ae60; opacity:1; }
.night { background:#2c3e50; }
.hidden { display:none; }

#mode { font-size:13px; color:#555; margin-bottom:10px; }
#title { font-size:20px; }
#timer { font-size:42px; color:#e67e22; }
#desc { font-size:14px; color:#444; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ MeineAugen 5.9.4</h2>
<div id="mode"></div>

<div id="day-ui">

<h4>Kontext</h4>
<button id="c_screen" onclick="setContext('screen')">📱 Bildschirm</button>
<button id="c_stress" onclick="setContext('stress')">⚠️ Stress</button>

<h4>Zustand</h4>
<button id="s_normal" onclick="setState('normal')">🙂 Normal</button>
<button id="s_dry" onclick="setState('dry')">😵 Trocken</button>
<button id="s_over" onclick="setState('overload')">🔴 Überreizt</button>

<button class="start" onclick="startDay()">▶ Start</button>

</div>

</div>

<div id="run" class="card hidden">
<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>

<button onclick="abort()">Abbrechen</button>
</div>

<script>

let interval;

/* =========================
STATE HELPERS
========================= */

function getState(){
return localStorage.getItem("state") || "normal"
}

function getContext(){
return localStorage.getItem("context") || "screen"
}

function setState(s){
localStorage.setItem("state", s);
updateUI();
}

function setContext(c){
localStorage.setItem("context", c);
updateUI();
}

/* =========================
UI
========================= */

function updateUI(){

let state = getState();
let context = getContext();

document.querySelectorAll("button").forEach(b=>{
b.classList.remove("active");
});

document.getElementById("s_"+state)?.classList.add("active");
document.getElementById("c_"+context)?.classList.add("active");

document.getElementById("mode").innerText =
"Aktiv: " + state + " | " + context;
}

updateUI();

/* =========================
SPEECH
========================= */

function speak(text, cb){
if(!window.speechSynthesis){ cb?.(); return; }

speechSynthesis.cancel();

let u = new SpeechSynthesisUtterance(text);
u.lang = "de-DE"

u.onend = ()=>cb?.();

speechSynthesis.speak(u);
}

/* =========================
PLAN (ABSOLUT PRIORITY FIX)
========================= */

function buildPlan(){

let state = getState();
let context = getContext();

console.log("PLAN MIT:", state, context);

// 🔴 OVERLOAD HART
if(state === "overload"){
return [
step("Blinzeln",10,"Ruhig blinzeln"),
step("Palmieren",25,"Hände auflegen"),
step("Freier Blick",20,"Blick weich lassen")
];
}

if(state === "dry"){
return [
step("Blinzeln",15,"Ruhig blinzeln"),
step("Uhr",20,"Oben rechts unten links"),
step("Fernblick",30,"Fernblick")
];
}

if(context === "screen"){
return [
step("Blinzeln",15,"Ruhig blinzeln"),
step("Uhr",20,"Oben rechts unten links"),
step("Nah-Fern",40,"Nah und fern wechseln"),
step("Freier Blick",30,"Blick wandern lassen")
];
}

return [
step("Blinzeln",15,"Ruhig blinzeln"),
step("Freier Blick",30,"Blick wandern lassen")
];
}

/* =========================
RUN
========================= */

function step(t,s,v){
return {t,s,v};
}

function startDay(){
runSteps(buildPlan());
}

function runSteps(steps){
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps,0);
}

function run(steps,i){

if(i>=steps.length){
document.getElementById("timer").innerText="✓"
speak("Fertig");
return;
}

let s = steps[i];

document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;

speak(s.v, ()=>{

let sec = s.s;
document.getElementById("timer").innerText = sec;

interval = setInterval(()=>{
sec--;
document.getElementById("timer").innerText = sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}

},1000);
});
}

/* =========================
CONTROL
========================= */

function abort(){
clearInterval(interval);
speechSynthesis.cancel();
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

</script>

</body>
</html>
