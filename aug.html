<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen v3.0</title>
<style>
:root { --p: #2c3e50; --s: #27ae60; --bg: #fdfcfb; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; }
.card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
button { border: none; padding: 18px; border-radius: 20px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 10px 0; font-weight: 600; }
.btn-cal { background: #007aff; color: white; }
.btn-start { background: var(--s); color: white; }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1>👁️ MeineAugen v3.0</h1>
<p><i>iPhone-Hintergrund-Lösung</i></p>
<div style="margin: 20px 0; padding: 15px; background: #f0f7ff; border-radius: 15px;">
<label>Erinnerung alle: <b>20 Min.</b></label>
<button class="btn-cal" onclick="generateICS()">📅 In Kalender eintragen</button>
<small style="color: #666;">Erzeugt 8 Termine für die nächsten 3 Stunden.</small>
</div>

<hr style="border:0; border-top:1px solid #eee;">
<button class="btn-start" onclick="startRoutine('break')">▶️ Übung jetzt starten</button>
<button style="background:#eee;" onclick="startRoutine('morgen')">☀️ Morgen-Routine</button>
</div>

<div id="exercise-card" class="card hidden" style="display:none;">
<h2 id="ex-title">Übung läuft</h2>
<div id="timer" style="font-size: 4rem; color: #e67e22;">--</div>
</div>

<script>
const synth = window.speechSynthesis;

function speak(text, callback) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
if (callback) utter.onend = callback;
synth.speak(utter);
}

function generateICS() {
const interval = 20; // Minuten
const count = 8; // Anzahl der Pausen
let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//MeineAugen//DE\n"
let now = new Date();
for (let i = 1; i <= count; i++) {
let start = new Date(now.getTime() + i * interval * 60000);
let end = new Date(start.getTime() + 2 * 60000);
const stamp = start.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z"
icsContent += "BEGIN:VEVENT\n"
icsContent += `DTSTART:${stamp}\n`;
icsContent += `DTEND:${stamp}\n`;
icsContent += "SUMMARY:👁️ Augen-Pause einlegen!\n"
icsContent += "DESCRIPTION:Bitte kurz blinzeln und palmieren.\n"
icsContent += "BEGIN:VALARM\nTRIGGER:-PT0M\nACTION:DISPLAY\nDESCRIPTION:Augen-Pause\nEND:VALARM\n"
icsContent += "END:VEVENT\n"
}
icsContent += "END:VCALENDAR"

const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
const link = document.createElement('a');
link.href = window.URL.createObjectURL(blob);
link.download = "augen_pausen.ics"
link.click();
}

function startRoutine(type) {
document.getElementById('main-menu').style.display = 'none';
document.getElementById('exercise-card').style.display = 'block';
const steps = [
{ t: "Blinzeln", s: 20, v: "Bitte 20 Sekunden locker blinzeln." },
{ t: "Palmieren", s: 30, v: "Jetzt die Augen schließen und die Wärme genießen." }
];
runStep(steps, 0);
}

function runStep(steps, index) {
if (index >= steps.length) {
speak("Übung beendet.", () => {
document.getElementById('exercise-card').style.display = 'none';
document.getElementById('main-menu').style.display = 'block';
});
return;
}
const s = steps[index];
document.getElementById('ex-title').innerText = s.t;
speak(s.v);
let sec = s.s;
const int = setInterval(() => {
document.getElementById('timer').innerText = sec;
if (sec <= 0) { clearInterval(int); runStep(steps, index + 1); }
sec--;
}, 1000);
}
</script>
</body>
</html>
