<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeineAugen 6.3.14</title>
<style>
:root { --bg: #f4f1ee; --card: white; --text: #2c3e50; --accent: #2980b9; --gray: #bdc3c7; --active: #2ecc71; }
@media (prefers-color-scheme: dark) { :root { --bg: #000000; --card: #121212; --text: #dcdcdc; --accent: #3498db; --gray: #333; } }
body.dark { --bg: #000; --card: #111; --text: #eee; }
body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:10px; color: var(--text); transition: 0.3s; margin: 0; touch-action: manipulation; }
.card { background: var(--card); padding:15px; border-radius:30px; max-width:440px; margin:10px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
#morning-sub { display: none; gap: 8px; margin: 10px 0; }
h4 { margin: 12px 0 8px 0; font-size: 11px; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; padding: 0 5px; }
button.option { padding: 12px 2px; border: none; border-radius: 12px; font-weight: 600; font-size: 10px; background: var(--gray); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-height: 55px; }
button.option span { font-size: 18px; margin-bottom: 3px; pointer-events: none; }
button.option.active { background-color: var(--accent) !important; outline: 3px solid var(--active); transform: scale(1.05); }
.action-btn { padding: 18px; margin: 6px 0; width: 100%; border: none; border-radius: 22px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
.start-morning { background: #f1c40f; color: #2c3e50; }
.start-run { background: #27ae60; margin-top: 10px; }
.pause-btn { background: #e67e22 !important; margin-bottom: 10px; }
#timer { font-size: 90px; color: #e67e22; font-weight: bold; margin: 5px 0; }
#desc { font-size: 20px; min-height: 160px; padding: 0 20px; line-height: 1.5; display: flex; align-items: center; justify-content: center; font-weight: 500; }
.hidden { display: none !important; }
</style>
</head>
<body onload="init()">

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.3.14</h2>
<div id="mode-info" style="font-size:10px; margin-bottom:10px; font-weight:bold; color:#7f8c8d;">BEREIT</div>

<button type="button" onclick="toggleMorning()" class="action-btn start-morning">☀️ Morgen-Routine <span id="arrow">▼</span></button>
<div id="morning-sub">
<button type="button" onclick="startSession('bed')" class="action-btn" style="background:#f39c12; flex:1; border-radius:15px;">🛌 Bett</button>
<button type="button" onclick="startSession('bath')" class="action-btn" style="background:#3498db; flex:1; border-radius:15px;">🚿 Bad</button>
</div>

<h4>Kontext</h4>
<div class="grid">
<button type="button" id="c_screen" onclick="setOpt('ctx', 'screen')" class="option"><span>📱</span>Bildschirm</button>
<button type="button" id="c_nature" onclick="setOpt('ctx', 'nature')" class="option"><span>🌳</span>Natur</button>
<button type="button" id="c_stress" onclick="setOpt('ctx', 'stress')" class="option"><span>⚖️</span>Stress</button>
<button type="button" id="c_allergy" onclick="setOpt('ctx', 'allergy')" class="option"><span>🤧</span>Allergie</button>
</div>

<h4>Zustand</h4>
<div class="grid">
<button type="button" id="s_normal" onclick="setOpt('st', 'normal')" class="option"><span>✅</span>OK</button>
<button type="button" id="s_dry" onclick="setOpt('st', 'dry')" class="option"><span>😵</span>Trocken</button>
<button type="button" id="s_tired" onclick="setOpt('st', 'tired')" class="option"><span>🔴</span>Müde</button>
<button type="button" id="s_light" onclick="setOpt('st', 'light')" class="option"><span>🔆</span>Licht</button>
</div>

<button type="button" onclick="startSession('train')" class="action-btn start-run">🚀 Training starten</button>
<button type="button" onclick="startSession('night')" class="action-btn" style="background:#2c3e50;">🌙 Gute Nacht</button>
</div>

<div id="run" class="card hidden">
<div id="title" style="font-weight:bold; font-size: 22px; color: var(--accent);"></div>
<div id="timer">...</div>
<div id="desc"></div>
<button type="button" id="pauseToggle" onclick="togglePause()" class="action-btn pause-btn">Pause</button>
<button type="button" onclick="abort()" class="action-btn" style="background:#95a5a6;">Abbrechen</button>
</div>

<script>
var curCtx = "none"
var curSt = "normal"
var timer;
var isPaused = false;
var currentSec = 0;
var currentSteps = [];
var currentIndex = 0;

function init() {
try {
curCtx = localStorage.getItem("ma_ctx") || "none"
curSt = localStorage.getItem("ma_st") || "normal"
} catch(e) {}
updateUI();
}

function updateUI() {
var opts = document.getElementsByClassName('option');
for (var i = 0; i < opts.length; i++) { opts[i].classList.remove('active'); }
if (document.getElementById("c_" + curCtx)) document.getElementById("c_" + curCtx).classList.add('active');
if (document.getElementById("s_" + curSt)) document.getElementById("s_" + curSt).classList.add('active');
document.getElementById("mode-info").innerText = "MODUS: " + curCtx.toUpperCase() + " | STATUS: " + curSt.toUpperCase();
}

function setOpt(type, val) {
if (type === 'ctx') { curCtx = (curCtx === val) ? "none" : val; try { localStorage.setItem("ma_ctx", curCtx); } catch(e) {} }
else { curSt = val; try { localStorage.setItem("ma_st", curSt); } catch(e) {} }
updateUI();
}

function toggleMorning() {
var s = document.getElementById('morning-sub');
var isHidden = (window.getComputedStyle(s).display === 'none');
s.style.display = isHidden ? 'flex' : 'none';
document.getElementById('arrow').innerText = isHidden ? "▲" : "▼"
}

function step(t, s, v, split) { return {t: t, s: s, v: v, split: !!split}; }

var lib = {
neuro: [
step("Zifferblatt", 46, "Blicke nacheinander auf 12, 3, 6 und 9 Uhr. Der Kopf bleibt völlig still. Nach dem Signal die Richtung wechseln.", true),
step("Peripherie", 40, "Schau geradeaus. Wackle mit den Fingern am Sichtfeldrand einer Seite. Nimm die Bewegung wahr. Nach dem Signal Seite wechseln.", true),
step("Große Schaukel", 45, "Stehe locker. Schwinge den Körper sanft von links nach rechts. Lass die Umgebung fließend an dir vorbeiziehen.")
],
akko: [
step("Fokus-Wechsel", 40, "Blicke auf deinen Daumen vor der Nase bis er scharf ist. Dann weit in die Ferne. Warte auf die Schärfe."),
step("Posaune", 40, "Halte einen Text ganz nah vors Auge, bis er gerade noch scharf ist. Dann blicke blitzartig in die Ferne.")
],
entsp: [
step("Palmieren", 60, "Hände warm reiben. Wölbe die Hände und decke die Augen lichtdicht ab. Kein Druck auf den Augapfel."),
step("Lidrand-Massage", 50, "Streiche am Oberlid von oben nach unten zur Lidkante. Am Unterlid von unten nach oben. Massiere so den gesamten Rand."),
step("Gähnen", 25, "Gähne weit und tief. Lass den Unterkiefer locker hängen und entspanne das Gesicht.")
],
blinz: [
step("Schmetterling", 25, "Blinzle ganz schnell, locker und federleicht wie ein Schmetterling. Befeuchtet sofort.")
],
nature: [
step("Sunning", 45, "Schließe die Augen. Drehe dein Gesicht sanft Richtung Sonne oder Lichtquelle. Spüre die Wärme."),
step("Fernblick", 40, "Suche einen Punkt am Horizont. Lass den Blick ganz weich werden und blinzle locker.")
]
};

function getRnd(arr, lastT) {
var filtered = arr.filter(function(s) { return s.t !== lastT; });
return filtered[Math.floor(Math.random() * filtered.length)];
}

function buildPlan(type) {
if (type === 'bed') return [step("Ankommen", 20, "Augen zu. Atme ruhig."), lib.entsp[0], lib.blinz[0]];
if (type === 'bath') return [
step("Vorbereitung", 90, "Mache ein Tuch warm und lege es auf die Augen. Das verflüssigt das Sekret in den Drüsen."),
lib.entsp[1],
step("Reinigung", 30, "Wische sanft mit einem feuchten Pad von außen nach innen über die Lidkante."),
lib.blinz[0]
];
if (type === 'night') return [lib.entsp[0], step("Kiefer-Entspannung", 30, "Lass den Unterkiefer ganz locker hängen.")];
if (curCtx === 'allergy') return [step("Kühlung", 40, "Kühles Tuch auflegen."), step("Augenruhe", 40, "Augen zu."), lib.blinz[0]];
if (curSt === 'light') return [step("Reiz-Stopp", 40, "Augen sofort schließen."), lib.entsp[0]];

var plan = [];
if (curCtx === 'nature' && curSt === 'normal') {
plan.push(lib.nature[0]); plan.push(lib.akko[1]); plan.push(lib.neuro[2]);
}
else if (curCtx === 'nature') { plan.push(lib.nature[0]); plan.push(lib.nature[1]); plan.push(lib.entsp[0]); }
else if (curCtx === 'stress') {
var s1 = getRnd(lib.neuro, ""); plan.push(s1);
plan.push(lib.entsp[2]); plan.push(getRnd(lib.entsp, s1.t));
}
else if (curSt === 'dry' || curCtx === 'screen') {
plan.push(lib.blinz[0]);
var s2 = getRnd(lib.entsp, ""); plan.push(s2);
plan.push(lib.akko[0]);
}
else if (curSt === 'tired') { plan.push(lib.entsp[0]); plan.push(lib.entsp[1]); plan.push(lib.neuro[1]); }
else {
var s1 = getRnd(lib.neuro, ""); plan.push(s1);
var s2 = getRnd(lib.akko, s1.t); plan.push(s2);
plan.push(lib.entsp[0]);
}
return plan;
}

function speak(txt, cb) {
if (!window.speechSynthesis) { if (cb) cb(); return; }
speechSynthesis.cancel();
var u = new SpeechSynthesisUtterance(txt);
u.lang = "de-DE"
u.onend = function() { if (cb) cb(); };
speechSynthesis.speak(u);
}

function startSession(type) {
currentSteps = buildPlan(type);
currentIndex = 0;
isPaused = false;
document.getElementById("pauseToggle").innerText = "Pause"
if (['night','bed','bath','light'].indexOf(type) !== -1 || curSt === 'light') document.body.classList.add("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
runNextStep();
}

function togglePause() {
isPaused = !isPaused;
document.getElementById("pauseToggle").innerText = isPaused ? "Weiter" : "Pause"
if (isPaused) {
clearInterval(timer);
speechSynthesis.cancel();
} else {
startTimer();
}
}

function runNextStep() {
if (currentIndex >= currentSteps.length) {
document.getElementById("timer").innerText = "✓"
speak("Training beendet.", function() { setTimeout(abort, 2500); });
return;
}
var s = currentSteps[currentIndex];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
document.getElementById("timer").innerText = "..."
speak(s.v, function() {
currentSec = s.s;
startTimer();
});
}

function startTimer() {
clearInterval(timer);
document.getElementById("timer").innerText = currentSec;
timer = setInterval(function() {
if (!isPaused) {
currentSec--;
document.getElementById("timer").innerText = currentSec;
var s = currentSteps[currentIndex];
if (s.split && currentSec === Math.floor(s.s / 2)) speak("Jetzt Seite oder Richtung wechseln.");
if (currentSec <= 0) {
clearInterval(timer);
currentIndex++;
runNextStep();
}
}
}, 1000);
}

function abort() {
clearInterval(timer);
speechSynthesis.cancel();
document.body.classList.remove("dark");
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}
</script>
</body>
</html>
