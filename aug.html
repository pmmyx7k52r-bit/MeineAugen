<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.6.1</title>

<style>
:root { --p:#2c3e50; --s:#2980b9; --a:#e67e22; --d:#c0392b; }
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }
button { padding:15px; margin:6px; width:100%; border:none; border-radius:15px; font-weight:bold; }
.btn-main{background:var(--s);color:white;}
.btn-warn{background:var(--d);color:white;}
.hidden{display:none;}
.timer{font-size:48px;color:var(--a);}
#live{margin:10px 0;font-weight:bold;}
</style>
</head>

<body>

<div id="menu" class="card">
<h2>👁️ 5.6.1</h2>

<div id="live">Lade...</div>

<button class="btn-main" onclick="start('morgen')">☀️ Morgenroutine</button>
<button class="btn-main" onclick="startAuto()">Empfehlung ausführen</button>
<button onclick="showStats()">📊 Analyse</button>
</div>

<div id="run" class="card hidden">
<h3 id="title"></h3>
<div id="timer" class="timer"></div>
<p id="desc"></p>

<button onclick="abort()">Abbrechen</button>

<div id="fb" class="hidden">
<button onclick="finish('good')">👍</button>
<button onclick="finish('neutral')">😐</button>
<button onclick="finish('bad')">⚠️</button>
</div>
</div>

<div id="stats" class="card hidden"></div>

<script>

// =====================
// SPEECH
// =====================
let synth = window.speechSynthesis;
function speak(t){
if(!synth) return;
synth.cancel();
let u=new SpeechSynthesisUtterance(t);
u.lang="de-DE"
synth.speak(u);
}

// =====================
// STATE
// =====================
let stats = JSON.parse(localStorage.getItem('stats56')||"{}");
let lastAction = parseInt(localStorage.getItem('lastAction')||Date.now());
let currentExercise=""
let interval;

// =====================
// DAY RESET
// =====================
let today = new Date().toDateString();
let lastDay = localStorage.getItem("day");

if(today !== lastDay){
localStorage.setItem("day", today);
localStorage.removeItem("morningDone");
}

// =====================
// SCORE
// =====================
function score(ex){
if(!stats[ex]) return 0;
let s=stats[ex];
return (s.good||0) - (s.bad||0);
}

// =====================
// RECOMMENDATION
// =====================
let lastSpoken=""

function recommend(){

let morningDone = localStorage.getItem("morningDone");

if(!morningDone){
document.getElementById("live").innerText = "➡️ Erst Morgenroutine"
return;
}

let minutes = (Date.now()-lastAction)/60000;

let action, ex;

if(minutes < 10){
action = "Alles stabil"
ex = null;
}
else if(minutes < 20){
action = "Kurzpause: Blinzeln 20 Sekunden"
ex = "Blinzeln"
}
else if(minutes < 40){
action = "Reset: Palmieren 60 Sekunden"
ex = "Palmieren"
}
else{
action = "Starke Belastung: Wärme anwenden"
ex = "Wärme"
}

document.getElementById("live").innerText = action;

if(action !== lastSpoken){
speak(action);
lastSpoken = action;
}

currentExercise = ex;
}

setInterval(recommend,3000);

// =====================
// START AUTO
// =====================
function startAuto(){
if(!currentExercise) return;
start(currentExercise);
}

// =====================
// START
// =====================
function start(type){

document.getElementById('menu').classList.add('hidden');
document.getElementById('run').classList.remove('hidden');
document.getElementById('fb').classList.add('hidden');

let steps=[];

// MORGEN = FIX, KEIN SYSTEM
if(type==="morgen"){
localStorage.setItem("morningDone","true");

steps = [
{t:"Augen geschlossen",s:40,d:"Augen geschlossen lassen"},
{t:"Blinzeln",s:20,d:"Sanft blinzeln"},
{t:"Wärme",s:60,d:"Warme Kompresse"},
{t:"Massage",s:30,d:"Lidränder sanft ausstreichen"}
];

speak("Morgenroutine starten");
}

// AUTO ÜBUNGEN
if(type==="Palmieren"){
steps=[{t:"Palmieren",s:60,d:"Augen abdunkeln"}];
speak("Palmieren starten");
}

if(type==="Blinzeln"){
steps=[{t:"Blinzeln",s:20,d:"Locker blinzeln"}];
speak("Blinzeln starten");
}

if(type==="Wärme"){
steps=[{t:"Wärme",s:60,d:"Warme Kompresse"}];
speak("Wärme anwenden");
}

currentExercise = type;

run(steps,0);
}

// =====================
// RUN
// =====================
function run(steps,i){

if(i>=steps.length){
document.getElementById('timer').innerText="✓"
document.getElementById('fb').classList.remove('hidden');
speak("Fertig");
return;
}

let s=steps[i];

document.getElementById('title').innerText=s.t;
document.getElementById('desc').innerText=s.d;
document.getElementById('timer').innerText=s.s;

let sec=s.s;

interval=setInterval(()=>{
sec--;
document.getElementById('timer').innerText=sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}
},1000);
}

// =====================
// ABORT
// =====================
function abort(){
clearInterval(interval);
document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

// =====================
// FEEDBACK
// =====================
function finish(fb){

if(!stats[currentExercise]) stats[currentExercise]={good:0,neutral:0,bad:0};
stats[currentExercise][fb]++;

localStorage.setItem('stats56',JSON.stringify(stats));
localStorage.setItem('lastAction',Date.now());

document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

// =====================
// STATS
// =====================
function showStats(){

document.getElementById('menu').classList.add('hidden');
let box=document.getElementById('stats');
box.classList.remove('hidden');

let html="<h3>Analyse</h3>"

for(let ex in stats){
let s=stats[ex];
let total=s.good+s.bad+s.neutral;
let rate=Math.round((s.good/total)*100);
html+=ex+": "+rate+"% ("+total+")<br>"
}

html+="<br><button onclick='back()'>Zurück</button>"

box.innerHTML=html;
}

function back(){
document.getElementById('stats').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

</script>

</body>
</html>
