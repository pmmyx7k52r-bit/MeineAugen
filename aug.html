<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.9</title>

<style>
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }

button {
padding:14px; margin:6px; width:100%;
border:none; border-radius:15px;
font-weight:600; font-size:15px;
background:#2980b9; color:white; opacity:0.7;
}

button.active { opacity:1; outline:3px solid #2ecc71; }
.start { background:#27ae60; opacity:1; }
.night { background:#2c3e50; }
.hidden { display:none; }

#title { font-size:20px; }
#timer { font-size:42px; color:#e67e22; }
#desc { font-size:14px; color:#444; }
#phase { font-size:12px; color:#888; margin-bottom:10px; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ MeineAugen 5.9</h2>
<div id="phase"></div>

<div id="morning-check">
<h4>Morgen</h4>
<button onclick="startMorning('sticky')">🟡 Verklebte Augen</button>
<button onclick="startMorning('normal')">🙂 Normal</button>
<button onclick="startMorning('bed')">🛏️ Im Bett starten</button>
</div>

<div id="day-ui" class="hidden">

<h4>Kontext</h4>
<button onclick="setContext('screen')">📱 Bildschirm</button>
<button onclick="setContext('stress')">⚠️ Stress</button>
<button onclick="setContext('nature')">🌿 Natur</button>

<h4>Zustand</h4>
<button onclick="setState('normal')">🙂 Normal</button>
<button onclick="setState('dry')">😵 Trocken</button>
<button onclick="setState('sticky')">🟡 Verklebt</button>
<button onclick="setState('overload')">🔴 Überreizt</button>

<button class="start" onclick="startDay()">▶ Start</button>

</div>

<button class="night" onclick="goodNight()">🌙 Gute Nacht</button>

</div>

<div id="run" class="card hidden">
<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>

<button onclick="abort()">Abbrechen</button>
</div>

<script>

let phase = localStorage.getItem("phase") || "morning"
let context = "screen"
let state = "normal"
let interval;

updatePhase();

/* =========================
PHASE
========================= */

function updatePhase(){
document.getElementById("phase").innerText = "Phase: " + phase;

if(phase==="morning"){
document.getElementById("morning-check").classList.remove("hidden");
document.getElementById("day-ui").classList.add("hidden");
} else {
document.getElementById("morning-check").classList.add("hidden");
document.getElementById("day-ui").classList.remove("hidden");
}
}

/* =========================
MORNING
========================= */

function startMorning(mode){

let steps;

if(mode==="sticky") steps = baseRecovery();
if(mode==="normal") steps = morningNormal();
if(mode==="bed") steps = morningBed();

phase="day"
localStorage.setItem("phase",phase);

updatePhase();
runSteps(steps);
}

function morningNormal(){
return [
{t:"Blinzeln", s:20, v:"Ruhig blinzeln."},
{t:"Palmieren", s:40, v:"Hände auf die Augen legen."},
{t:"Fernblick", s:50, v:"In die Ferne schauen."}
];
}

function morningBed(){
return [
{t:"Öffnen", s:20, v:"Langsam die Augen öffnen."},
{t:"Blinzeln", s:15, v:"Ruhig blinzeln."},
{t:"Orientieren", s:30, v:"Weicher Blick im Raum."}
];
}

/* =========================
BASE RECOVERY
========================= */

function baseRecovery(){
return [
{t:"Wärme", s:60, v:"Warme Hände auf die Augen legen."},
{t:"Reinigung", s:30, v:"Lider vorsichtig reinigen."},
{t:"Blinzeln", s:20, v:"Langsam blinzeln."},
{t:"Fernblick", s:40, v:"In die Ferne schauen."}
];
}

/* =========================
AUTO ENGINE 5.9
========================= */

function buildPlan(){

let load = 0;

if(state==="sticky") load = 3;
else if(state==="dry") load = 2;
else if(state==="overload") load = 3;
else load = 1;

if(context==="screen") load += 1;
if(context==="stress") load += 1;

let plan = [];

// RESET
plan.push("reset");

// BEWEGUNG nur bei mittlerer Belastung+
if(load >= 2) plan.push("movement");

// FOKUS bei Bildschirm / trockenen Augen
if(context==="screen" || state==="dry") plan.push("focus");

// INTEGRATION immer am Ende
plan.push("integration");

return plan;
}

/* =========================
MODULES
========================= */

function build(type){

if(type==="reset"){
return [
{t:"Blinzeln", s:15, v:"Ruhig blinzeln."}
];
}

if(type==="movement"){
return [
{t:"Uhr", s:40, v:"Blick springt zwischen Punkten wie einer Uhr."},
{t:"Acht", s:50, v:"Folge einer liegenden Acht mit den Augen."}
];
}

if(type==="focus"){
return [
{t:"Nah–Fern", s:60, v:"Wechsle zwischen nah und fern."}
];
}

if(type==="integration"){
return [
{t:"Freier Blick", s:40, v:"Blick wandern lassen ohne Fixieren."}
];
}

return [];
}

/* =========================
RUN
========================= */

function startDay(){
runSteps(buildPlan().flatMap(build));
}

function runSteps(steps){

document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");

run(steps,0);
}

function run(steps,i){

if(i>=steps.length){
document.getElementById("timer").innerText="✓"
return;
}

let s = steps[i];

document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;

let sec = s.s;
document.getElementById("timer").innerText = sec;

interval = setInterval(()=>{

sec--;
document.getElementById("timer").innerText = sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}

},1000);
}

/* =========================
CONTROL
========================= */

function abort(){
clearInterval(interval);
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

/* =========================
NIGHT
========================= */

function goodNight(){
phase="morning"
localStorage.setItem("phase",phase);
updatePhase();
}

</script>

</body>
</html>
