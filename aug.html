<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeineAugen 6.2.9</title>
<style>
:root { --bg: #f4f1ee; --card: white; --text: #2c3e50; --accent: #2980b9; --gray: #bdc3c7; --active: #2ecc71; }
body.dark { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --gray: #444; }
body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:10px; color: var(--text); transition: 0.3s; margin: 0; touch-action: manipulation; }
.card { background: var(--card); padding:15px; border-radius:30px; max-width:440px; margin:10px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
#morning-sub { max-height: 0; overflow: hidden; transition: 0.3s; display: flex; gap: 8px; }
#morning-sub.open { max-height: 120px; margin: 10px 0; }
h4 { margin: 12px 0 8px 0; font-size: 11px; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; padding: 0 5px; }
button.option { padding: 12px 2px; border: none; border-radius: 12px; font-weight: 600; font-size: 10px; background: var(--gray); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-height: 55px; }
button.option span { font-size: 18px; margin-bottom: 3px; }
button.option.active { background: var(--accent); outline: 2px solid var(--active); box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
.action-btn { padding: 18px; margin: 6px 0; width: 100%; border: none; border-radius: 22px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
.start-morning { background: #f1c40f; color: #2c3e50; }
.start-run { background: #27ae60; margin-top: 10px; }
.night { background: #2c3e50; }
#timer { font-size: 80px; color: #e67e22; font-weight: bold; margin: 5px 0; }
#desc { font-size: 18px; min-height: 140px; padding: 0 20px; line-height: 1.5; display: flex; align-items: center; justify-content: center; font-weight: 500; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.2.9</h2>
<div id="mode-info" style="font-size:10px; margin-bottom:10px; font-weight:bold; color:#7f8c8d;">STATUS: GESPEICHERT</div>

<div class="morning-section">
<button class="action-btn start-morning" onclick="toggleMorning()">☀️ Morgen-Routine <span id="arrow">▼</span></button>
<div id="morning-sub">
<button class="action-btn" style="background:#f39c12; flex:1; border-radius:15px; border:none; color:white; font-weight:bold;" onclick="startSession('bed')">🛌 Bett</button>
<button class="action-btn" style="background:#3498db; flex:1; border-radius:15px; border:none; color:white; font-weight:bold;" onclick="startSession('bath')">🚿 Bad</button>
</div>
</div>

<h4>Kontext</h4>
<div class="grid">
<button id="c_screen" class="option" onclick="setOpt('ctx','screen')"><span>📱</span>Bildschirm</button>
<button id="c_nature" class="option" onclick="setOpt('ctx','nature')"><span>🌳</span>Natur</button>
<button id="c_stress" class="option" onclick="setOpt('ctx','stress')"><span>⚖️</span>Stress</button>
<button id="c_allergy" class="option" onclick="setOpt('ctx','allergy')"><span>🤧</span>Allergie</button>
</div>

<h4>Zustand</h4>
<div class="grid">
<button id="s_normal" class="option" onclick="setOpt('st','normal')"><span>✅</span>OK</button>
<button id="s_dry" class="option" onclick="setOpt('st','dry')"><span>😵</span>Trocken</button>
<button id="s_tired" class="option" onclick="setOpt('st','tired')"><span>🔴</span>Müde</button>
<button id="s_light" class="option" onclick="setOpt('st','light')"><span>🔆</span>Licht</button>
</div>

<button class="action-btn start-run" onclick="startSession('train')">🚀 Training starten</button>
<button class="action-btn night" onclick="startSession('night')">🌙 Gute Nacht</button>
</div>

<div id="run" class="card hidden">
<div id="title" style="font-weight:bold; font-size: 20px; margin-bottom: 5px; color: var(--accent);"></div>
<div id="timer">...</div>
<div id="desc"></div>
<button onclick="abort()" class="action-btn" style="background:#95a5a6; margin-top:20px;">Abbrechen</button>
</div>

<script>
// Initiales Laden aus dem Speicher
let curCtx = localStorage.getItem("ma_ctx") || "none"
let curSt = localStorage.getItem("ma_st") || "normal"
let timer;

function updateUI() {
// Buttons zurücksetzen
document.querySelectorAll('.option').forEach(b => b.classList.remove('active'));
// Gespeicherte Buttons aktivieren
const activeCtx = document.getElementById("c_" + curCtx);
if(activeCtx) activeCtx.classList.add('active');
const activeSt = document.getElementById("s_" + curSt);
if(activeSt) activeSt.classList.add('active');
document.getElementById("mode-info").innerText = `KONTEXT: ${curCtx.toUpperCase()} | ZUSTAND: ${curSt.toUpperCase()}`;
}

function setOpt(t, v) {
if(t==='ctx') {
curCtx = (curCtx === v) ? "none" : v;
localStorage.setItem("ma_ctx", curCtx);
} else {
curSt = v;
localStorage.setItem("ma_st", curSt);
}
updateUI();
}

function toggleMorning() {
const s = document.getElementById('morning-sub');
s.classList.toggle('open');
document.getElementById('arrow').innerText = s.classList.contains('open') ? "▲" : "▼"
}

function step(t, s, v, split = false) { return {t, s, v, split}; }

// Übungs-Bibliothek (Schwerpunkt: Eurich, Angart, Bates)
const lib = {
neuro: [
step("Zifferblatt", 45, "Halte den Kopf still. Blicke nacheinander auf die 12, die 3, die 6 und die 9 Uhr Position. Gehe bis zum äußeren Rand."),
step("Peripherie", 35, "Schau geradeaus. Strecke die Arme seitlich aus und wackle mit den Fingern. Nimm die Bewegung am Rand wahr.")
],
smooth: [
step("Daumen-Folge", 40, "Strecke den Arm aus. Bewege den Daumen langsam in einem Kreis. Verfolge ihn flüssig mit den Augen."),
step("Horizontal-Pendel", 30, "Bewege den Daumen langsam von ganz links nach ganz rechts. Folge ihm flüssig bis zum Augen-Anschlag.")
],
akkommodation: [
step("Scharf-Wechsel", 40, "Schau den Daumen nah an, bis er scharf ist. Dann blicke in die Ferne auf ein Detail. Warte auf die Schärfe, dann wechsel."),
step("Drei-Punkte", 35, "Wähle drei Punkte: Ganz nah, mittlere Distanz, ganz fern. Springe mit dem Blick dazwischen hin und her.")
],
entlastung: [
step("Palmieren", 60, "Hände kräftig warm reiben. Als Schalen locker über die Augen legen. Atme tief in die absolute Dunkelheit."),
step("Lid-Massage", 35, "Ganz sanft: Das Oberlid von oben nach unten ausstreichen. Das Unterlid von unten nach oben. Ohne Druck.")
],
blinzeln: [
step("Schmetterling", 25, "Blinzle ganz schnell und federleicht. Das befeuchtet die Augenoberfläche sofort."),
step("Pause-Blinzeln", 30, "Schließe die Augen für 2 Sekunden fest, dann öffne sie und blicke entspannt in die weite Ferne.")
]
};

function getRnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function buildPlan(type) {
if(type==='bed') return [step("Ankommen", 20, "Lass die Augen geschlossen. Atme ruhig. Spüre wie die Augenmuskeln weich werden."), step("Palmieren", 45, "Hände warm auflegen."), getRnd(lib.blinzeln)];
if(type==='bath') return [step("Wärme", 45, "Warmes Tuch oder Hände auflegen."), step("Lid-Pflege", 40, "Oberlid oben-unten, Unterlid unten-oben streichen. Kein Druck."), getRnd(lib.neuro)];
if(type==='night') return [step("Dunkel-Fokus", 50, "Decke die Augen ab. Entspanne den Sehnerv."), step("Kiefer", 30, "Lass den Unterkiefer locker hängen.")];
if(curSt==='light') return [step("Reiz-Stopp", 50, "Schließe die Augen sofort."), step("Palmieren", 60, "Decke die Augen komplett ab.")];
let plan = [];
if(curCtx==='stress') plan = [getRnd(lib.neuro), step("Großes Gähnen", 25, "Gähne weit und kräftig. Lockere dein ganzes Gesicht."), getRnd(lib.entlastung)];
else if(curSt==='dry' || curCtx==='screen') plan = [getRnd(lib.blinzeln), getRnd(lib.entlastung), getRnd(lib.akkommodation)];
else if(curSt==='tired') plan = [getRnd(lib.entlastung), getRnd(lib.entlastung), getRnd(lib.smooth)];
else if(curCtx==='nature' || curSt==='normal') plan = [getRnd(lib.neuro), getRnd(lib.akkommodation), getRnd(lib.smooth)];
else plan = [getRnd(lib.entlastung), getRnd(lib.neuro), getRnd(lib.smooth)];
return plan;
}

function speak(txt, cb) {
if(!window.speechSynthesis) { cb?.(); return; }
speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(txt);
u.lang = "de-DE" u.onend = () => cb?.();
speechSynthesis.speak(u);
}

function startSession(type) {
const steps = buildPlan(type);
if(['night','bed','bath','light'].includes(type) || curSt==='light') document.body.classList.add("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps, 0);
}

function run(steps, i) {
if(i >= steps.length) {
document.getElementById("timer").innerText = "✓"
speak("Fertig. Behalte den weichen Blick bei.", () => setTimeout(abort, 2500));
return;
}
const s = steps[i];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
document.getElementById("timer").innerText = "..."
speak(s.v, () => {
let sec = s.s;
document.getElementById("timer").innerText = sec;
timer = setInterval(() => {
sec--;
document.getElementById("timer").innerText = sec;
if(s.split && sec === Math.floor(s.s/2)) speak("Jetzt in die andere Richtung.");
if(sec <= 0) { clearInterval(timer); run(steps, i+1); }
}, 1000);
});
}

function abort() {
clearInterval(timer);
speechSynthesis.cancel();
document.body.classList.remove("dark");
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

// Beim Starten der Seite UI synchronisieren
window.onload = updateUI;
</script>
</body>
</html>
