<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeineAugen 6.2.3</title>
<style>
:root { --bg: #f4f1ee; --card: white; --text: #2c3e50; --accent: #2980b9; --gray: #bdc3c7; --active: #2ecc71; }
body.dark { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --gray: #444; }

body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:10px; color: var(--text); transition: 0.3s; margin: 0; touch-action: manipulation; }
.card { background: var(--card); padding:15px; border-radius:30px; max-width:440px; margin:10px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

#morning-sub { max-height: 0; overflow: hidden; transition: 0.3s; display: flex; gap: 8px; }
#morning-sub.open { max-height: 120px; margin: 10px 0; }

h4 { margin: 12px 0 8px 0; font-size: 11px; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }

.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; padding: 0 5px; }
button.option { padding: 12px 2px; border: none; border-radius: 12px; font-weight: 600; font-size: 10px; background: var(--gray); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-height: 55px; }
button.option span { font-size: 18px; margin-bottom: 3px; }
button.option.active { background: var(--accent); outline: 2px solid var(--active); }

.action-btn { padding: 18px; margin: 6px 0; width: 100%; border: none; border-radius: 22px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
.start-morning { background: #f1c40f; color: #2c3e50; }
.start-run { background: #27ae60; margin-top: 10px; }
.night { background: #2c3e50; }

#mode-info { font-size: 10px; color: #7f8c8d; margin-bottom: 10px; background: rgba(0,0,0,0.05); padding: 8px; border-radius: 10px; font-weight: bold; }
#timer { font-size: 80px; color: #e67e22; font-weight: bold; margin: 5px 0; }
#desc { font-size: 19px; min-height: 130px; padding: 0 20px; line-height: 1.5; display: flex; align-items: center; justify-content: center; font-weight: 500; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.2.3</h2>
<div id="mode-info">Lädt...</div>

<div class="morning-section">
<button class="action-btn start-morning" onclick="toggleMorning()">☀️ Morgen-Routine <span id="arrow">▼</span></button>
<div id="morning-sub">
<button class="action-btn" style="background:#f39c12; flex:1; border-radius:15px; border:none; color:white; font-weight:bold;" onclick="startSession('bed')">🛌 Bett</button>
<button class="action-btn" style="background:#3498db; flex:1; border-radius:15px; border:none; color:white; font-weight:bold;" onclick="startSession('bath')">🚿 Bad</button>
</div>
</div>

<h4>Kontext</h4>
<div class="grid">
<button id="c_screen" class="option" onclick="setOpt('ctx','screen')"><span>📱</span>Screen</button>
<button id="c_nature" class="option" onclick="setOpt('ctx','nature')"><span>🌳</span>Natur</button>
<button id="c_stress" class="option" onclick="setOpt('ctx','stress')"><span>⚖️</span>Stress</button>
<button id="c_allergy" class="option" onclick="setOpt('ctx','allergy')"><span>🤧</span>Allergie</button>
</div>

<h4>Zustand / Symptome</h4>
<div class="grid">
<button id="s_normal" class="option" onclick="setOpt('st','normal')"><span>✅</span>OK</button>
<button id="s_dry" class="option" onclick="setOpt('st','dry')"><span>😵</span>Trocken</button>
<button id="s_tired" class="option" onclick="setOpt('st','tired')"><span>🔴</span>Müde</button>
<button id="s_light" class="option" onclick="setOpt('st','light')"><span>🔆</span>Licht</button>
</div>

<button class="action-btn start-run" onclick="startSession('train')">🚀 Training starten</button>
<button class="action-btn night" onclick="startSession('night')">🌙 Gute Nacht</button>
</div>

<div id="run" class="card hidden">
<div id="title" style="font-weight:bold; font-size: 22px; margin-bottom: 10px; color: var(--accent);"></div>
<div id="timer">...</div>
<div id="desc"></div>
<button onclick="abort()" class="action-btn" style="background:#95a5a6; margin-top:20px;">Abbrechen</button>
</div>

<script>
let curCtx = localStorage.getItem("ma_ctx") || "none"
let curSt = localStorage.getItem("ma_st") || "normal"
let timer;

function updateUI() {
document.querySelectorAll('.option').forEach(b => b.classList.remove('active'));
if(curCtx !== "none") document.getElementById("c_" + curCtx)?.classList.add('active');
document.getElementById("s_" + curSt)?.classList.add('active');
document.getElementById("mode-info").innerText = `KONTEXT: ${curCtx.toUpperCase()} | STATUS: ${curSt.toUpperCase()}`;
}

function setOpt(t, v) {
if(t==='ctx') curCtx = (curCtx === v) ? "none" : v;
else curSt = v;
localStorage.setItem("ma_ctx", curCtx);
localStorage.setItem("ma_st", curSt);
updateUI();
}

function toggleMorning() {
const s = document.getElementById('morning-sub');
s.classList.toggle('open');
document.getElementById('arrow').innerText = s.classList.contains('open') ? "▲" : "▼"
}

function step(t, s, v, split = false) { return {t, s, v, split}; }

function buildPlan(type) {
if(type==='bed') return [
step("Ruhe", 20, "Augen noch geschlossen halten. Atme tief in den Bauch ein und aus."),
step("Palmieren", 45, "Hände kräftig warm reiben und locker auf die Augen legen. Dunkelheit genießen."),
step("Blinzeln", 20, "Augen öffnen und ganz locker blinzeln. Nicht anstrengen.")
];
if(type==='bath') return [
step("Wärme", 50, "Warme Hände (oder ein warmes Tuch) auf die geschlossenen Augen legen."),
step("Lidmassage", 40, "Oberlid von oben nach unten streichen. Unterlid von unten nach oben. Kein Druck auf den Augapfel."),
step("Reinigung", 20, "Augenlider vorsichtig mit klarem Wasser reinigen."),
step("Blinzeln", 20, "Langsam und vollständig blinzeln. Augen kurz geschlossen halten."),
step("Fernblick", 45, "Schau in die Ferne. Blinzle normal. Fixiere nichts. Blick weich lassen.")
];
if(type==='night') return [
step("Dunkelheit", 50, "Hände locker auflegen. Das tiefste Schwarz hinter den Lidern suchen."),
step("Kiefer lockern", 25, "Unterkiefer hängen lassen, Lippen leicht lösen. Entspannt die Sehnerven.")
];
if(curSt==='light') return [
step("Ruhe", 40, "Augen entspannt geschlossen halten. Lichtreiz konsequent reduzieren."),
step("Palmieren", 60, "Hände locker wie Schalen auflegen. Keinen Druck ausüben."),
step("Entspannung", 30, "Ganz ruhig atmen. Die Augenmuskeln dürfen komplett loslassen.")
];
if(curCtx==='allergy') return [
step("Kühlung", 45, "Kühles Tuch locker auflegen. Die Kälte beruhigt, ohne zu reiben."),
step("Stille", 30, "Augen absolut unbewegt lassen. Kiefer entspannen.")
];

if(curCtx==='stress') return [
step("Schwingen", 50, "Oberkörper locker von links nach rechts drehen. Der Blick gleitet weich mit."),
step("Weites Gähnen", 25, "Bewusst und weit gähnen. Lockert die gesamte Gesichtsmuskulatur.")
];

if(curSt==='dry' || curCtx==='screen') return [
step("Blinzeln", 30, "Langsam und vollständig blinzeln. Augen einen Moment geschlossen halten."),
step("Lidmassage", 40, "Oberlid von oben nach unten streichen. Unterlid von unten nach oben. Ganz sanft."),
step("Fernblick", 45, "Schau in die Ferne. Blinzle normal. Fixiere nichts. Blick weich lassen.")
];

if(curCtx==='nature') return [
step("Weiche Ferne", 45, "In die Weite schauen. Fixiere nichts. Lass den Blick einfach ruhen."),
step("Raumgefühl", 35, "Geradeaus schauen, aber die Umgebung links und rechts bewusst wahrnehmen.")
];
return [
step("Locker blinzeln", 20, "Augenoberfläche kurz erfrischen. Ganz leichtes Schmettern."),
step("Fernblick", 40, "Schau in die Ferne. Blinzle normal. Fixiere nichts. Blick weich lassen."),
step("Acht malen", 35, "Liegende Acht in der Luft verfolgen. Große, weiche Bewegungen.", true)
];
}

function speak(txt, cb) {
if(!window.speechSynthesis) { cb?.(); return; }
speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(txt);
u.lang = "de-DE"
u.onend = () => cb?.();
speechSynthesis.speak(u);
}

function startSession(type) {
const steps = buildPlan(type);
// Dark Mode für Morgen, Nacht und Lichtscheu
if(type==='night' || type==='bed' || type==='bath' || curSt==='light') document.body.classList.add("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps, 0);
}

function run(steps, i) {
if(i >= steps.length) {
document.getElementById("timer").innerText = "✓"
speak("Training beendet. Hab einen entspannten Moment.", () => setTimeout(abort, 2500));
return;
}
const s = steps[i];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
document.getElementById("timer").innerText = "..."
speak(s.v, () => {
let sec = s.s;
document.getElementById("timer").innerText = sec;
timer = setInterval(() => {
sec--;
document.getElementById("timer").innerText = sec;
if(s.split && sec === Math.floor(s.s/2)) speak("Jetzt in die andere Richtung.");
if(sec <= 0) { clearInterval(timer); run(steps, i+1); }
}, 1000);
});
}

function abort() {
clearInterval(timer);
speechSynthesis.cancel();
document.body.classList.remove("dark");
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

window.onload = updateUI;
</script>
</body>
</html>
