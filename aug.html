<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen v2.4</title>
<style>
:root { --p: #2c3e50; --s: #27ae60; --a: #e67e22; --d: #c0392b; --bg: #fdfcfb; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; }
.card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: 20px auto; }
button { border: none; padding: 18px; border-radius: 18px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 8px 0; font-weight: 600; }
.btn-main { background: var(--s); color: white; }
.timer-val { font-size: 4.5rem; color: var(--a); margin: 15px 0; font-weight: 200; }
.hidden { display: none; }
.config-area { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 15px; }
.source-tag { font-size: 0.7rem; color: #95a5a6; margin-top: 5px; }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1>👁️ MeineAugen v2.4</h1>
<div class="config-area">
<label>Intervall: <b id="interval-val">10</b> Min.</label>
<input type="range" id="interval-slider" min="5" max="20" value="10" oninput="updateInterval(this.value)" style="width:100%">
</div>

<button class="btn-main" id="work-btn" onclick="toggleWorkMode()">🛡️ Begleiter starten</button>
<button style="background:#ecf0f1;" onclick="startRoutine('morgen')">☀️ Morgen-Routine</button>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title">Pause</h2>
<p id="ex-desc">Bitte warten...</p>
<div class="timer-val" id="timer-display">--</div>
<div id="ex-source" class="source-tag"></div>
</div>

<script>
let workDuration = 10;
let isWorkModeActive = false;
let timerTimeout;
const synth = window.speechSynthesis;

function updateInterval(val) {
workDuration = val;
document.getElementById('interval-val').innerText = val;
}

function speak(text, callback) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
utter.rate = 0.85;
if (callback) utter.onend = callback;
synth.speak(utter);
}

function toggleWorkMode() {
// WICHTIG: Erster Klick schaltet Audio frei
speak("Begleiter wird vorbereitet.");
isWorkModeActive = !isWorkModeActive;
const btn = document.getElementById('work-btn');
if (isWorkModeActive) {
btn.innerText = "🛑 Begleiter stoppen"
btn.style.background = "#95a5a6"
scheduleNextPush();
speak("Begleiter ist aktiv. Ich melde mich in " + workDuration + " Minuten.");
} else {
btn.innerText = "🛡️ Begleiter starten"
btn.style.background = "#27ae60"
clearTimeout(timerTimeout);
}
}

function scheduleNextPush() {
if (!isWorkModeActive) return;
clearTimeout(timerTimeout);
timerTimeout = setTimeout(() => {
if ("Notification" in window && Notification.permission === "granted") {
new Notification("Zeit für deine Augen!", { body: "Klicke hier für die Kurz-Übung." });
}
startRoutine('break');
}, workDuration * 60 * 1000);
}

function startRoutine(type) {
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
const flows = {
break: [
{ t: "Blinzeln", d: "Augen offen lassen und bewusst blinzeln.", s: 20, v: "Blinzle jetzt 20 Sekunden lang.", q: "AOK" },
{ t: "Palmieren", d: "Augen schließen. Hände warm auflegen.", s: 30, v: "Schließe die Augen und lege deine warmen Hände auf.", q: "Eyes and More" },
{ t: "Ferne", d: "Augen öffnen und weit weg schauen.", s: 10, v: "Öffne die Augen und schau entspannt in die Ferne.", q: "AOK" }
],
morgen: [
{ t: "Blinzeln", d: "Nicht reiben! Erst locker blinzeln.", s: 20, v: "Guten Morgen. Erst blinzeln, nicht reiben.", q: "Hylo-Vision" },
{ t: "Wärme", d: "Feuchtes Tuch auf die geschlossenen Augen.", s: 60, v: "Lege jetzt die warme Kompresse auf.", q: "AOK" }
]
};
runStep(flows[type], 0);
}

function runStep(steps, index) {
if (index >= steps.length) {
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
if (isWorkModeActive) scheduleNextPush();
return;
}
const s = steps[index];
document.getElementById('ex-title').innerText = s.t;
document.getElementById('ex-desc').innerText = s.d;
document.getElementById('ex-source').innerText = "Quelle: " + s.q;
speak(s.v);
let sec = s.s;
document.getElementById('timer-display').innerText = sec;
const int = setInterval(() => {
sec--;
document.getElementById('timer-display').innerText = sec;
if (sec <= 0) { clearInterval(int); runStep(steps, index + 1); }
}, 1000);
}
</script>
</body>
</html>
