<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 6.1.2</title>
<style>
:root { --bg: #fdfcfb; --card: white; --text: #2c3e50; --accent: #2980b9; --gray: #bdc3c7; }
body.dark { --bg: #1a1a1a; --card: #2c2c2c; --text: #ecf0f1; --accent: #3498db; --gray: #7f8c8d; }

body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:10px; color: var(--text); transition: all 0.3s; margin: 0; }
.card { background: var(--card); padding:20px; border-radius:30px; max-width:400px; margin:10px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

/* Morgen-Routine Akkordeon */
.morning-section { margin-bottom: 20px; }
#morning-sub {
max-height: 0;
overflow: hidden;
transition: max-height 0.3s ease-out, margin 0.3s;
display: flex;
gap: 10px;
padding: 0 5px;
}
#morning-sub.open { max-height: 100px; margin-top: 10px; }

.grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
button.option { padding: 14px; border: none; border-radius: 18px; font-weight: 600; font-size: 13px; background: var(--gray); color: white; cursor: pointer; flex: 1 1 45%; transition: 0.2s; }
button.option.active { background: var(--accent); outline: 3px solid #2ecc71; }

.action-btn { padding: 18px; margin: 5px 0; width: 100%; border: none; border-radius: 20px; font-weight: bold; font-size: 16px; cursor: pointer; color: white; }
.start-morning { background: #f1c40f; color: #2c3e50; position: relative; }
.sub-btn { font-size: 14px; flex: 1; padding: 15px; border-radius: 15px; }
.start-bed { background: #f39c12; }
.start-bath { background: #3498db; }
.start-run { background: #27ae60; margin-top: 10px; }
.night { background: #2c3e50; }

.hidden { display: none; }
#mode-info { font-size: 11px; color: #7f8c8d; margin-bottom: 15px; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 12px; font-weight: bold; }
#title { font-size: 26px; font-weight: bold; margin-top: 5px; }
#timer { font-size: 85px; color: #e67e22; font-weight: bold; margin: 10px 0; }
#desc { font-size: 19px; color: var(--text); min-height: 90px; padding: 0 10px; line-height: 1.5; }
</style>
</head>
<body id="body">

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.1.2</h2>
<div id="mode-info">Lädt...</div>

<div class="morning-section">
<button class="action-btn start-morning" onclick="toggleMorning()">☀️ Morgen-Routine <span id="arrow">▼</span></button>
<div id="morning-sub">
<button class="action-btn sub-btn start-bed" onclick="startSession('bed')">🛌 Bett</button>
<button class="action-btn sub-btn start-bath" onclick="startSession('bath')">🚿 Bad</button>
</div>
</div>

<hr style="border:0; border-top:1px solid #eee;">

<div class="grid">
<button id="c_screen" class="option" onclick="STATE.setContext('screen')">📱 Bildschirm</button>
<button id="c_allergy" class="option" onclick="STATE.setContext('allergy')">🤧 Allergie</button>
<button id="s_dry" class="option" onclick="STATE.setState('dry')">😵 Trocken</button>
<button id="s_overload" class="option" onclick="STATE.setState('overload')">🔴 Überreizt/Müde</button>
</div>

<button class="action-btn start-run" onclick="startSession('training')">🚀 Training starten</button>
<button class="action-btn night" onclick="startSession('night')">🌙 Gute Nacht</button>
<div onclick="STATE.reset()" style="color:#e74c3c; font-size:11px; cursor:pointer; margin-top:20px; text-decoration: underline;">Daten zurücksetzen</div>
</div>

<div id="run" class="card hidden">
<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>
<button onclick="abort()" class="action-btn" style="background:#95a5a6;">Abbrechen</button>
</div>

<script>
const STATE = {
get() { return { state: localStorage.getItem("ma_state") || "normal", context: localStorage.getItem("ma_context") || "screen" }; },
setState(s) { localStorage.setItem("ma_state", s); this.updateUI(); },
setContext(c) { localStorage.setItem("ma_context", c); this.updateUI(); },
reset() { if(confirm("App zurücksetzen?")) { localStorage.clear(); location.reload(); } },
updateUI() {
const data = this.get();
document.querySelectorAll('.option').forEach(btn => btn.classList.remove('active'));
document.getElementById("s_" + data.state)?.classList.add('active');
document.getElementById("c_" + data.context)?.classList.add('active');
const ctxLabel = data.context === 'screen' ? 'BILDSCHIRM' : data.context.toUpperCase();
const stateLabel = data.state === 'overload' ? 'ÜBERREIZT/MÜDE' : data.state.toUpperCase();
document.getElementById("mode-info").innerText = `KONTEXT: ${ctxLabel} | STATUS: ${stateLabel}`;
}
};
STATE.updateUI();

function toggleMorning() {
const sub = document.getElementById('morning-sub');
const arrow = document.getElementById('arrow');
sub.classList.toggle('open');
arrow.innerText = sub.classList.contains('open') ? "▲" : "▼"
}

function step(t, s, v, split = false) { return {t, s, v, split}; }

function buildPlan(type) {
const {state, context} = STATE.get();
if(type === 'bed') return [
step("Ruhe", 15, "Lass die Augen geschlossen. Atme tief ein."),
step("Dehnen", 30, "Strecke dich im Bett. Gähne tief und herzhaft."),
step("Wärme", 45, "Reibe deine Hände warm und lege sie sanft auf die Augen."),
step("Blinzeln", 15, "Öffne die Augen und blinzle ganz locker.")
];
if(type === 'bath') return [
step("Wärme", 40, "Halte ein warmes Tuch auf deine Augen."),
step("Massage", 30, "Streiche sanft oben nach unten und unten nach oben."),
step("Reinigung", 20, "Spüle die Augen vorsichtig mit Wasser ab."),
step("Fernblick", 30, "Schau kurz entspannt in die Ferne.")
];
if(context === 'allergy') return [
step("Kühlung", 30, "Kühles Tuch auflegen. Nicht reiben."),
step("Ruhe", 20, "Augen geschlossen halten."),
step("Blinzeln", 20, "Leicht blinzeln. Nicht pressen."),
step("Fernblick", 30, "Entspannt in die Ferne schauen.")
];
if(state === "dry") return [
step("Wärme", 40, "Warme Hände auflegen."),
step("Lidmassage", 30, "Sanft ausstreichen oben nach unten und unten nach oben."),
step("Blinzeln", 20, "Langsam und vollständig blinzeln."),
step("Fernblick", 30, "In die Ferne schauen.")
];
if(type === 'night') return [
step("Palmieren", 45, "Hände auflegen. Dunkelheit genießen."),
step("Gähnen", 20, "Kiefer locker lassen."),
step("Ruhe", 15, "Augen geschlossen halten.")
];
if(state === "overload" || context === "stress") return [
step("Schwingen", 45, "Drehe den Oberkörper locker. Der Blick gleitet entspannt mit."),
step("Palmieren", 30, "Hände auflegen und tief durchatmen."),
step("Weicher Blick", 20, "Ohne Fokus in die Ferne schauen.")
];
return [
step("Blinzeln", 15, "Locker blinzeln."),
step("Nah-Fern", 30, "Fokussiere Daumen und Fernpunkt im Wechsel."),
step("Acht malen", 24, "Liegende Acht mit den Augen verfolgen.", true)
];
}

let interval;
function speak(text, cb) {
if(!window.speechSynthesis) { cb?.(); return; }
speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.lang = "de-DE"
u.rate = 0.95;
u.onend = () => cb?.();
speechSynthesis.speak(u);
}

function startSession(type) {
const steps = buildPlan(type);
if(type === 'bed' || type === 'night') document.getElementById("body").classList.add("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps, 0);
}

function run(steps, i) {
if(i >= steps.length) {
document.getElementById("timer").innerText = "✓"
speak("Fertig.");
setTimeout(abort, 3000);
return;
}
const s = steps[i];
document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
speak(s.v, () => {
let sec = s.s;
let half = Math.floor(s.s / 2);
document.getElementById("timer").innerText = sec;
interval = setInterval(() => {
sec--;
document.getElementById("timer").innerText = sec;
if(s.split && sec === half) speak("Jetzt Richtungswechsel.");
if(sec <= 0) { clearInterval(interval); run(steps, i + 1); }
}, 1000);
});
}

function abort() {
clearInterval(interval);
if(window.speechSynthesis) speechSynthesis.cancel();
document.getElementById("body").classList.remove("dark");
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
document.getElementById('morning-sub').classList.remove('open');
document.getElementById('arrow').innerText = "▼"
}
</script>
</body>
</html>
