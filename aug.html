<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen v2.7</title>
<style>
:root { --p: #2c3e50; --s: #27ae60; --a: #e67e22; --d: #c0392b; --bg: #fdfcfb; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; }
.card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: 20px auto; }
button { border: none; padding: 18px; border-radius: 18px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 8px 0; font-weight: 600; }
.btn-main { background: var(--s); color: white; }
.timer-val { font-size: 4.5rem; color: var(--a); margin: 15px 0; font-weight: 200; }
.hidden { display: none; }
.pulse-dot { width: 10px; height: 10px; background: #27ae60; border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1s infinite; }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1>👁️ MeineAugen v2.7</h1>
<div id="alive-indicator" class="hidden"><span class="pulse-dot"></span> <small>Wächter aktiv...</small></div>
<button class="btn-main" id="work-btn" onclick="toggleWorkMode()">🛡️ Begleiter starten</button>
<div style="margin: 15px 0; font-size: 0.9rem;">
Intervall: <b id="interval-val">10</b> Min.
<input type="range" id="interval-slider" min="5" max="30" value="10" oninput="updateInterval(this.value)" style="width:100%">
</div>

<button style="background:#ecf0f1;" onclick="startRoutine('morgen')">☀️ Morgen-Routine</button>
<button style="background:#fff5f5; color:var(--d);" onclick="startRoutine('emergency')">⚠️ Notfall</button>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title">Pause</h2>
<div class="timer-val" id="timer-display">--</div>
</div>

<audio id="keep-alive-audio" loop>
<source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav">
</audio>

<script>
let workDuration = 10;
let isWorkModeActive = false;
let nextBreakTime;
const synth = window.speechSynthesis;
const audio = document.getElementById('keep-alive-audio');

function updateInterval(val) {
workDuration = val;
document.getElementById('interval-val').innerText = val;
}

function speak(text) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
utter.rate = 0.8;
synth.speak(utter);
}

function toggleWorkMode() {
// WICHTIG: Audio-Freischaltung
audio.play().catch(() => console.log("Audio braucht Klick"));
isWorkModeActive = !isWorkModeActive;
const btn = document.getElementById('work-btn');
const indicator = document.getElementById('alive-indicator');

if (isWorkModeActive) {
btn.innerText = "🛑 Stoppen"
indicator.classList.remove('hidden');
speak("Begleiter aktiv. Ich melde mich.");
setNextTimer();
} else {
btn.innerText = "🛡️ Begleiter starten"
indicator.classList.add('hidden');
audio.pause();
isWorkModeActive = false;
}
}

function setNextTimer() {
nextBreakTime = Date.now() + (workDuration * 60 * 1000);
checkLoop();
}

function checkLoop() {
if (!isWorkModeActive) return;
if (Date.now() >= nextBreakTime) {
startRoutine('break');
} else {
// Kurzes Intervall, um das Handy wach zu halten
setTimeout(checkLoop, 10000);
}
}

function startRoutine(type) {
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
const steps = {
break: [
{ t: "Blinzeln", s: 20, v: "Zeit für deine Augen. Bitte 20 Sekunden blinzeln." },
{ t: "Palmieren", s: 30, v: "Jetzt die Augen schließen und die Wärme genießen." }
],
emergency: [{ t: "Notstopp", s: 180, v: "Drei Minuten absolute Ruhe." }],
morgen: [{ t: "Morgen", s: 60, v: "Guten Morgen. Erst blinzeln, dann Kompresse." }]
};
runStep(steps[type] || steps.break, 0);
}

function runStep(steps, index) {
if (index >= steps.length) {
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
if (isWorkModeActive) setNextTimer();
return;
}
const s = steps[index];
document.getElementById('ex-title').innerText = s.t;
speak(s.v);
let sec = s.s;
const int = setInterval(() => {
document.getElementById('timer-display').innerText = sec;
if (sec <= 0) { clearInterval(int); runStep(steps, index + 1); }
sec--;
}, 1000);
}
</script>
</body>
</html>
