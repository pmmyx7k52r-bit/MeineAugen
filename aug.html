<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.7.2</title>

<style>
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }

button {
padding:14px; margin:6px; width:100%;
border:none; border-radius:15px;
font-weight:600; font-size:15px;
background:#2980b9; color:white; opacity:0.7;
}

button.active { opacity:1; outline:3px solid #2ecc71; }
.start { background:#27ae60; opacity:1; }
.night { background:#2c3e50; }

.hidden { display:none; }

#title { font-size:20px; }
#timer { font-size:42px; color:#e67e22; }
#desc { font-size:14px; color:#444; }
#phase { font-size:12px; color:#888; margin-bottom:10px; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ MeineAugen 5.7.2</h2>
<div id="phase"></div>

<div id="morning-check">
<h4>Morgen</h4>
<button onclick="startMorning(true)">🟡 Verklebte Augen</button>
<button onclick="startMorning(false)">🙂 Normal</button>
</div>

<div id="day-ui" class="hidden">

<h4>Kontext</h4>
<button id="c_screen" onclick="setContext('screen')">📱 Bildschirm</button>
<button id="c_stress" onclick="setContext('stress')">⚠️ Stress</button>
<button id="c_nature" onclick="setContext('nature')">🌿 Natur</button>

<h4>Zustand</h4>
<button id="s_normal" onclick="setState('normal')">🙂 Normal</button>
<button id="s_dry" onclick="setState('dry')">😵 Trocken</button>
<button id="s_sticky" onclick="setState('sticky')">🟡 Verklebt</button>
<button id="s_over" onclick="setState('overload')">🔴 Überreizt</button>

<button class="start" onclick="startDay()">▶ Start</button>

</div>

<button class="night" onclick="goodNight()">🌙 Gute Nacht</button>

</div>

<div id="run" class="card hidden">

<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>

<button onclick="finish()">✔️ Fertig</button>
<button onclick="abort()">Abbrechen</button>

</div>

<script>

// ===== STATE =====
let phase = localStorage.getItem("phase") || "morning"
let context = "screen"
let state = "normal"
let interval;

// ===== SPEECH (mit Callback) =====
function speak(text, cb){
if(!window.speechSynthesis){ if(cb) cb(); return; }

let u = new SpeechSynthesisUtterance(text);
u.lang = "de-DE"
u.rate = 0.95;

u.onend = () => { if(cb) cb(); };

speechSynthesis.cancel();
speechSynthesis.speak(u);
}

// ===== INIT =====
updatePhase();

// ===== PHASE =====
function updatePhase(){
document.getElementById("phase").innerText = "Phase: " + phase;

if(phase==="morning"){
document.getElementById("morning-check").classList.remove("hidden");
document.getElementById("day-ui").classList.add("hidden");
} else {
document.getElementById("morning-check").classList.add("hidden");
document.getElementById("day-ui").classList.remove("hidden");
}
}

// ===== MORNING =====
function startMorning(sticky){

let steps = sticky ? morningCare() : morningNormal();

phase="day"
localStorage.setItem("phase",phase);
updatePhase();

startSteps(steps);
}

// ===== MORNING ROUTINES =====
function morningNormal(){
return [
{t:"Augen geschlossen", s:30, v:"Lass die Augen geschlossen. Reibe nicht."},
{t:"Palmieren", s:60, v:"Reibe deine Hände warm. Lege sie locker auf die geschlossenen Augen. Kein Druck."},
{t:"Blinzeln", s:20, v:"Öffne die Augen langsam. Blinzle ruhig und regelmäßig."},
{t:"Aufstehen", s:5, v:"Steh jetzt auf."},
{t:"Fernblick", s:60, v:"Schau in die Ferne. Blinzle normal. Fixiere nichts. Lass den Blick weich."}
];
}

function morningCare(){
return [
{t:"Wärme", s:90, v:"Lege warme Hände auf deine geschlossenen Augen."},
{t:"Lidmassage", s:30, v:"Streiche sanft über die Lider. Kein Druck auf den Augapfel."},
{t:"Reinigung", s:30, v:"Reinige die Lider vorsichtig mit Wasser."},
{t:"Blinzeln", s:20, v:"Blinzle ruhig und locker."},
{t:"Fernblick", s:60, v:"Schau in die Ferne. Blinzle normal. Fixiere nichts. Blick weich lassen."}
];
}

// ===== DAY =====
function setContext(c){ context=c; updateUI(); }
function setState(s){ state=s; updateUI(); }

function updateUI(){
document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
document.getElementById("c_"+context)?.classList.add("active");
document.getElementById("s_"+state)?.classList.add("active");
}

function buildPlan(){

if(state==="sticky") return ["sticky"];
if(state==="overload") return ["palmieren"];
if(state==="dry") return ["blinzeln_fern"];

if(context==="screen") return ["blinzeln_fern"];
if(context==="stress") return ["palmieren"];
if(context==="nature") return ["fernblick"];

return ["blinzeln"];
}

// ===== EXERCISES =====
function build(type){

if(type==="sticky"){
return [
{t:"Augen schließen", s:30, v:"Schließe die Augen. Reibe nicht."},
{t:"Wärme", s:60, v:"Lege warme Hände auf die Augen."},
{t:"Blinzeln", s:20, v:"Öffne die Augen und blinzle langsam."},
{t:"Fernblick", s:40, v:"Schau in die Ferne. Blinzle normal. Fixiere nichts. Blick weich lassen."}
];
}

if(type==="palmieren"){
return [
{t:"Palmieren", s:60, v:"Reibe deine Hände warm. Lege sie locker auf die geschlossenen Augen. Kein Druck."}
];
}

if(type==="blinzeln_fern"){
return [
{t:"Blinzeln", s:15, v:"Blinzle ruhig und vollständig."},
{t:"Fernblick", s:40, v:"Schau in die Ferne. Blinzle normal. Fixiere nichts. Blick weich lassen."}
];
}

if(type==="fernblick"){
return [
{t:"Fernblick", s:40, v:"Schau in die Ferne. Blinzle normal. Fixiere nichts. Blick weich lassen."}
];
}

return [
{t:"Blinzeln", s:20, v:"Blinzle ruhig und vollständig."}
];
}

// ===== START =====
function startDay(){
let plan = buildPlan();
let steps=[];

for(let p of plan){
steps = steps.concat(build(p));
}

startSteps(steps);
}

// ===== RUN =====
function startSteps(steps){

document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");

run(steps,0);
}

function run(steps,i){

if(i>=steps.length){
document.getElementById("timer").innerText="✓"
speak("Fertig");
return;
}

let s = steps[i];

document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;
document.getElementById("timer").innerText = "..."

speak(s.v, function(){

let sec = s.s;
document.getElementById("timer").innerText = sec;

interval = setInterval(()=>{
sec--;
document.getElementById("timer").innerText = sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}
},1000);

});
}

// ===== CONTROL =====
function finish(){ abort(); }

function abort(){
clearInterval(interval);
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

// ===== NIGHT =====
function goodNight(){
phase="morning"
localStorage.setItem("phase",phase);
updatePhase();
alert("Gute Nacht. Morgen startet wieder die Morgenroutine.");
}

</script>

</body>
</html>
