<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.5</title>

<style>
body{font-family:-apple-system;text-align:center;background:#fdfcfb;}
.card{background:white;padding:20px;border-radius:20px;max-width:420px;margin:auto;}
button{padding:15px;margin:5px;width:100%;border:none;border-radius:15px;font-weight:bold;}
.hidden{display:none;}
.timer{font-size:50px;}
.fb{width:30%;}
.warn{color:#c0392b;font-weight:bold;}
.good{color:#27ae60;font-weight:bold;}
</style>
</head>

<body>

<div id="menu" class="card">
<h2>👁️ 5.5</h2>

<div id="stateBox">
<p><b>Zustand:</b></p>
<label><input type="checkbox" value="trocken"> Trocken</label><br>
<label><input type="checkbox" value="druck"> Druck</label><br>
<label><input type="checkbox" value="muede"> Müde</label><br>
<label><input type="checkbox" value="fokus"> Fokus schlecht</label>
</div>

<div id="recommendation"></div>

<button onclick="start('morgen')">☀️ Morgen</button>
<button onclick="start('train')">🚀 Training</button>
<button onclick="start('reset')">🌿 Reset</button>
<button onclick="showStats()">📊 Analyse</button>
</div>

<div id="run" class="card hidden">
<h3 id="title"></h3>
<div id="timer" class="timer"></div>
<p id="desc"></p>

<button onclick="abort()">Abbrechen</button>

<div id="fb" class="hidden">
<button class="fb" onclick="finish('good')">👍</button>
<button class="fb" onclick="finish('neutral')">😐</button>
<button class="fb" onclick="finish('bad')">⚠️</button>
</div>
</div>

<div id="stats" class="card hidden"></div>

<script>

let interval;
let steps=[];
let currentExercise=""
let currentState=[];

let stats = JSON.parse(localStorage.getItem('exStatsV3')||"{}");

function save(){localStorage.setItem('exStatsV3',JSON.stringify(stats));}

function getState(){
let arr=[];
document.querySelectorAll('#stateBox input').forEach(cb=>{
if(cb.checked) arr.push(cb.value);
});
return arr.length?arr:["neutral"];
}

function getScore(ex,state){
if(!stats[ex]||!stats[ex][state]) return 0;
let s=stats[ex][state];
return (s.good||0)-(s.bad||0);
}

function evaluate(){

let state = getState();
let list=["Kreise","Acht","NahFern","Palmieren"];

let best={ex:null,score:-999};
let warnings=[];

list.forEach(ex=>{
let score=0;

state.forEach(s=>{
score+=getScore(ex,s);
});

if(score>best.score) best={ex,score};

if(score<-2) warnings.push(ex);
});

let html=""

if(best.ex){
html += "<div class='good'>Empfehlung: "+best.ex+"</div>"
}

if(warnings.length){
html += "<div class='warn'>Vermeiden: "+warnings.join(", ")+"</div>"
}

document.getElementById('recommendation').innerHTML = html;
}

setInterval(evaluate,2000);

function updateStat(ex,stateArr,fb){
if(!stats[ex]) stats[ex]={};

stateArr.forEach(s=>{
if(!stats[ex][s]) stats[ex][s]={good:0,neutral:0,bad:0};
stats[ex][s][fb]++;
});

save();
}

function pickExercise(){

let list=["Kreise","Acht","NahFern","Palmieren"];

list.sort((a,b)=>{
let scoreA=0, scoreB=0;

currentState.forEach(s=>{
scoreA+=getScore(a,s);
scoreB+=getScore(b,s);
});

return scoreB-scoreA;
});

return list[0];
}

function start(type){

currentState = getState();

document.getElementById('menu').classList.add('hidden');
document.getElementById('run').classList.remove('hidden');
document.getElementById('fb').classList.add('hidden');

let ex = pickExercise();

let focus;

if(ex==="Kreise") focus={t:"Kreise",s:30,d:"Langsame Augenkreise",sw:true};
if(ex==="Acht") focus={t:"Acht",s:30,d:"Acht verfolgen",sw:true};
if(ex==="NahFern") focus={t:"Nah-Fern",s:30,d:"Nähe/Ferne wechseln"};
if(ex==="Palmieren") focus={t:"Palmieren",s:60,d:"Augen abdunkeln"};

currentExercise = focus.t;

const train=[
{t:"Blinzeln",s:15,d:"Locker blinzeln"},
focus
];

const morgen=[
{t:"Augen zu",s:40,d:"Augen geschlossen lassen"},
{t:"Blinzeln",s:20,d:"Sanft blinzeln"},
{t:"Wärme",s:60,d:"Warme Kompresse"},
{t:"Massage",s:30,d:"Lidränder massieren"}
];

steps = type==="morgen"?morgen:type==="reset"?[{t:"Ferne",s:20,d:"In die Ferne"}]:train;

run(0);
}

function run(i){
if(i>=steps.length){
document.getElementById('timer').innerText="✓"
document.getElementById('fb').classList.remove('hidden');
return;
}

let s=steps[i];
document.getElementById('title').innerText=s.t;
document.getElementById('desc').innerText=s.d;
document.getElementById('timer').innerText=s.s;

let sec=s.s;

interval=setInterval(()=>{
sec--;
document.getElementById('timer').innerText=sec;

if(s.sw && sec===15) alert("Richtung wechseln");

if(sec<=0){
clearInterval(interval);
run(i+1);
}
},1000);
}

function abort(){
clearInterval(interval);
document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

function finish(fb){
updateStat(currentExercise,currentState,fb);

document.getElementById('run').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

function showStats(){

document.getElementById('menu').classList.add('hidden');
let box=document.getElementById('stats');
box.classList.remove('hidden');

let html="<h3>Analyse</h3>"

for(let ex in stats){
html+="<b>"+ex+"</b><br>"

for(let st in stats[ex]){
let s=stats[ex][st];
let total=s.good+s.bad+s.neutral;
if(total===0) continue;

let rate=Math.round((s.good/total)*100);
html+=st+": "+rate+"% ("+total+")<br>"
}

html+="<br>"
}

html+="<button onclick='back()'>Zurück</button>"

box.innerHTML=html;
}

function back(){
document.getElementById('stats').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
}

</script>

</body>
</html>
