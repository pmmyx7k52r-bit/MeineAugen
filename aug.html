<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeineAugen 6.5.5 - Variety Update</title>
<style>
:root { --bg: #f4f1ee; --card: white; --text: #2c3e50; --accent: #2980b9; --gray: #bdc3c7; --active: #2ecc71; --shaolin: #e67e22; }
@media (prefers-color-scheme: dark) { :root { --bg: #000; --card: #121212; --text: #dcdcdc; --accent: #3498db; --gray: #333; } }
body { font-family:-apple-system, sans-serif; background: var(--bg); text-align:center; padding:10px; color: var(--text); transition: 0.3s; margin: 0; touch-action: manipulation; }
.card { background: var(--card); padding:15px; border-radius:30px; max-width:440px; margin:10px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
#morning-sub { display: none; gap: 8px; margin: 10px 0; }
h4 { margin: 12px 0 8px 0; font-size: 11px; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; padding: 0 5px; }
button.option { padding: 10px 2px; border: none; border-radius: 12px; font-weight: 600; font-size: 9px; background: var(--gray); color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; min-height: 55px; }
button.option span { font-size: 18px; margin-bottom: 3px; pointer-events: none; }
button.option.active { background-color: var(--accent) !important; outline: 3px solid var(--active); transform: scale(1.05); }
.action-btn { padding: 18px; margin: 6px 0; width: 100%; border: none; border-radius: 22px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
.start-morning { background: #f1c40f; color: #2c3e50; }
.start-run { background: #27ae60; margin-top: 10px; }
.shaolin-btn { background: var(--shaolin); border: 2px solid #d35400; }
.pause-btn { background: #e67e22 !important; margin-bottom: 5px; }
#timer { font-size: 80px; color: #e67e22; font-weight: bold; margin: 5px 0; }
#desc { font-size: 17px; min-height: 220px; padding: 0 15px; line-height: 1.5; display: flex; align-items: center; justify-content: center; font-weight: 500; }
.hidden { display: none !important; }
body.dark { --bg: #000; --card: #111; --text: #eee; }
</style>
</head>
<body onload="init()">

<div id="menu" class="card">
<h2>👁️ MeineAugen 6.5.5</h2>
<div id="mode-info" style="font-size:10px; margin-bottom:10px; font-weight:bold; color:#7f8c8d;">BEREIT</div>

<button type="button" onclick="toggleMorning()" class="action-btn start-morning">☀️ Morgen-Routine <span id="arrow">▼</span></button>
<div id="morning-sub">
<button type="button" onclick="startSession('bed')" class="action-btn" style="background:#f39c12; flex:1; border-radius:15px;">🛌 Bett</button>
<button type="button" onclick="startSession('bath')" class="action-btn" style="background:#3498db; flex:1; border-radius:15px;">🚿 Bad</button>
</div>

<button type="button" onclick="startSession('shaolin')" class="action-btn shaolin-btn">🧘 Shaolin Fokus (Schärfung)</button>

<h4>Kontext (Fokus)</h4>
<div class="grid">
<button type="button" id="c_screen" onclick="setOpt('ctx', 'screen')" class="option"><span>📱</span>Screen</button>
<button type="button" id="c_nature" onclick="setOpt('ctx', 'nature')" class="option"><span>🌳</span>Natur</button>
<button type="button" id="c_stress" onclick="setOpt('ctx', 'stress')" class="option"><span>⚖️</span>Stress</button>
<button type="button" id="c_allergy" onclick="setOpt('ctx', 'allergy')" class="option"><span>🤧</span>Allergie</button>
</div>

<h4>Zustand</h4>
<div class="grid">
<button type="button" id="s_normal" onclick="setOpt('st', 'normal')" class="option"><span>✅</span>OK</button>
<button type="button" id="s_dry" onclick="setOpt('st', 'dry')" class="option"><span>😵</span>Trocken</button>
<button type="button" id="s_tired" onclick="setOpt('st', 'tired')" class="option"><span>🔴</span>Müde</button>
<button type="button" id="s_light" onclick="setOpt('st', 'light')" class="option"><span>🔆</span>Licht</button>
</div>

<button type="button" onclick="startSession('train')" class="action-btn start-run">🚀 Training starten</button>
<button type="button" onclick="startSession('night')" class="action-btn" style="background:#2c3e50;">🌙 Gute Nacht</button>
</div>

<div id="run" class="card hidden">
<div id="title" style="font-weight:bold; font-size: 22px; color: var(--accent);"></div>
<div id="timer">...</div>
<div id="desc"></div>
<button type="button" id="pauseToggle" onclick="togglePause()" class="action-btn pause-btn">Pause</button>
<button type="button" onclick="abort()" class="action-btn" style="background:#95a5a6;">Abbrechen</button>
</div>

<script>
var curCtx = "none", curSt = "normal"
var timer, isPaused = false, currentSec = 0, currentSteps = [], currentIndex = 0;
var sessionHistory = [];
var isSpeaking = false;

function init() {
try {
curCtx = localStorage.getItem("ma_ctx") || "none"
curSt = localStorage.getItem("ma_st") || "normal"
} catch(e) {}
updateUI();
}

function updateUI() {
var opts = document.getElementsByClassName('option');
for (var i = 0; i < opts.length; i++) { opts[i].classList.remove('active'); }
if (document.getElementById("c_" + curCtx)) document.getElementById("c_" + curCtx).classList.add('active');
if (document.getElementById("s_" + curSt)) document.getElementById("s_" + curSt).classList.add('active');
document.getElementById("mode-info").innerText = "FOKUS: " + curCtx.toUpperCase() + " | STATUS: " + curSt.toUpperCase();
}

function setOpt(type, val) {
if (type === 'ctx') curCtx = (curCtx === val) ? "none" : val;
else curSt = (curSt === val) ? "normal" : val;
try { localStorage.setItem("ma_ctx", curCtx); localStorage.setItem("ma_st", curSt); } catch(e) {}
updateUI();
}

function toggleMorning() {
var s = document.getElementById('morning-sub');
var isHidden = (window.getComputedStyle(s).display === 'none');
s.style.display = isHidden ? 'flex' : 'none';
document.getElementById('arrow').innerText = isHidden ? "▲" : "▼"
}

function step(t, s, v, split, type) { return {t: t, s: s, v: v, split: !!split, type: type || 'offen'}; }

var lib = {
motorik: [
step("Zifferblatt", 46, "Blicke nacheinander auf 12, 3, 6 und 9 Uhr. Halte die Extrempunkte kurz. Kopf absolut still.", true),
step("Die liegende Acht", 45, "Stelle dir eine große 8 vor dir vor. Fahre die Linien langsam mit den Augen ab. Kopf ruhig halten.", true),
step("Augen-Kreisen", 40, "Rolle die Augen langsam in einem großen Kreis. Erst im Uhrzeigersinn, dann andersherum.", true),
step("Nasenspitze", 30, "Blicke auf deine Nasenspitze, dann weit in die Ferne. Wiederhole das langsam.")
],
fokus: [
step("Posaune", 40, "Halte einen Text ganz nah, bis er gerade noch scharf ist. Blicke dann blitzartig in die Ferne."),
step("Daumen-Sprung", 35, "Fokussiere den Daumen nah vor dem Gesicht, dann ein Ziel in 3m, dann in der Ferne. Hin und her."),
step("Auge des Adlers", 40, "Wähle ein Ziel in der Ferne. Zoome Details weich heran. Blinzle bewusst bei jedem Fokus."),
step("Shaolin-Punkt", 50, "Fixiere einen winzigen Punkt. Atme tief. Versuche, die Details 'aufzusaugen'.", false, 'fokus')
],
entspannung: [
step("Palmieren", 60, "Augen zu: Reibe die Hände kräftig warm. Decke die Augen lichtdicht ab. Atme tief.", false, 'zu'),
step("Große Schaukel", 45, "Stehe locker und schwinge den Körper sanft von links nach rechts. Lass die Welt fließen."),
step("Gähnen", 25, "Gähne weit und tief. Lass den Kiefer locker hängen. Das entspannt die Augenpartie."),
step("Peripherie", 40, "Schau geradeaus. Wackle mit den Fingern am Sichtfeldrand und nimm die Bewegung bewusst wahr."),
step("Kiefer-Lockerung", 30, "Lass den Kiefer locker hängen. Entspannte Kiefermuskeln lösen reflektorisch Augenstress.")
],
pflege: [
step("Schmetterling", 25, "Blinzle ganz schnell, locker und federleicht. Befeuchtet die Hornhaut sofort."),
step("Lidrand-Pflege", 50, "")
]
};

function shuffle(array) {
for (let i = array.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[array[j]]] = [array[array[j]], array[i]];
}
return array;
}

function getStep(cat) {
let pool = shuffle([...lib[cat]]);
return pool[0];
}

function buildPlan(type) {
sessionHistory = [];
if (type === 'shaolin') return [lib.fokus[3], lib.fokus[2], lib.entspannung[0]];
if (type === 'bed') return [step("Ankommen", 15, "Augen zu.", false, 'zu'), lib.entspannung[0], lib.pflege[0]];
if (type === 'bath') {
sessionHistory.push("Wärme");
let lp = step("Lidrand-Massage", 50, "Streiche am Oberlid sanft abwärts und am Unterlid aufwärts zur Lidkante aus.");
return [step("Wärme", 90, "Warmes Tuch auflegen.", false, 'zu'), lp, step("Reinigung", 30, "Lidrand mit Pad säubern."), lib.pflege[0]];
}
if (type === 'night') return [lib.entspannung[0], lib.entspannung[4]];
// Dynamisches Training - Mische Kategorien für Abwechslung
let plan = [];
if (curCtx === 'screen' || curSt === 'dry') {
plan = [lib.pflege[0], getStep('entspannung'), getStep('fokus')];
} else if (curCtx === 'nature') {
plan = [getStep('fokus'), getStep('motorik'), lib.entspannung[1]];
} else if (curSt === 'tired') {
plan = [lib.entspannung[0], getStep('motorik'), lib.pflege[0]];
} else {
// Normales OK Training: Mix aus allem
plan = [getStep('motorik'), getStep('fokus'), getStep('entspannung')];
}
return plan;
}

function speak(txt, cb) {
if (!window.speechSynthesis) { if (cb) cb(); return; }
speechSynthesis.cancel(); isSpeaking = true;
var u = new SpeechSynthesisUtterance(txt); u.lang = "de-DE"
u.onend = function() { isSpeaking = false; if (cb) cb(); };
speechSynthesis.speak(u);
}

function startSession(type) {
currentSteps = buildPlan(type); currentIndex = 0; isPaused = false;
document.getElementById("pauseToggle").innerText = "Pause"
if (['night','bed','bath','shaolin'].indexOf(type) !== -1 || curSt === 'light') document.body.classList.add("dark");
else document.body.classList.remove("dark");
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
runNextStep();
}

function togglePause() {
isPaused = !isPaused;
document.getElementById("pauseToggle").innerText = isPaused ? "Weiter" : "Pause"
if (isPaused) { clearInterval(timer); speechSynthesis.cancel(); } else { startTimer(); }
}

function runNextStep() {
if (currentIndex >= currentSteps.length) {
document.getElementById("timer").innerText = "✓"
speak("Training beendet.", function() { setTimeout(abort, 2000); });
return;
}
var s = currentSteps[currentIndex];
document.getElementById("title").innerText = s.t;
var info = ""
if (s.type === 'offen') info = "\n\n(Blinzeln erlaubt)"
else if (s.type === 'zu') info = "\n\n(Augen geschlossen halten)"
else if (s.type === 'fokus') info = "\n\n(Blinzeln minimieren)"
document.getElementById("desc").innerText = s.v + info;
document.getElementById("timer").innerText = "..."
speak(s.v, function() { currentSec = s.s; startTimer(); });
}

function startTimer() {
clearInterval(timer); if (isSpeaking) return;
document.getElementById("timer").innerText = currentSec;
timer = setInterval(function() {
if (!isPaused) {
currentSec--; document.getElementById("timer").innerText = currentSec;
var s = currentSteps[currentIndex];
if (s.split && currentSec === Math.floor(s.s / 2)) speak("Wechseln.");
if (currentSec <= 0) { clearInterval(timer); currentIndex++; runNextStep(); }
}
}, 1000);
}

function abort() {
clearInterval(timer); speechSynthesis.cancel();
document.body.classList.remove("dark");
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}
</script>
</body>
</html>
