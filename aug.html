<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen v3.1</title>
<style>
:root { --p: #2c3e50; --s: #27ae60; --a: #e67e22; --d: #c0392b; --bg: #fdfcfb; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--p); text-align: center; padding: 20px; }
.card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; margin: auto; }
button { border: none; padding: 20px; border-radius: 20px; font-size: 1.1rem; cursor: pointer; width: 100%; margin: 10px 0; font-weight: 600; }
.btn-guide { background: var(--s); color: white; }
.timer-val { font-size: 5rem; color: var(--a); margin: 20px 0; font-weight: 200; }
.hidden { display: none; }
</style>
</head>
<body>

<div id="main-menu" class="card">
<h1>👁️ MeineAugen v3.1</h1>
<p style="color: #666; font-size: 0.9rem;">Nutze iPhone-Kurzbefehle für den 10-Min-Alarm.</p>
<button class="btn-guide" onclick="startRoutine('break')">▶️ Pause-Guide starten</button>
<button style="background:#ecf0f1;" onclick="startRoutine('morgen')">☀️ Morgen-Routine</button>
<button style="background:#fff5f5; color:var(--d);" onclick="startRoutine('emergency')">⚠️ Notfall</button>
</div>

<div id="exercise-card" class="card hidden">
<h2 id="ex-title">Übung</h2>
<div class="timer-val" id="timer-display">--</div>
<p id="ex-desc"></p>
</div>

<script>
const synth = window.speechSynthesis;

function speak(text, callback) {
synth.cancel();
const utter = new SpeechSynthesisUtterance(text);
utter.lang = 'de-DE';
utter.rate = 0.85;
if (callback) utter.onend = callback;
synth.speak(utter);
}

function startRoutine(type) {
document.getElementById('main-menu').classList.add('hidden');
document.getElementById('exercise-card').classList.remove('hidden');
const steps = {
break: [
{ t: "Blinzeln", s: 20, v: "Blinzle jetzt 20 Sekunden ganz bewusst." }, //
{ t: "Palmieren", s: 30, v: "Hände reiben und warm auf die Augen legen." }, //
{ t: "Weitblick", s: 10, v: "Schau jetzt entspannt in die Ferne." } //
],
morgen: [
{ t: "Morgengruß", s: 20, v: "Guten Morgen. Erst blinzeln, nicht reiben." }, //
{ t: "Wärme", s: 60, v: "Lege nun die warme Kompresse auf." } //
],
emergency: [{ t: "Notstopp", s: 180, v: "Drei Minuten absolute Dunkelheit für deine Augen." }]
};
runStep(steps[type] || steps.break, 0);
}

function runStep(steps, index) {
if (index >= steps.length) {
speak("Übung beendet. Viel Erfolg beim Weiterarbeiten.");
document.getElementById('exercise-card').classList.add('hidden');
document.getElementById('main-menu').classList.remove('hidden');
return;
}
const s = steps[index];
document.getElementById('ex-title').innerText = s.t;
document.getElementById('ex-desc').innerText = s.s + " Sekunden"
speak(s.v);
let sec = s.s;
const int = setInterval(() => {
document.getElementById('timer-display').innerText = sec;
if (sec <= 0) { clearInterval(int); runStep(steps, index + 1); }
sec--;
}, 1000);
}
</script>
</body>
</html>
