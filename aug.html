<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeineAugen 5.9.2</title>

<style>
body { font-family:-apple-system; background:#fdfcfb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:25px; max-width:420px; margin:auto; }

button {
padding:14px; margin:6px; width:100%;
border:none; border-radius:15px;
font-weight:600; font-size:15px;
background:#2980b9; color:white; opacity:0.6;
}

button.active { opacity:1; outline:3px solid #2ecc71; }
.start { background:#27ae60; opacity:1; }
.night { background:#2c3e50; }
.hidden { display:none; }

#title { font-size:20px; }
#timer { font-size:42px; color:#e67e22; }
#desc { font-size:14px; color:#444; }
#phase { font-size:12px; color:#888; margin-bottom:10px; }
</style>
</head>

<body>

<div id="menu" class="card">

<h2>👁️ MeineAugen 5.9.2</h2>
<div id="phase"></div>

<div id="morning-check">
<h4>Morgen</h4>
<button onclick="startMorning('sticky')">🟡 Verklebte Augen</button>
<button onclick="startMorning('normal')">🙂 Normal</button>
<button onclick="startMorning('bed')">🛏️ Im Bett starten</button>
</div>

<div id="day-ui" class="hidden">

<h4>Kontext</h4>
<button id="c_screen" onclick="setContext('screen')">📱 Bildschirm</button>
<button id="c_stress" onclick="setContext('stress')">⚠️ Stress</button>
<button id="c_nature" onclick="setContext('nature')">🌿 Natur</button>

<h4>Zustand</h4>
<button id="s_normal" onclick="setState('normal')">🙂 Normal</button>
<button id="s_dry" onclick="setState('dry')">😵 Trocken</button>
<button id="s_sticky" onclick="setState('sticky')">🟡 Verklebt</button>
<button id="s_over" onclick="setState('overload')">🔴 Überreizt</button>

<button class="start" onclick="startDay()">▶ Start</button>

</div>

<button class="night" onclick="goodNight()">🌙 Gute Nacht</button>

</div>

<div id="run" class="card hidden">
<div id="title"></div>
<div id="timer"></div>
<div id="desc"></div>

<button onclick="abort()">Abbrechen</button>
</div>

<script>

let phase = localStorage.getItem("phase") || "morning"
let context = localStorage.getItem("context") || "screen"
let state = localStorage.getItem("state") || "normal"

let interval;

updatePhase();
updateUI();

/* =========================
SPEECH
========================= */

function speak(text, cb){
if(!window.speechSynthesis){ cb?.(); return; }

speechSynthesis.cancel();

let u = new SpeechSynthesisUtterance(text);
u.lang = "de-DE"
u.rate = 0.95;

u.onend = ()=>cb?.();

speechSynthesis.speak(u);
}

/* =========================
UI
========================= */

function updatePhase(){
document.getElementById("phase").innerText = "Phase: " + phase;

if(phase==="morning"){
document.getElementById("morning-check").classList.remove("hidden");
document.getElementById("day-ui").classList.add("hidden");
} else {
document.getElementById("morning-check").classList.add("hidden");
document.getElementById("day-ui").classList.remove("hidden");
}
}

function updateUI(){
document.querySelectorAll("#day-ui button").forEach(b=>{
if(!b.classList.contains("start")) b.classList.remove("active");
});

document.getElementById("c_"+context)?.classList.add("active");
document.getElementById("s_"+state)?.classList.add("active");
}

function setContext(c){
context = c;
localStorage.setItem("context",c);
updateUI();
}

function setState(s){
state = s;
localStorage.setItem("state",s);
updateUI();
}

/* =========================
MORNING
========================= */

function startMorning(mode){

let steps;

if(mode==="bed") steps = [
step("Augen zu",15,"Augen geschlossen lassen"),
step("Öffnen",20,"Langsam öffnen"),
step("Blinzeln",15,"Ruhig blinzeln")
];

if(mode==="normal") steps = [
step("Blinzeln",20,"Ruhig blinzeln"),
step("Palmieren",30,"Hände auflegen"),
step("Fernblick",40,"In die Ferne schauen")
];

if(mode==="sticky") steps = [
step("Wärme",40,"Warme Hände auflegen"),
step("Reinigung",20,"Augenlider reinigen"),
step("Blinzeln",15,"Langsam blinzeln")
];

phase="day"
localStorage.setItem("phase",phase);
updatePhase();

runSteps(steps);
}

/* =========================
PLAN LOGIK
========================= */

function buildPlan(){

// 🔴 OVERLOAD
if(state==="overload"){
return [
step("Blinzeln",10,"Ruhig blinzeln"),
step("Palmieren",25,"Hände auf die Augen legen"),
step("Freier Blick",20,"Blick weich lassen")
];
}

// 🟡 STICKY
if(state==="sticky"){
return [
step("Wärme",40,"Warme Hände"),
step("Reinigung",20,"Reinigen"),
step("Blinzeln",15,"Blinzeln"),
step("Fernblick",30,"Fernblick")
];
}

// 🟡 DRY
if(state==="dry"){
return [
step("Blinzeln",15,"Ruhig blinzeln"),
step("Uhr",20,"Oben rechts unten links"),
step("Fernblick",30,"In die Ferne schauen")
];
}

// 🟢 SCREEN
if(context==="screen"){
return [
step("Blinzeln",15,"Ruhig blinzeln"),
step("Uhr",20,"Oben rechts unten links"),
step("Nah-Fern",40,"Nah und fern wechseln"),
step("Freier Blick",30,"Blick wandern lassen")
];
}

// 🟢 DEFAULT
return [
step("Blinzeln",15,"Ruhig blinzeln"),
step("Freier Blick",30,"Blick wandern lassen")
];
}

/* =========================
RUNNER
========================= */

function step(t,s,v){
return {t,s,v};
}

function startDay(){
runSteps(buildPlan());
}

function runSteps(steps){
document.getElementById("menu").classList.add("hidden");
document.getElementById("run").classList.remove("hidden");
run(steps,0);
}

function run(steps,i){

if(i>=steps.length){
document.getElementById("timer").innerText="✓"
speak("Fertig");
return;
}

let s = steps[i];

document.getElementById("title").innerText = s.t;
document.getElementById("desc").innerText = s.v;

speak(s.v, ()=>{

let sec = s.s;
document.getElementById("timer").innerText = sec;

interval = setInterval(()=>{
sec--;
document.getElementById("timer").innerText = sec;

if(sec<=0){
clearInterval(interval);
run(steps,i+1);
}

},1000);
});
}

/* =========================
CONTROL
========================= */

function abort(){
clearInterval(interval);
speechSynthesis.cancel();
document.getElementById("run").classList.add("hidden");
document.getElementById("menu").classList.remove("hidden");
}

/* =========================
NIGHT
========================= */

function goodNight(){
phase="morning"
localStorage.setItem("phase",phase);
updatePhase();
}

</script>

</body>
</html>
